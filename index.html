star":"★★★"},{"no":163,"chapter":"第3章","chapterTheme":"DLの概要","section":"最適化手法","question":"AdaGradの特徴として正しいものはどれか。","choices":{"A":"全パラメータに同じ学習率を使う","B":"各パラメータの勾配の累積二乗和で学習率を除算し、頻繁に更新されるパラメータの学習率を小さくする","C":"学習率を一定間隔で大きくする","D":"ミニバッチサイズを自動調整する"},"answer":"B","answerText":"各パラメータの勾配の累積二乗和で学習率を除算し、頻繁に更新されるパラメータの学習率を小さくする","explanation":"AdaGradは各パラメータに独立した学習率を適用。大きな勾配を持つパラメータほど学習率が小さくなる。疎なデータ（NLP等）に有効だが学習率が単調減少し後期で更新が止まる欠点。","star":"★★★"},{"no":164,"chapter":"第3章","chapterTheme":"DLの概要","section":"最適化手法","question":"RMSpropがAdaGradを改善した点として正しいものはどれか。","choices":{"A":"学習率を一定にした","B":"勾配二乗の指数移動平均を使うことで学習率の単調減少問題を解消した","C":"モーメンタムを加えた","D":"バッチサイズを自動調整した"},"answer":"B","answerText":"勾配二乗の指数移動平均を使うことで学習率の単調減少問題を解消した","explanation":"RMSpropはAdaGradの累積二乗和の代わりに指数移動平均（G_t = βG_{t-1} + (1-β)g_t²）を使い、学習率の単調減少問題を解消。非定常問題に有効。","star":"★★★"},{"no":165,"chapter":"第3章","chapterTheme":"DLの概要","section":"最適化手法","question":"ハイパーパラメータの調整方法として「グリッドサーチ」と「ランダムサーチ」の違いはどれか。","choices":{"A":"グリッドサーチは乱数を使い、ランダムサーチは網羅的に探索する","B":"グリッドサーチは指定した組み合わせを全て試し、ランダムサーチは乱数で組み合わせを試す","C":"ランダムサーチは常に最良の組み合わせを見つける","D":"グリッドサーチはNNのみ使える"},"answer":"B","answerText":"グリッドサーチは指定した組み合わせを全て試し、ランダムサーチは乱数で組み合わせを試す","explanation":"グリッドサーチは指定したハイパーパラメータ値の全組み合わせを試す。ランダムサーチは乱数でサンプリングした組み合わせを試す。Bergstraらはランダムサーチの方が高次元では効率的と示した。","star":"★★★"},{"no":166,"chapter":"第3章","chapterTheme":"DLの概要","section":"最適化手法","question":"エポック（Epoch）とイテレーション（Iteration）の違いとして正しいものはどれか。","choices":{"A":"同じ概念","B":"エポックは全訓練データを1周処理すること、イテレーションは1ミニバッチの処理","C":"エポックは1サンプルの処理、イテレーションは全データの処理","D":"エポックはモデル評価、イテレーションはパラメータ更新"},"answer":"B","answerText":"エポックは全訓練データを1周処理すること、イテレーションは1ミニバッチの処理","explanation":"エポック：訓練データセット全体を1回処理する単位。イテレーション（ステップ）：ミニバッチ1回分の処理。例えば1000サンプルをバッチサイズ100で学習すると1エポック=10イテレーション。","star":"★★★"},{"no":167,"chapter":"第3章","chapterTheme":"DLの概要","section":"最適化手法","question":"鞍点（Saddle Point）の説明として正しいものはどれか。","choices":{"A":"全方向で最小値となる点","B":"一部の方向では最小値、他の方向では最大値となる点","C":"全方向で最大値となる点","D":"勾配が無限大となる特異点"},"answer":"B","answerText":"一部の方向では最小値、他の方向では最大値となる点","explanation":"鞍点は一部の方向で極小（谷）、別の方向では極大（峰）となる点。NNの高次元損失曲面では局所最適解より鞍点が多いとされる。モーメンタムやAdamは鞍点を抜け出しやすい。","star":"★★★"},{"no":168,"chapter":"第3章","chapterTheme":"DLの概要","section":"最適化手法","question":"ノーフリーランチ定理（No Free Lunch Theorem）の機械学習における意味として正しいものはどれか。","choices":{"A":"無料のデータは学習に使えない","B":"全ての問題に対して最良のアルゴリズムは存在せず、問題に応じたアルゴリズム選択が必要","C":"GradientDescentは常に最適解を保証する","D":"計算コスト0のモデルを見つけることが目標"},"answer":"B","answerText":"全ての問題に対して最良のアルゴリズムは存在せず、問題に応じたアルゴリズム選択が必要","explanation":"ノーフリーランチ定理（Wolpert & Macready）：全問題を平均すると、どのアルゴリズムもランダム探索と同等。特定問題に強いアルゴリズムは別の問題では弱い。問題に合った手法選択の重要性を示す。","star":"★★★"},{"no":169,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"全結合層","question":"全結合層（Fully Connected Layer）の特徴として正しいものはどれか。","choices":{"A":"前の層の一部のニューロンとのみ接続する","B":"前の層の全ニューロンと接続され、パラメータ数が多い","C":"空間的な局所パターンを学習するのに適している","D":"重みを共有して計算量を削減する"},"answer":"B","answerText":"前の層の全ニューロンと接続され、パラメータ数が多い","explanation":"全結合層はすべてのニューロンが前の層の全ニューロンと接続される。パラメータ数はn×m+mで、CNNの畳み込み層よりパラメータ数が多い。","star":"★★★"},{"no":170,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"全結合層","question":"全結合層が画像認識に多用されない主な理由として正しいものはどれか。","choices":{"A":"全結合層は行列計算ができないから","B":"パラメータ数が膨大になり、空間的な構造（局所性・平行移動不変性）を考慮しないから","C":"全結合層は非線形性を持てないから","D":"全結合層は深い構造に使えないから"},"answer":"B","answerText":"パラメータ数が膨大になり、空間的な構造（局所性・平行移動不変性）を考慮しないから","explanation":"画像は高次元（例：224×224×3=150,528次元）なため全結合層のパラメータ数が膨大。また画像の空間的な局所パターンや平行移動不変性を考慮できない。CNNの畳み込み層が適切。","star":"★★★"},{"no":171,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"全結合層","question":"全結合層のバイアス（Bias）の役割として正しいものはどれか。","choices":{"A":"入力の重みを調整する","B":"出力の基準値をシフトし、決定境界を自由に動かせるようにする","C":"活性化関数を選択する","D":"正則化を行う"},"answer":"B","answerText":"出力の基準値をシフトし、決定境界を自由に動かせるようにする","explanation":"バイアスbはy = Wx + bのbに相当。バイアスがないとNNの決定境界は必ず原点を通る制約ができる。バイアスにより決定境界を任意の位置にシフトできる。","star":"★★★"},{"no":172,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"全結合層","question":"入力次元512、出力次元256の全結合層のパラメータ数として正しいものはどれか。","choices":{"A":"512 + 256 = 768","B":"512 × 256 + 256 = 131,328","C":"512 × 256 = 131,072","D":"256 × 2 = 512"},"answer":"B","answerText":"512 × 256 + 256 = 131,328","explanation":"重みの数：512×256 = 131,072。バイアスの数：256。合計：131,072 + 256 = 131,328。","star":"★★★"},{"no":173,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"全結合層","question":"全結合層はどのような情報の関係を学習することが得意か。","choices":{"A":"空間的に離れた特徴間の局所的なパターン","B":"入力の全特徴量を組み合わせたグローバルな関係","C":"時系列の順序関係","D":"画像の平行移動不変な特徴"},"answer":"B","answerText":"入力の全特徴量を組み合わせたグローバルな関係","explanation":"全結合層は全ての入力特徴と出力ニューロンが接続されるため、特徴量間のグローバルな組み合わせパターンを学習するのに適している。CNNの最終段分類器として使われる。","star":"★★★"},{"no":174,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"畳み込みニューラルネットワーク（CNN）が画像認識に適している主な理由はどれか。","choices":{"A":"パラメータ数が全結合層より多いから","B":"重み共有と局所結合により空間的な局所パターンを効率的に学習できるから","C":"画像の色情報を無視できるから","D":"全ての画素を同時に処理できるから"},"answer":"B","answerText":"重み共有と局所結合により空間的な局所パターンを効率的に学習できるから","explanation":"CNNは畳み込みフィルタが重み共有（平行移動不変性）と局所結合（空間的局所性）を持つため、画像の局所的なパターン（エッジ・テクスチャ等）を効率的に学習できる。","star":"★★★"},{"no":175,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"畳み込み演算でのストライド（Stride）の役割として正しいものはどれか。","choices":{"A":"フィルタのサイズを変更する","B":"フィルタを何画素ずつシフトして適用するかを決定し、出力サイズを制御する","C":"入力に0を追加する","D":"チャンネル数を増やす"},"answer":"B","answerText":"フィルタを何画素ずつシフトして適用するかを決定し、出力サイズを制御する","explanation":"ストライドはフィルタを何画素ずつシフトするかを指定するパラメータ。ストライドが1なら1画素ずつ、2なら2画素ずつシフト。ストライドが大きいほど出力サイズが小さくなる。","star":"★★★"},{"no":176,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"パディング（Padding）の主な目的として正しいものはどれか。","choices":{"A":"特徴マップのサイズを小さくする","B":"入力の周囲に0を追加して出力サイズを保つ（same padding）または縁の情報を保持する","C":"チャンネル数を減らす","D":"重みを初期化する"},"answer":"B","answerText":"入力の周囲に0を追加して出力サイズを保つ（same padding）または縁の情報を保持する","explanation":"パディングは入力の周囲に0（ゼロパディング）を追加する。Same paddingはスト ライド1の場合に入出力を同サイズにする。縁部分の情報も畳み込みに使用できる。","star":"★★★"},{"no":177,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"Atrous Convolution（拡張畳み込み、Dilated Convolution）の説明として正しいものはどれか。","choices":{"A":"フィルタサイズを小さくして計算量を削減する畳み込み","B":"フィルタの各要素間に穴（ゼロ）を挿入して受容野を拡大する畳み込み","C":"深さ方向に畳み込む手法","D":"グループに分けて畳み込む手法"},"answer":"B","answerText":"フィルタの各要素間に穴（ゼロ）を挿入して受容野を拡大する畳み込み","explanation":"Dilated（Atrous）Convolutionはフィルタ要素間に拡張率d-1個のゼロを挿入してフィルタサイズを変えずに受容野を拡大する。セマンティックセグメンテーション（DeepLab等）に有効。","star":"★★★"},{"no":178,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"Depthwise Separable Convolutionの説明として正しいものはどれか。","choices":{"A":"深い層にのみ適用する通常の畳み込み","B":"Depthwise（チャンネルごと）畳み込みとPointwise（1×1）畳み込みに分離して計算量を削減する手法","C":"入力の深さ方向のみを畳み込む手法","D":"プーリングと組み合わせた畳み込み"},"answer":"B","answerText":"Depthwise（チャンネルごと）畳み込みとPointwise（1×1）畳み込みに分離して計算量を削減する手法","explanation":"Depthwise Separable ConvolutionはMobileNet等で使用。通常の畳み込みを「チャンネルごとの空間畳み込み（Depthwise）」と「1×1畳み込み（Pointwise）」に分解して計算量を大幅削減。","star":"★★★"},{"no":179,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"特徴マップ（Feature Map）の説明として正しいものはどれか。","choices":{"A":"入力画像そのもの","B":"畳み込み演算後の出力で、各フィルタが学習した特徴の空間的な応答を表す","C":"プーリング後の最終出力","D":"全結合層の出力"},"answer":"B","answerText":"畳み込み演算後の出力で、各フィルタが学習した特徴の空間的な応答を表す","explanation":"特徴マップは畳み込みフィルタを入力に適用した後の出力。各フィルタはエッジや色・テクスチャ等の特定パターンを検出し、特徴マップはその空間的な応答を示す。","star":"★★★"},{"no":180,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"入力H×W、フィルタF×F、ストライドS、パディングP の場合の出力サイズとして正しいものはどれか。","choices":{"A":"(H + 2P - F) / S + 1","B":"(H - F + P) / S + 1","C":"(H × F + 2P) / S","D":"H / (F × S)"},"answer":"A","answerText":"(H + 2P - F) / S + 1","explanation":"出力サイズ = floor((H + 2P - F)/S) + 1。例えばH=28, F=3, S=1, P=1なら(28+2-3)/1+1=28（Sameパディング）。","star":"★★★"},{"no":181,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"CNNで1×1畳み込み（Pointwise Convolution）の主な用途として正しいものはどれか。","choices":{"A":"空間的なパターンを学習する","B":"チャンネル数の変換と計算量削減","C":"画像のサイズを縮小する","D":"バッチ正規化を行う"},"answer":"B","answerText":"チャンネル数の変換と計算量削減","explanation":"1×1畳み込みはチャンネル方向のみに作用し、空間サイズを変えずにチャンネル数を変換。GoogLeNet（Inception）で計算量削減に、ResNetのボトルネック構造に使われる。","star":"★★★"},{"no":182,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"CNNの重み共有（Weight Sharing）の利点として正しいものはどれか。","choices":{"A":"各位置で異なるフィルタを学習する","B":"同じフィルタを入力全体でスライドして適用するためパラメータ数を削減し、平行移動不変性を獲得する","C":"バッチサイズを削減する","D":"学習率を自動調整する"},"answer":"B","answerText":"同じフィルタを入力全体でスライドして適用するためパラメータ数を削減し、平行移動不変性を獲得する","explanation":"重み共有：同一のフィルタ係数を入力の全位置で使い回す。これによりパラメータ数が削減され、またどの位置でも同じパターンを検出できる平行移動不変性が得られる。","star":"★★★"},{"no":183,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"CNNの受容野（Receptive Field）の説明として正しいものはどれか。","choices":{"A":"出力の1ニューロンが視野に取り込める入力領域の範囲","B":"フィルタのサイズ","C":"チャンネルの数","D":"バッチサイズ"},"answer":"A","answerText":"出力の1ニューロンが視野に取り込める入力領域の範囲","explanation":"受容野は出力の1ニューロンが参照する入力空間の領域。層を重ねるほど受容野が拡大し、より広いコンテキスト（大域的な特徴）を捉えられる。","star":"★★★"},{"no":184,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"CNN において「深い層」で学習される特徴の傾向として正しいものはどれか。","choices":{"A":"深い層ほどエッジや色など低レベルな特徴を学習する","B":"深い層ほど物体全体の高レベルな抽象的特徴（顔・車等）を学習する傾向がある","C":"深い層では学習が行われない","D":"深い層はプーリングのみを行う"},"answer":"B","answerText":"深い層ほど物体全体の高レベルな抽象的特徴（顔・車等）を学習する傾向がある","explanation":"CNNの階層的特徴学習：浅い層はエッジ・テクスチャなど低レベル特徴、中間層は部品の組み合わせ、深い層は物体全体の高レベル・抽象的特徴を学習する。","star":"★★★"},{"no":185,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"畳み込み層","question":"1D畳み込み（1D Convolution）が適しているデータの種類はどれか。","choices":{"A":"静止画像","B":"3Dボリュームデータ（CT・MRI）","C":"時系列データやテキスト（1次元の系列データ）","D":"ポイントクラウドデータ"},"answer":"C","answerText":"時系列データやテキスト（1次元の系列データ）","explanation":"1D畳み込みは時間または系列方向にのみフィルタを適用する。音声波形・時系列センサーデータ・テキスト（文字レベル）等の1次元系列データの処理に使われる。","star":"★★★"},{"no":186,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"バッチ正規化（Batch Normalization）の主な効果として正しいものはどれか。","choices":{"A":"過学習を完全に防ぐ","B":"各層の出力を正規化して学習を安定化させ、大きな学習率を使えるようにする","C":"モデルのパラメータ数を削減する","D":"推論速度を2倍にする"},"answer":"B","answerText":"各層の出力を正規化して学習を安定化させ、大きな学習率を使えるようにする","explanation":"バッチ正規化（Ioffe & Szegedy, 2015年）はミニバッチ内で各層の出力を平均0・分散1に正規化し、スケールγとシフトβを学習する。内部共変量シフトを軽減し学習を安定化する。","star":"★★★"},{"no":187,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"レイヤー正規化（Layer Normalization）がバッチ正規化と異なる主な点はどれか。","choices":{"A":"バッチ方向ではなく、各サンプルのチャンネル・特徴量方向で正規化する","B":"バッチサイズに依存しない点が同じ","C":"より小さいモデルにのみ使える","D":"CNNにのみ使える"},"answer":"A","answerText":"バッチ方向ではなく、各サンプルのチャンネル・特徴量方向で正規化する","explanation":"レイヤー正規化はミニバッチ全体でなく各サンプルの隠れ層内（特徴量方向）で正規化する。バッチサイズに依存しないためRNNやTransformerで有効。","star":"★★★"},{"no":188,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"インスタンス正規化（Instance Normalization）が主に使われる分野として正しいものはどれか。","choices":{"A":"音声認識","B":"スタイル転送などの画像生成タスク","C":"テキスト分類","D":"強化学習"},"answer":"B","answerText":"スタイル転送などの画像生成タスク","explanation":"インスタンス正規化は各サンプルの各チャンネルについて空間方向（HW）で正規化する。スタイル情報（コントラスト・明度等）に影響し、スタイル転送・画像生成で広く使われる。","star":"★★★"},{"no":189,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"グループ正規化（Group Normalization）の特徴として正しいものはどれか。","choices":{"A":"バッチサイズに依存し、バッチが大きいほど効果的","B":"チャンネルをグループに分けてグループ内で正規化するため、バッチサイズが小さくても安定して動作する","C":"全チャンネルを1グループとして正規化する（レイヤー正規化と同じ）","D":"チャンネルごとに独立して正規化する（インスタンス正規化と同じ）"},"answer":"B","answerText":"チャンネルをグループに分けてグループ内で正規化するため、バッチサイズが小さくても安定して動作する","explanation":"グループ正規化（Wu & He, 2018）はチャンネルをG個のグループに分けてグループ内で正規化する。バッチサイズが小さくても安定（医療画像等でバッチが小さいケース）。","star":"★★★"},{"no":190,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"バッチ正規化が学習の安定化に寄与する主なメカニズムとして正しいものはどれか。","choices":{"A":"ランダムにニューロンを無効化する","B":"各層の出力分布を安定させ、内部共変量シフト（Internal Covariate Shift）を軽減する","C":"損失関数を変更する","D":"ハイパーパラメータを削減する"},"answer":"B","answerText":"各層の出力分布を安定させ、内部共変量シフト（Internal Covariate Shift）を軽減する","explanation":"内部共変量シフトは学習中に前の層のパラメータ更新により各層の入力分布が変化し続ける問題。バッチ正規化がこれを軽減し、より大きな学習率を使えるようになる。","star":"★★★"},{"no":191,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"バッチ正規化の推論（テスト）時の動作として正しいものはどれか。","choices":{"A":"テスト時もミニバッチ内の統計量で正規化する","B":"訓練時に蓄積した移動平均（running mean/variance）を使って正規化する","C":"テスト時はバッチ正規化をスキップする","D":"テスト時はランダムな平均・分散で正規化する"},"answer":"B","answerText":"訓練時に蓄積した移動平均（running mean/variance）を使って正規化する","explanation":"バッチ正規化のテスト時は訓練中に更新した移動平均（exponential moving average）の平均と分散を使って正規化する。これにより単一サンプルでも推論できる。","star":"★★★"},{"no":192,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"正規化層を挿入する一般的な位置として正しいものはどれか。","choices":{"A":"モデルの最初の入力層のみ","B":"畳み込み層・全結合層の後、活性化関数の前または後（実装による）","C":"出力層の後","D":"損失関数の後"},"answer":"B","answerText":"畳み込み層・全結合層の後、活性化関数の前または後（実装による）","explanation":"バッチ正規化の一般的な挿入位置は「畳み込み→BN→活性化」または「畳み込み→活性化→BN」。元論文は活性化前を提案したが、後の研究では活性化後（Pre-activation）も有効とされる。","star":"★★☆"},{"no":193,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"バッチ正規化に含まれる学習可能なパラメータはどれか。","choices":{"A":"重みWとバイアスb","B":"スケールパラメータγとシフトパラメータβ","C":"学習率と正則化係数","D":"フィルタサイズとストライド"},"answer":"B","answerText":"スケールパラメータγとシフトパラメータβ","explanation":"バッチ正規化はまず平均0・分散1に正規化し、次に学習可能なγ（スケール）・β（シフト）で変換する。γ=1・β=0なら正規化のみ。γ・βにより任意の分布を表現できる。","star":"★★★"},{"no":194,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"正規化層","question":"バッチ正規化が使えない（効果が低い）場面として正しいものはどれか。","choices":{"A":"バッチサイズが大きい場合","B":"バッチサイズが非常に小さい場合（例：1）またはオンライン学習","C":"畳み込み層の後","D":"回帰タスク"},"answer":"B","answerText":"バッチサイズが非常に小さい場合（例：1）またはオンライン学習","explanation":"バッチ正規化はバッチ内の統計量（平均・分散）を使うため、バッチサイズが小さいと統計量の推定精度が下がり効果が低い。オンライン学習（バッチサイズ1）では使えない。","star":"★★★"},{"no":195,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"プーリング層","question":"最大値プーリング（Max Pooling）の説明として正しいものはどれか。","choices":{"A":"指定領域内の平均値を出力する","B":"指定領域内の最大値を出力して最も活性化した特徴を抽出する","C":"指定領域内の中央値を出力する","D":"指定領域内のL2ノルムを出力する"},"answer":"B","answerText":"指定領域内の最大値を出力して最も活性化した特徴を抽出する","explanation":"Max Poolingは受容野内の最大値を取ることで最も強く活性化した特徴を保持する。翻訳不変性の獲得に寄与し、CNNで最も一般的に使われるプーリング手法。","star":"★★★"},{"no":196,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"プーリング層","question":"プーリング層の主な役割として正しいものはどれか。","choices":{"A":"チャンネル数を増やす","B":"特徴マップのサイズを縮小して計算量を削減し、位置に対する不変性を高める","C":"バッチサイズを調整する","D":"損失を計算する"},"answer":"B","answerText":"特徴マップのサイズを縮小して計算量を削減し、位置に対する不変性を高める","explanation":"プーリングは空間サイズを縮小して計算量・パラメータ数を削減するとともに、局所的な位置のずれに対するロバスト性（不変性）を獲得する。","star":"★★★"},{"no":197,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"プーリング層","question":"グローバルアベレージプーリング（GAP）の説明として正しいものはどれか。","choices":{"A":"特徴マップの全空間位置の平均を計算して1次元ベクトルに変換する","B":"バッチ内の全サンプルの平均を取る","C":"最大値プーリングのグローバル版","D":"チャンネルごとの平均"},"answer":"A","answerText":"特徴マップの全空間位置の平均を計算して1次元ベクトルに変換する","explanation":"GAP（Global Average Pooling）はH×W×Cの特徴マップを各チャンネルの空間平均を取りC次元ベクトルにする。全結合層の代替として使われ、パラメータ数を大幅削減。GoogLeNetで導入。","star":"★★★"},{"no":198,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"プーリング層","question":"平均値プーリング（Average Pooling）とMax Poolingの比較として正しいものはどれか。","choices":{"A":"Average Poolingはより主要な特徴を保持し、Max Poolingはより平均的な特徴を保持する","B":"Max Poolingは最も活性化した特徴を保持し、Average Poolingは全体的な平均的な特徴を保持する","C":"両者は全く同じ結果を出す","D":"Average PoolingはCNNにのみ使える"},"answer":"B","answerText":"Max Poolingは最も活性化した特徴を保持し、Average Poolingは全体的な平均的な特徴を保持する","explanation":"Max Poolingは受容野内で最も強く反応した（活性化した）特徴のみを抽出。Average Poolingは全体の平均的な情報を保持。タスクにより使い分ける（Max PoolingがCNNでは一般的）。","star":"★★★"},{"no":199,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"プーリング層","question":"プーリング層に学習可能なパラメータがない理由として正しいものはどれか。","choices":{"A":"プーリングは入力をランダムに変換するから","B":"プーリングは最大値・平均等の固定した演算を行い、学習するパラメータがない","C":"プーリングは正規化を行うから","D":"プーリングは活性化関数の一種だから"},"answer":"B","answerText":"プーリングは最大値・平均等の固定した演算を行い、学習するパラメータがない","explanation":"プーリングはmax/average等の固定演算で、学習可能なパラメータを持たない。これに対して畳み込み層は重みフィルタが学習可能パラメータ。","star":"★★★"},{"no":200,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"プーリング層","question":"不変性（Invariance）とはプーリングの文脈でどのような意味か。","choices":{"A":"モデルのパラメータが変わらない","B":"入力の小さな変動（平行移動等）があってもプーリング後の出力が大きく変わらない性質","C":"学習率が一定","D":"損失が変わらない"},"answer":"B","answerText":"入力の小さな変動（平行移動等）があってもプーリング後の出力が大きく変わらない性質","explanation":"プーリングにより入力が少し移動（平行移動）しても最大値等が変わりにくい。これがCNNの平行移動不変性（Translation Invariance）獲得に寄与する。","star":"★★★"},{"no":201,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"プーリング層","question":"Adaptive Average Poolingの主な用途として正しいものはどれか。","choices":{"A":"学習率を適応的に調整する","B":"任意のサイズの入力を固定サイズの出力に変換する","C":"チャンネル数を適応的に増やす","D":"バッチサイズを動的に変更する"},"answer":"B","answerText":"任意のサイズの入力を固定サイズの出力に変換する","explanation":"Adaptive Average Poolingは出力サイズを固定して、入力サイズに応じてプーリング領域サイズを自動調整する。異なるサイズの入力を受け入れる必要があるモデルで使われる。","star":"★★☆"},{"no":202,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"スキップ結合（残差接続）","question":"残差接続（Skip Connection）がResNetで解決しようとした問題はどれか。","choices":{"A":"バッチサイズの不足","B":"ネットワークが深くなるにつれ勾配消失・学習劣化が起こる問題","C":"データセットが小さい問題","D":"過学習"},"answer":"B","answerText":"ネットワークが深くなるにつれ勾配消失・学習劣化が起こる問題","explanation":"ResNet（He et al., 2016年）の残差接続は層をスキップして恒等写像を追加することで、深いネットワークでも勾配を直接流せる。100層以上のネットワーク学習を可能にした。","star":"★★★"},{"no":203,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"スキップ結合（残差接続）","question":"ResNetの残差ブロックの数式として正しいものはどれか。","choices":{"A":"y = F(x)","B":"y = F(x) + x（残差 F(x)と元の入力xを加算）","C":"y = F(x) × x","D":"y = F(x) - x"},"answer":"B","answerText":"y = F(x) + x（残差 F(x)と元の入力xを加算）","explanation":"ResNetの残差ブロック：y = F(x, {Wi}) + x。F(x)が学習する残差（変化量）で、恒等写像xをショートカットで加算する。勾配が恒等写像の経路で直接伝播できる。","star":"★★★"},{"no":204,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"スキップ結合（残差接続）","question":"残差接続によって勾配消失が緩和される理由として正しいものはどれか。","choices":{"A":"勾配が加算経路（x）を通じて直接逆伝播でき、0にならない","B":"残差接続がバッチ正規化を含むから","C":"フィルタサイズが小さいから","D":"学習率が自動調整されるから"},"answer":"A","answerText":"勾配が加算経路（x）を通じて直接逆伝播でき、0にならない","explanation":"残差接続（y = F(x) + x）では∂L/∂x = ∂L/∂y × (∂F/∂x + 1)。1が常に加算されるため、仮にF(x)の勾配が0でも勾配が消えない（最低でも∂L/∂yが伝播する）。","star":"★★★"},{"no":205,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"スキップ結合（残差接続）","question":"DenseNet（Dense Connection）の特徴として正しいものはどれか。","choices":{"A":"各層が直前の層のみと接続する","B":"各層が前の全ての層とスキップ接続し、特徴マップを結合（Concatenate）する","C":"残差接続で特徴マップを加算する","D":"全結合層のみで構成される"},"answer":"B","answerText":"各層が前の全ての層とスキップ接続し、特徴マップを結合（Concatenate）する","explanation":"DenseNet（Huang et al., 2017）は各層が前の全ての層からの特徴マップをチャンネル方向に結合（Concat）する。勾配消失防止・特徴の再利用・パラメータ効率化に有効。","star":"★★★"},{"no":206,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"スキップ結合（残差接続）","question":"U-Netにおけるスキップ結合の役割として正しいものはどれか。","choices":{"A":"エンコーダのみを深くする","B":"エンコーダの特徴マップをデコーダの対応する層に結合し、空間情報を保持する","C":"チャンネル数を増やす","D":"損失を直接計算する"},"answer":"B","answerText":"エンコーダの特徴マップをデコーダの対応する層に結合し、空間情報を保持する","explanation":"U-NetはEncoderの各層の特徴マップをDecoder対応層にSkip接続でConcatする。Decoderが低解像度の高レベル特徴と高解像度の低レベル特徴を組み合わせてセグメンテーションを行う。","star":"★★★"},{"no":207,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"スキップ結合（残差接続）","question":"残差接続（Residual Connection）と密結合（Dense Connection）の違いとして正しいものはどれか。","choices":{"A":"残差接続は加算で特徴を統合し、密結合はチャンネル結合（Concat）で統合する","B":"残差接続と密結合は同一の手法","C":"残差接続はCNNのみ、密結合はRNNのみ使える","D":"密結合の方がパラメータ数が常に少ない"},"answer":"A","answerText":"残差接続は加算で特徴を統合し、密結合はチャンネル結合（Concat）で統合する","explanation":"残差接続（ResNet）は恒等写像との加算（Element-wise sum）。密結合（DenseNet）は全ての前の層の出力をチャンネル方向に結合（Concatenate）。DenseNetはチャンネル数が増えていく。","star":"★★★"},{"no":208,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"リカレントニューラルネットワーク（RNN）が時系列データに適している理由として正しいものはどれか。","choices":{"A":"パラメータ数が少ないから","B":"前の時刻の隠れ状態（記憶）を保持し、系列の順序情報を考慮して処理できるから","C":"全ての時刻を同時に処理できるから","D":"画像データも扱えるから"},"answer":"B","answerText":"前の時刻の隠れ状態（記憶）を保持し、系列の順序情報を考慮して処理できるから","explanation":"RNNはh_t = f(W_h * h_{t-1} + W_x * x_t + b)で前時刻の隠れ状態h_{t-1}を記憶として保持しながら逐次処理する。系列データの時間的依存性を扱える。","star":"★★★"},{"no":209,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"LSTM（Long Short-Term Memory）がRNNの問題を解決した主な点はどれか。","choices":{"A":"計算速度が速くなった","B":"ゲート機構（入力・忘却・出力ゲート）でセルの長期的な記憶を制御し、長距離依存性を学習できる","C":"パラメータ数がゼロになった","D":"画像認識に特化した"},"answer":"B","answerText":"ゲート機構（入力・忘却・出力ゲート）でセルの長期的な記憶を制御し、長距離依存性を学習できる","explanation":"LSTM（Hochreiter & Schmidhuber, 1997）はゲート機構（入力・忘却・出力ゲート）とセル状態（長期記憶）で長距離依存性を学習。バニラRNNの勾配消失を大幅に緩和。","star":"★★★"},{"no":210,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"GRU（Gated Recurrent Unit）の特徴として正しいものはどれか。","choices":{"A":"LSTMより複雑な構造を持つ","B":"LSTMよりゲートの数が少なく（リセット・更新ゲート）シンプルだが同等の性能を示す","C":"セル状態を持つ","D":"画像処理専用のRNN変種"},"answer":"B","answerText":"LSTMよりゲートの数が少なく（リセット・更新ゲート）シンプルだが同等の性能を示す","explanation":"GRU（Cho et al., 2014）はリセットゲートと更新ゲートの2つのゲートでLSTMのセル状態とゲートを統合した簡略版。LSTMより少ないパラメータで類似した性能。","star":"★★★"},{"no":211,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"エルマンネットワーク（Elman Network）の説明として正しいものはどれか。","choices":{"A":"前時刻の隠れ状態を入力にフィードバックする基本的なRNN","B":"全ての時刻の出力をフィードバックするRNN","C":"前時刻の出力のみをフィードバックするRNN","D":"入力をフィードバックしないフィードフォワードNN"},"answer":"A","answerText":"前時刻の隠れ状態を入力にフィードバックする基本的なRNN","explanation":"エルマンネットワーク（Elman, 1990）は標準的なSimple RNN（バニラRNN）で、前時刻の隠れ状態h_{t-1}を現在の入力x_tと合わせてh_tを計算する最も基本的なRNN構造。","star":"★★★"},{"no":212,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"ジョルダンネットワーク（Jordan Network）がエルマンネットワークと異なる点はどれか。","choices":{"A":"前時刻の隠れ状態ではなく、前時刻の出力をフィードバックする","B":"深い構造を持つ","C":"LSTMと同一の構造","D":"双方向に情報を伝播させる"},"answer":"A","answerText":"前時刻の隠れ状態ではなく、前時刻の出力をフィードバックする","explanation":"ジョルダンネットワーク（Jordan, 1986）は前時刻の出力y_{t-1}を入力にフィードバックする。エルマンネットワークは前時刻の隠れ状態h_{t-1}をフィードバック。","star":"★★☆"},{"no":213,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"双方向RNN（Bidirectional RNN）の説明として正しいものはどれか。","choices":{"A":"2つのRNNが同じ方向で処理する","B":"順方向と逆方向の2つのRNNを並列に学習し、両方向のコンテキストを捉える","C":"2層に積み重ねたRNN","D":"エンコーダとデコーダを持つRNN"},"answer":"B","answerText":"順方向と逆方向の2つのRNNを並列に学習し、両方向のコンテキストを捉える","explanation":"双方向RNN（BiRNN）は順方向（過去→現在）と逆方向（未来→現在）のRNNを並列に処理して両側のコンテキストを利用する。テキスト分類・固有表現認識等のNLPタスクで有効。","star":"★★★"},{"no":214,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"教師強制（Teacher Forcing）の説明として正しいものはどれか。","choices":{"A":"訓練中に生徒のモデルを強制的にシャットダウンする","B":"RNNの訓練時に前の時刻のモデル出力でなく正解の出力を次の入力として使う学習手法","C":"強制的に学習率を下げる手法","D":"生成モデルのDecoder学習専用"},"answer":"B","answerText":"RNNの訓練時に前の時刻のモデル出力でなく正解の出力を次の入力として使う学習手法","explanation":"教師強制（Teacher Forcing）はSeq2Seq等の訓練時に、自己回帰生成時の誤差蓄積を防ぐため前の時刻の正解データを次の入力として使う。訓練を安定化させるが推論時とのギャップ（Exposure Bias）が生じる。","star":"★★★"},{"no":215,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"RNNにおいて長距離依存性の学習が困難な理由として正しいものはどれか。","choices":{"A":"時間ステップが多くなるとメモリが不足するから","B":"逆伝播（BPTT）で時間を遡るにつれ勾配が消失または爆発するから","C":"RNNは並列処理が得意なので長い系列では効率が悪いから","D":"長い系列はデータセットに入らないから"},"answer":"B","answerText":"逆伝播（BPTT）で時間を遡るにつれ勾配が消失または爆発するから","explanation":"BPTTで長い系列のRNNを学習すると、勾配が時間を遡るにつれてシグモイド等の小さな勾配が積み重なり消失（または爆発）する。LSTMのゲート機構がこれを緩和する。","star":"★★★"},{"no":216,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"ゲート機構（Gate Mechanism）がLSTMで果たす役割として正しいものはどれか。","choices":{"A":"入力データの前処理を行う","B":"情報を「忘れる・記憶する・出力する」の割合を学習可能なパラメータで制御する","C":"並列処理を可能にする","D":"損失を計算する"},"answer":"B","answerText":"情報を「忘れる・記憶する・出力する」の割合を学習可能なパラメータで制御する","explanation":"LSTMの3つのゲート（忘却・入力・出力）はシグモイド関数で0〜1の値を出力し、前の記憶を忘れる割合、新しい情報を記憶する割合、現在の状態を出力する割合を制御する。","star":"★★★"},{"no":217,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"RNNが最も適しているデータの種類として正しいものはどれか。","choices":{"A":"2D画像データ","B":"系列の順序が重要な時系列データ・テキスト・音声","C":"独立したサンプルの分類","D":"グラフデータ"},"answer":"B","answerText":"系列の順序が重要な時系列データ・テキスト・音声","explanation":"RNNは時間的な依存関係（前後の文脈・系列パターン）を持つデータに適している。株価時系列・言語モデル・音声認識等が代表的な応用例。","star":"★★★"},{"no":218,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"Seq2Seq（Sequence to Sequence）モデルの基本構造として正しいものはどれか。","choices":{"A":"1つのRNNで系列を分類するモデル","B":"エンコーダRNNが入力系列を固定長ベクトルに圧縮し、デコーダRNNが出力系列を生成する","C":"Transformerと同一の構造","D":"CNNとRNNを交互に積み重ねた構造"},"answer":"B","answerText":"エンコーダRNNが入力系列を固定長ベクトルに圧縮し、デコーダRNNが出力系列を生成する","explanation":"Seq2SeqはEncoderが入力系列（例：日本語）をコンテキストベクトルに圧縮し、DecoderがこのベクトルからTarget系列（例：英語）を自己回帰的に生成する。機械翻訳・要約に使われる。","star":"★★★"},{"no":219,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"回帰結合層（RNN）","question":"LSTMのセル状態（Cell State）の役割として正しいものはどれか。","choices":{"A":"現在の時刻の入力データ","B":"長期的な記憶情報を保持し、ゲートで選択的に更新・忘却・参照される","C":"現在の隠れ状態の別名","D":"出力層への入力"},"answer":"B","answerText":"長期的な記憶情報を保持し、ゲートで選択的に更新・忘却・参照される","explanation":"LSTMのセル状態C_tは「長期記憶ベルト」として機能。忘却ゲートで古い記憶を部分的に消去し、入力ゲートで新しい情報を追加。h_t（隠れ状態）は出力ゲートでC_tをフィルタした短期記憶。","star":"★★★"},{"no":220,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Attentionメカニズムの主な役割として正しいものはどれか。","choices":{"A":"全ての入力を均等に重み付けして処理する","B":"各位置の処理時に関連性の高い他の位置に動的に注目して情報を集約する","C":"入力を固定長ベクトルに圧縮する","D":"損失関数の計算を効率化する"},"answer":"B","answerText":"各位置の処理時に関連性の高い他の位置に動的に注目して情報を集約する","explanation":"Attentionは入力の各位置を処理する際に「どの位置が関連するか」を動的に学習して重み付けする。機械翻訳でSeq2Seqの固定長ボトルネックを解消するために提案された。","star":"★★★"},{"no":221,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Transformerにおけるクエリ（Query）・キー（Key）・バリュー（Value）の役割として正しいものはどれか。","choices":{"A":"Q・K・Vは全て同じ役割を果たす","B":"Qは検索クエリ、KはQ-K類似度でAttention重みを計算、VはAttention重みで重み付けされて出力される","C":"QはバッチID、KはチャンネルID、Vはサンプル値","D":"Q・K・VはLSTMのゲートの別名"},"answer":"B","answerText":"Qは検索クエリ、KはQ-K類似度でAttention重みを計算、VはAttention重みで重み付けされて出力される","explanation":"Scaled Dot-Product Attention：Attention(Q,K,V) = softmax(QK^T/√d_k)V。Q（クエリ）とK（キー）のドット積で類似度を計算し、ソフトマックスで重みを得てV（バリュー）を集約する。","star":"★★★"},{"no":222,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Self-Attention（自己注意機構）の特徴として正しいものはどれか。","choices":{"A":"入力系列の各位置が外部の参照系列に注目する","B":"入力系列の各位置が同じ入力系列の他の全位置との関連性を学習する","C":"入力と出力の間の関連性を学習する","D":"エンコーダとデコーダ間のみで機能する"},"answer":"B","answerText":"入力系列の各位置が同じ入力系列の他の全位置との関連性を学習する","explanation":"Self-Attentionは同一の系列内でQ・K・Vを全て同じ入力から生成する。各位置が系列内の他の全位置との関連性を学習できる。Transformerの基礎。","star":"★★★"},{"no":223,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Multi-Head Attention（多頭注意機構）の利点として正しいものはどれか。","choices":{"A":"1つのAttentionより常に計算が速い","B":"複数の「注目の仕方」（ヘッド）を並列に学習して異なる意味的関係を捉えられる","C":"ヘッド数は常に1に固定される","D":"バッチサイズを増やせる"},"answer":"B","answerText":"複数の「注目の仕方」（ヘッド）を並列に学習して異なる意味的関係を捉えられる","explanation":"Multi-Head AttentionはAttentionをh個のヘッドで並列に計算し、それぞれが異なる部分空間での関係を学習する。単一のAttentionより豊かな表現が可能。","star":"★★★"},{"no":224,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Transformer（「Attention is All You Need」, Vaswani et al. 2017）の革新的な点として正しいものはどれか。","choices":{"A":"RNNとAttentionを組み合わせた","B":"RNNやCNNを使わず、Attentionのみで系列を並列処理し長距離依存性を効率的に学習できる","C":"畳み込みをAttentionに置き換えた画像専用モデル","D":"強化学習とAttentionを組み合わせた"},"answer":"B","answerText":"RNNやCNNを使わず、Attentionのみで系列を並列処理し長距離依存性を効率的に学習できる","explanation":"Transformerは「Attention is All You Need」で提案。Self-Attentionのみで系列全体を並列処理できるためRNNの逐次処理ボトルネックを解消。並列計算によりGPU効率が高く、BERTやGPTの基盤。","star":"★★★"},{"no":225,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"位置エンコーディング（Positional Encoding）がTransformerに必要な理由として正しいものはどれか。","choices":{"A":"Transformerはバッチを並列処理するから","B":"Self-Attentionは位置情報を持たないため、各トークンの系列中の位置情報を付与するため","C":"チャンネル情報を追加するため","D":"学習率を調整するため"},"answer":"B","answerText":"Self-Attentionは位置情報を持たないため、各トークンの系列中の位置情報を付与するため","explanation":"Self-Attentionは各位置を同等に扱い順序情報を持たない（順列不変）。位置エンコーディング（正弦波関数や学習可能な埋め込み）を埋め込みに加算して系列順序情報を与える。","star":"★★★"},{"no":226,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Source-Target Attention（Encoder-Decoder Attention）の説明として正しいものはどれか。","choices":{"A":"エンコーダ内で入力系列が自分自身に注目する","B":"デコーダがエンコーダの出力（Key・Value）にクエリを使って注目する","C":"デコーダ内で出力が自分自身に注目する","D":"入力と出力の損失を計算するメカニズム"},"answer":"B","answerText":"デコーダがエンコーダの出力（Key・Value）にクエリを使って注目する","explanation":"Source-Target AttentionはDecoderのQ（クエリ）とEncoder出力のK・VでAttentionを計算する。Decoderが入力系列の各位置に動的に注目して翻訳・生成を行う。","star":"★★★"},{"no":227,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Scaled Dot-Product Attentionでスケーリング（√d_k で除算）する理由として正しいものはどれか。","choices":{"A":"計算量を増やすため","B":"d_kが大きい場合にドット積が大きくなりすぎてSoftmaxが極端な値になるのを防ぐため","C":"バッチサイズを調整するため","D":"学習率を調整するため"},"answer":"B","answerText":"d_kが大きい場合にドット積が大きくなりすぎてSoftmaxが極端な値になるのを防ぐため","explanation":"QK^Tのドット積はd_k（次元数）が大きいほど大きくなる傾向。1/√d_kでスケーリングしないとSoftmaxの出力が0か1に極端になり、勾配消失が起きる。","star":"★★★"},{"no":228,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"Vision Transformer（ViT）の説明として正しいものはどれか。","choices":{"A":"CNNとRNNを組み合わせた画像認識モデル","B":"画像をパッチに分割してシーケンスとして扱い、Transformerで処理する画像認識モデル","C":"画像生成のための敵対的生成ネットワーク","D":"強化学習で画像を処理するモデル"},"answer":"B","answerText":"画像をパッチに分割してシーケンスとして扱い、Transformerで処理する画像認識モデル","explanation":"ViT（Dosovitskiy et al., 2020）は画像を16×16等のパッチに分割してトークンとして線形埋め込みし、Transformerで処理する。大規模データで学習するとCNNと同等以上の性能を示す。","star":"★★★"},{"no":229,"chapter":"第4章","chapterTheme":"DLの要素技術","section":"Attention・Transformer","question":"BERTがGPTと異なる主な特徴はどれか。","choices":{"A":"BERTは自己回帰（次トークン予測）モデル","B":"BERTはマスクドLM（双方向Encoder）で文脈の両方向からトークンを理解する","C":"BERTはデコーダのみのTransformer","D":"BERTはCNNを使用"},"answer":"B","answerText":"BERTはマスクドLM（双方向Encoder）で文脈の両方向からトークンを理解する","explanation":"BERTはTransformerのEncoderのみを使用。双方向コンテキスト（左右両方）でマスクされたトークンを予測するMLMで事前学習。GPTはDecoderのみで一方向（次トークン予測）。","star":"★★★"},{"no":230,"chapter":"第5章","chapterTheme":"DLの応用例","section":"オートエンコーダ","question":"オートエンコーダ（Autoencoder）の基本構造として正しいものはどれか。","choices":{"A":"入力と出力が異なるエンコーダのみの構造","B":"入力を圧縮（エンコード）して潜在表現を得て、元の入力に再構成（デコード）する構造","C":"2つのNNが互いに競合する構造","D":"教師ラベルを予測するエンコーダ"},"answer":"B","answerText":"入力を圧縮（エンコード）して潜在表現を得て、元の入力に再構成（デコード）する構造","explanation":"オートエンコーダはEncoderが入力を潜在変数z（ボトルネック）に圧縮し、DecoderがzからXを再構成する。再構成誤差を最小化して次元削減・特徴抽出・事前学習に使う。","star":"★★★"},{"no":231,"chapter":"第5章","chapterTheme":"DLの応用例","section":"オートエンコーダ","question":"変分オートエンコーダ（VAE）がオートエンコーダと異なる主な点はどれか。","choices":{"A":"VAEは教師あり学習で、AEは教師なし学習","B":"VAEは潜在空間を確率分布（正規分布等）として学習し、データ生成が可能","C":"VAEはデコーダを持たない","D":"VAEはCNNのみで構成される"},"answer":"B","answerText":"VAEは潜在空間を確率分布（正規分布等）として学習し、データ生成が可能","explanation":"VAEは潜在変数zを確率分布（μ・σ）としてモデル化し、再パラメータ化トリックで学習する。KLダイバージェンス項で潜在空間を正規化し、新しいzをサンプリングして新規データを生成できる。","star":"★★★"},{"no":232,"chapter":"第5章","chapterTheme":"DLの応用例","section":"オートエンコーダ","question":"積層オートエンコーダ（Stacked Autoencoder）の説明として正しいものはどれか。","choices":{"A":"1層のオートエンコーダ","B":"複数のオートエンコーダを積み重ねて段階的に特徴を学習する深い構造","C":"GANのDiscriminatorのみを積み重ねた構造","D":"CNNの全結合層のみを積み重ねた構造"},"answer":"B","answerText":"複数のオートエンコーダを積み重ねて段階的に特徴を学習する深い構造","explanation":"積層オートエンコーダは複数のオートエンコーダを層状に積み重ね、各層を貪欲に事前学習してから全体を微調整する。深層NNの効率的な事前学習法として使われた。","star":"★★★"},{"no":233,"chapter":"第5章","chapterTheme":"DLの応用例","section":"オートエンコーダ","question":"VQ-VAE（Vector Quantized VAE）の特徴として正しいものはどれか。","choices":{"A":"連続的な潜在変数を使う通常のVAE","B":"離散的な潜在表現（コードブック）を学習して高品質な画像・音声生成を実現する","C":"教師あり学習による分類モデル","D":"GANの一種"},"answer":"B","answerText":"離散的な潜在表現（コードブック）を学習して高品質な画像・音声生成を実現する","explanation":"VQ-VAEは連続的な潜在変数の代わりに離散コードブックを使い、最近傍のコードに量子化する。DALL-Eの初版やAudio圧縮で使われた。","star":"★★☆"},{"no":234,"chapter":"第5章","chapterTheme":"DLの応用例","section":"オートエンコーダ","question":"β-VAE の特徴として正しいものはどれか。","choices":{"A":"通常のVAEにβ=1の制約を加えたもの","B":"KLダイバージェンス項にβ>1のスケールをかけて潜在空間の解きほぐし（disentanglement）を強化したVAE","C":"βがReLUの代替活性化関数","D":"バッチサイズをβで制御するVAE"},"answer":"B","answerText":"KLダイバージェンス項にβ>1のスケールをかけて潜在空間の解きほぐし（disentanglement）を強化したVAE","explanation":"β-VAEはKL損失にβ（>1）を掛けることで潜在変数の独立性（解きほぐし）を強制。潜在変数の各次元が意味のある独立した特徴を表しやすくなる。","star":"★★☆"},{"no":235,"chapter":"第5章","chapterTheme":"DLの応用例","section":"オートエンコーダ","question":"次元削減としてのオートエンコーダとPCAの違いとして正しいものはどれか。","choices":{"A":"オートエンコーダは線形変換、PCAは非線形変換","B":"オートエンコーダは非線形変換が可能でより複雑なデータ構造を捉えられる","C":"両者は常に同じ結果を出す","D":"PCAの方が常に高精度"},"answer":"B","answerText":"オートエンコーダは非線形変換が可能でより複雑なデータ構造を捉えられる","explanation":"PCAは線形変換による次元削減。オートエンコーダは活性化関数で非線形変換が可能なため、複雑な多様体構造も捉えられる。線形AEはPCAと等価。","star":"★★★"},{"no":236,"chapter":"第5章","chapterTheme":"DLの応用例","section":"オートエンコーダ","question":"オートエンコーダが事前学習（Pre-training）に使われる理由として正しいものはどれか。","choices":{"A":"ラベルなしデータで意味ある特徴表現を学習し、後段の教師あり学習の性能を向上させるため","B":"オートエンコーダは常に教師あり学習より高精度だから","C":"事前学習はパラメータを全てゼロに初期化するから","D":"オートエンコーダはデータ拡張の一種だから"},"answer":"A","answerText":"ラベルなしデータで意味ある特徴表現を学習し、後段の教師あり学習の性能を向上させるため","explanation":"オートエンコーダは大量のラベルなしデータで自己教師的に特徴を学習できる。得られた重みを初期値として教師あり学習を行うと少量ラベルデータでも高精度が得られやすい（転移学習の一形態）。","star":"★★★"},{"no":237,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ拡張","question":"データ拡張（Data Augmentation）の主な目的として正しいものはどれか。","choices":{"A":"訓練データの正解ラベルを変更する","B":"訓練データの多様性を増やして過学習を防ぎ汎化性能を高める","C":"テストデータを増やす","D":"モデルのパラメータを増やす"},"answer":"B","answerText":"訓練データの多様性を増やして過学習を防ぎ汎化性能を高める","explanation":"データ拡張は元の訓練データに変換（回転・反転・切り取り・色変換等）を加えて多様なサンプルを生成。過学習を防ぎ汎化性能を向上させる。CNNの学習で標準的に使われる。","star":"★★★"},{"no":238,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ拡張","question":"画像分類に一般的に使われるデータ拡張手法として適切でないものはどれか。","choices":{"A":"ランダム水平反転（Random Flip）","B":"ランダムクロップ（Crop）","C":"正解ラベルの変更","D":"輝度・コントラストのランダム変化（Brightness, Contrast）"},"answer":"C","answerText":"正解ラベルの変更","explanation":"正解ラベルの変更はデータ拡張でなく誤ったアノテーション。反転・クロップ・輝度変化はいずれも入力画像の変換のみで正解ラベルは保持する正当なデータ拡張。","star":"★★★"},{"no":239,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ拡張","question":"Mixup（ミックスアップ）の説明として正しいものはどれか。","choices":{"A":"同じクラスのサンプルのみを混合する手法","B":"2つのサンプルとラベルを線形補間して仮想的なサンプルを作る手法","C":"画像の一部をランダムに消去する手法","D":"複数の画像をグリッド状に並べる手法"},"answer":"B","answerText":"2つのサンプルとラベルを線形補間して仮想的なサンプルを作る手法","explanation":"Mixup: x̃ = λx_i + (1-λ)x_j, ỹ = λy_i + (1-λ)y_j（λ∈[0,1]はBeta分布からサンプル）。2つのサンプルを内挿した仮想サンプルで学習し汎化性能を向上させる。","star":"★★★"},{"no":240,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ拡張","question":"CutMix の説明として正しいものはどれか。","choices":{"A":"画像の明度をランダムに変える","B":"ある画像の矩形領域を別の画像の対応領域で置き換え、ラベルも面積比で混合する手法","C":"画像をランダムに回転させる","D":"画像の彩度を変更する"},"answer":"B","answerText":"ある画像の矩形領域を別の画像の対応領域で置き換え、ラベルも面積比で混合する手法","explanation":"CutMix（Yun et al.）はMixupの亜種。画像の矩形領域を別の画像からカットしてペーストし、ラベルを切り取り面積比率で混合。Mixupより局所的なパターン学習に有効。","star":"★★★"},{"no":241,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ拡張","question":"Cutout（ランダム消去）の説明として正しいものはどれか。","choices":{"A":"画像の一部を別の画像に置き換える","B":"画像のランダムな矩形領域を0（黒）等で消去してモデルの汎化性能を高める","C":"画像の色を反転させる","D":"画像を回転させる"},"answer":"B","answerText":"画像のランダムな矩形領域を0（黒）等で消去してモデルの汎化性能を高める","explanation":"Cutout（DeVries & Taylor, 2017）は画像のランダムな矩形領域をゼロ等で塗りつぶして学習する。オクルージョン（部分的隠れ）に対するロバスト性を向上させる。","star":"★★★"},{"no":242,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ拡張","question":"NLPにおけるデータ拡張手法「paraphrasing（言い換え）」の説明として正しいものはどれか。","choices":{"A":"同義語に置き換えるシンプルな語彙置換","B":"元の意味を保ちながら文を言い換えてテキストの多様性を増やす手法","C":"翻訳を利用しないデータ拡張","D":"音声データのみに使える"},"answer":"B","answerText":"元の意味を保ちながら文を言い換えてテキストの多様性を増やす手法","explanation":"NLPのデータ拡張にはsynonym replacement（同義語置換）・back-translation（往復翻訳）・paraphrasing（言い換え）等がある。元の意味を保ちつつ表面的な表現を変えてデータを増やす。","star":"★★★"},{"no":243,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ拡張","question":"RandAugmentの説明として正しいものはどれか。","choices":{"A":"ランダムに正解ラベルを変更する手法","B":"事前に選んだ変換プールからランダムにN種の変換を選びMの強度で適用するデータ拡張自動化手法","C":"全ての変換を同時に適用する手法","D":"NNで最適な変換を学習する手法"},"answer":"B","answerText":"事前に選んだ変換プールからランダムにN種の変換を選びMの強度で適用するデータ拡張自動化手法","explanation":"RandAugment（Cubuk et al., 2020）は変換プール（回転・色変換等）からランダムにN個選び強度Mで適用する。AutoAugmentより単純なパラメータで高い精度を実現。","star":"★★☆"},{"no":244,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"AlexNet（2012年）がILSVRCで示した意義として正しいものはどれか。","choices":{"A":"CNNを初めて発明した","B":"ReLU・ドロップアウト・GPU学習を組み合わせたCNNがSVMなどを大幅に上回る精度を示した","C":"画像生成の先駆け","D":"音声認識に特化したモデル"},"answer":"B","answerText":"ReLU・ドロップアウト・GPU学習を組み合わせたCNNがSVMなどを大幅に上回る精度を示した","explanation":"AlexNet（Krizhevsky et al., 2012）はGPUを使ってReLU・ドロップアウト・データ拡張を活用し、ILSVRC 2012でエラー率を大幅に低減。深層学習ブームの起点となった。","star":"★★★"},{"no":245,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"VGG（VGGNet）の特徴として正しいものはどれか。","choices":{"A":"複雑なマルチスケール構造を持つ","B":"3×3フィルタのみを使った深くシンプルな構造で、ネットワークの深さが精度に重要であることを示した","C":"1×1畳み込みを多用する","D":"スキップ接続を使う"},"answer":"B","answerText":"3×3フィルタのみを使った深くシンプルな構造で、ネットワークの深さが精度に重要であることを示した","explanation":"VGG（Simonyan & Zisserman, 2014）は3×3フィルタのみを使い16〜19層の深いシンプルな構造でILSVRCで高精度を達成。深さの重要性を示した。","star":"★★★"},{"no":246,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"GoogLeNet（Inception V1）の主な革新として正しいものはどれか。","choices":{"A":"残差接続（Skip Connection）","B":"Inceptionモジュールで複数サイズのフィルタを並列に適用し、1×1畳み込みで計算量を削減","C":"深さ方向分離畳み込み","D":"Attentionの導入"},"answer":"B","answerText":"Inceptionモジュールで複数サイズのフィルタを並列に適用し、1×1畳み込みで計算量を削減","explanation":"GoogLeNet（2014）のInceptionモジュールは1×1・3×3・5×5フィルタとMaxPoolingを並列に処理し、1×1畳み込みでボトルネック（計算量削減）を実現。22層ながら高効率。","star":"★★★"},{"no":247,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"物体検出（Object Detection）のタスクの説明として正しいものはどれか。","choices":{"A":"画像全体のカテゴリを1つ予測する","B":"画像内の物体の位置（バウンディングボックス）とクラスを同時に予測する","C":"各ピクセルにクラスを割り当てる","D":"物体の3D形状を復元する"},"answer":"B","answerText":"画像内の物体の位置（バウンディングボックス）とクラスを同時に予測する","explanation":"物体検出はClass分類（何か）+Localization（バウンディングボックス：どこか）を同時に行う。YOLO・SSD・Faster R-CNNが代表手法。","star":"★★★"},{"no":248,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"YOLOの特徴として正しいものはどれか。","choices":{"A":"2段階で物体を検出するため精度が高い","B":"画像を一度に処理するEnd-to-Endの1段階検出器でリアルタイム処理が可能","C":"セグメンテーション専用モデル","D":"畳み込みを使わないモデル"},"answer":"B","answerText":"画像を一度に処理するEnd-to-Endの1段階検出器でリアルタイム処理が可能","explanation":"YOLO（You Only Look Once）は画像全体をグリッドに分割して1回のフォワードパスで全物体を検出するEnd-to-Endの1段階検出器。Faster R-CNNより速くリアルタイム用途に適する。","star":"★★★"},{"no":249,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"Faster R-CNNの「Region Proposal Network（RPN）」の役割として正しいものはどれか。","choices":{"A":"最終的なクラス分類を行う","B":"物体がある可能性の高い候補領域（Region of Interest）を効率的に提案する","C":"特徴マップを生成する","D":"バウンディングボックスの精度を向上させる"},"answer":"B","answerText":"物体がある可能性の高い候補領域（Region of Interest）を効率的に提案する","explanation":"Faster R-CNNのRPNは共有CNN特徴マップ上でアンカーボックスを使って物体候補領域を提案する学習可能なネットワーク。従来のSelective SearchをNNに置き換えて高速化した。","star":"★★★"},{"no":250,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"セマンティックセグメンテーションの説明として正しいものはどれか。","choices":{"A":"画像内の物体の境界ボックスを検出する","B":"各ピクセルを同一クラスとして分類するが、同クラスの異なるインスタンスは区別しない","C":"各ピクセルを個々の物体インスタンスとして区別して分類する","D":"画像全体を1クラスに分類する"},"answer":"B","answerText":"各ピクセルを同一クラスとして分類するが、同クラスの異なるインスタンスは区別しない","explanation":"セマンティックセグメンテーションは全ピクセルにクラスラベル（道路・建物・人等）を割り当てるが、同じ「人」クラスでも個々の人物は区別しない（cf. インスタンスセグメンテーション）。","star":"★★★"},{"no":251,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"インスタンスセグメンテーションの説明として正しいものはどれか。","choices":{"A":"全ピクセルに同じクラスラベルを割り当てる","B":"同一クラスでも各物体インスタンスを個別に区別してマスクを生成する","C":"物体の境界ボックスのみを検出する","D":"画像を複数のスーパーピクセルに分割する"},"answer":"B","answerText":"同一クラスでも各物体インスタンスを個別に区別してマスクを生成する","explanation":"インスタンスセグメンテーションは各物体インスタンスを個別に識別してピクセル単位のマスクを生成する。Mask R-CNNが代表モデル。セマンティックセグメンテーションより難しい。","star":"★★★"},{"no":252,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"姿勢推定（Pose Estimation）の説明として正しいものはどれか。","choices":{"A":"カメラの位置・向きを推定する","B":"画像・動画から人物の関節位置（骨格キーポイント）を推定する","C":"人物の表情を認識する","D":"物体の重量を推定する"},"answer":"B","answerText":"画像・動画から人物の関節位置（骨格キーポイント）を推定する","explanation":"姿勢推定は画像・動画から人物の肩・肘・手首・腰・膝・足首等の関節位置（キーポイント）を検出して骨格を推定。スポーツ分析・リハビリ・VR等に応用される。","star":"★★☆"},{"no":253,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"EfficientNetの主な特徴として正しいものはどれか。","choices":{"A":"最もパラメータ数が多いCNN","B":"ネットワークの幅・深さ・解像度を複合スケーリングして精度と効率を最適化したCNN","C":"残差接続のみで構成される","D":"音声認識専用モデル"},"answer":"B","answerText":"ネットワークの幅・深さ・解像度を複合スケーリングして精度と効率を最適化したCNN","explanation":"EfficientNet（Tan & Le, 2019）はNASで見つけたベースモデルを幅・深さ・入力解像度の複合スケーリング（φによる均一スケーリング）で拡張。高精度かつパラメータ効率が高い。","star":"★★★"},{"no":254,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"FCN（Fully Convolutional Network）の特徴として正しいものはどれか。","choices":{"A":"全結合層を含む従来の分類モデル","B":"全結合層を1×1畳み込みに置き換えて任意サイズの入力を処理可能にしたセグメンテーション向けモデル","C":"時系列専用のCNN","D":"GAN専用のネットワーク"},"answer":"B","answerText":"全結合層を1×1畳み込みに置き換えて任意サイズの入力を処理可能にしたセグメンテーション向けモデル","explanation":"FCN（Long et al., 2015）は全結合層を1×1畳み込みに置き換え、Upsampling（転置畳み込み等）で入力と同解像度の予測マップを出力するEnd-to-Endなセグメンテーションモデル。","star":"★★★"},{"no":255,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"SSD（Single Shot MultiBox Detector）の特徴として正しいものはどれか。","choices":{"A":"2段階の検出パイプラインを使う","B":"複数スケールの特徴マップでアンカーボックスを使い1段階で物体検出する","C":"RNNを使って時系列で物体を検出する","D":"セグメンテーション専用モデル"},"answer":"B","answerText":"複数スケールの特徴マップでアンカーボックスを使い1段階で物体検出する","explanation":"SSD（Liu et al., 2016）はVGG等のベースネットワークに複数スケールの予測層を追加し、1段階で物体を検出するリアルタイム対応の検出器。YOLOより精度が高く、小物体にも対応。","star":"★★★"},{"no":256,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"MobileNetの特徴として正しいものはどれか。","choices":{"A":"最も高い精度を誇るCNNアーキテクチャ","B":"Depthwise Separable Convolutionで計算量を削減し、モバイル・エッジデバイスに適した軽量CNN","C":"量子化専用のモデル","D":"音声認識専用のCNN"},"answer":"B","answerText":"Depthwise Separable Convolutionで計算量を削減し、モバイル・エッジデバイスに適した軽量CNN","explanation":"MobileNet（Howard et al., 2017）はDepthwise Separable Convolutionで通常の畳み込みより計算量を約8〜9倍削減。スマートフォン等のリソース制約環境での画像認識に使われる。","star":"★★★"},{"no":257,"chapter":"第5章","chapterTheme":"DLの応用例","section":"画像認識","question":"NAS（Neural Architecture Search）の説明として正しいものはどれか。","choices":{"A":"手動でNNの設計を行う","B":"NNのアーキテクチャを自動的に探索する手法（強化学習・進化的アルゴリズム等を使用）","C":"データセットを自動で収集する","D":"ハイパーパラメータのみを最適化する"},"answer":"B","answerText":"NNのアーキテクチャを自動的に探索する手法（強化学習・進化的アルゴリズム等を使用）","explanation":"NASは人手によるアーキテクチャ設計を自動化する手法。強化学習・進化的アルゴリズム・勾配ベースの手法（DARTS等）でアーキテクチャを探索する。MnasNet・EfficientNetがNASで設計された。","star":"★★★"},{"no":258,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"形態素解析（Morphological Analysis）の説明として正しいものはどれか。","choices":{"A":"文の意味を理解する処理","B":"文を意味を持つ最小単位（形態素・トークン）に分割する処理","C":"文書をトピックに分類する処理","D":"感情の正負を判定する処理"},"answer":"B","answerText":"文を意味を持つ最小単位（形態素・トークン）に分割する処理","explanation":"形態素解析は文を最小の意味単位（形態素）に分割し、品詞タグを付与する処理。日本語NLPではMeCab・SudachiがよくつかわKarma。英語ではスペース区切りで対応できることが多い。","star":"★★★"},{"no":259,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"BoW（Bag-of-Words）の説明として正しいものはどれか。","choices":{"A":"単語の出現順序や文脈を考慮して文を表現する手法","B":"文書内の単語の出現頻度ベクトルで文書を表現する（語順は無視）","C":"単語の埋め込みベクトルを使う手法","D":"センテンスを文法規則で解析する手法"},"answer":"B","answerText":"文書内の単語の出現頻度ベクトルで文書を表現する（語順は無視）","explanation":"BoWは文書を単語の出現頻度ベクトルで表現する手法。語順・文脈・意味は無視される。シンプルで実装が容易だが、語順や意味が失われる。TF-IDFと組み合わせることが多い。","star":"★★★"},{"no":260,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"word2vec（ワード・トゥー・ベック）の説明として正しいものはどれか。","choices":{"A":"単語を出現頻度で表現する手法","B":"分散表現（単語埋め込み）：単語を意味的に類似したものが近い空間に配置された低次元ベクトルに変換する手法","C":"文書をランダムなベクトルに変換する手法","D":"文書全体を1つの数値で表現する手法"},"answer":"B","answerText":"分散表現（単語埋め込み）：単語を意味的に類似したものが近い空間に配置された低次元ベクトルに変換する手法","explanation":"word2vec（Mikolov et al., 2013）はCBOW・Skip-gramで単語を意味を保った低次元ベクトル（分散表現）に変換。「王 - 男 + 女 ≈ 女王」のような演算が可能。","star":"★★★"},{"no":261,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"TF-IDFの説明として正しいものはどれか。","choices":{"A":"単語の出現頻度だけで文書を重み付けする","B":"文書内の単語の頻度（TF）と全文書での珍しさ（IDF）を組み合わせた重み付け手法","C":"単語の感情スコアを計算する手法","D":"文書の構文解析を行う"},"answer":"B","answerText":"文書内の単語の頻度（TF）と全文書での珍しさ（IDF）を組み合わせた重み付け手法","explanation":"TF-IDF = TF(t,d) × IDF(t)。IDF = log(N/df(t))で各文書で頻出する一般的な単語（「の」等）のスコアを下げ、文書固有の重要な単語を強調する。","star":"★★★"},{"no":262,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"BERT（Bidirectional Encoder Representations from Transformers）の主な特徴はどれか。","choices":{"A":"左から右への一方向言語モデル","B":"マスクされたトークンを予測するMLMで双方向コンテキストを学習するTransformerエンコーダ","C":"画像と言語を組み合わせたマルチモーダルモデル","D":"強化学習で学習する言語モデル"},"answer":"B","answerText":"マスクされたトークンを予測するMLMで双方向コンテキストを学習するTransformerエンコーダ","explanation":"BERT（Devlin et al., 2018）はTransformerのEncoderを使い、Masked Language Model（MLM）と次文予測（NSP）で双方向コンテキストを事前学習。下流タスクのファインチューニングで最高精度を達成。","star":"★★★"},{"no":263,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"GPT系モデル（GPT-n）の説明として正しいものはどれか。","choices":{"A":"双方向Transformerエンコーダで事前学習するモデル","B":"左から右への自己回帰的次トークン予測で事前学習するTransformerデコーダ","C":"CNNとRNNを組み合わせた言語モデル","D":"教師あり学習のみで学習する分類モデル"},"answer":"B","answerText":"左から右への自己回帰的次トークン予測で事前学習するTransformerデコーダ","explanation":"GPTシリーズはTransformerのDecoderのみを使い、前のトークンから次のトークンを予測する自己回帰的な言語モデル。GPT-3以降の大規模化でFew-shot学習能力が向上。","star":"★★★"},{"no":264,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"大規模言語モデル（LLM）の説明として正しいものはどれか。","choices":{"A":"100万パラメータ以下の言語モデル","B":"数十億〜数千億パラメータ規模のTransformerベースの言語モデルで、Few-shotや指示に従う能力を持つ","C":"音声認識専用のモデル","D":"CNNベースの言語モデル"},"answer":"B","answerText":"数十億〜数千億パラメータ規模のTransformerベースの言語モデルで、Few-shotや指示に従う能力を持つ","explanation":"LLM（Large Language Model）はGPT-4・Claude・Gemini等のような大規模なTransformerベースのモデル。スケーリング則で能力が向上し、指示追従・推論・コード生成等の能力を持つ。","star":"★★★"},{"no":265,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"感情分析（Sentiment Analysis）の説明として正しいものはどれか。","choices":{"A":"テキストから固有表現（人名・地名等）を抽出する","B":"テキストの感情的な極性（肯定的・否定的・中立）や感情（喜び・怒り等）を分析する","C":"文書をカテゴリに分類する","D":"テキストを別の言語に翻訳する"},"answer":"B","answerText":"テキストの感情的な極性（肯定的・否定的・中立）や感情（喜び・怒り等）を分析する","explanation":"感情分析はSNSレビュー・カスタマーフィードバック等のテキストから感情の極性を判定する。BERTのファインチューニングが現在の主流手法。","star":"★★★"},{"no":266,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"n-gramの説明として正しいものはどれか。","choices":{"A":"1つの単語のみを見る言語モデル","B":"連続するn個のトークン（文字・単語）のシーケンスを単位とする統計的言語モデル","C":"NNで単語をn次元ベクトルに変換する手法","D":"文書をn個のトピックに分類する手法"},"answer":"B","answerText":"連続するn個のトークン（文字・単語）のシーケンスを単位とする統計的言語モデル","explanation":"n-gramはn個の連続した単語（または文字）の列。bi-gram（n=2）ではP(w_t|w_{t-1})を推定する。統計的言語モデルの基本。spellチェック・機械翻訳の評価（BLEU）に使われる。","star":"★★★"},{"no":267,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"ELMo（Embeddings from Language Models）の革新的な点として正しいものはどれか。","choices":{"A":"単語ベクトルが文脈に依存しない固定表現","B":"双方向LSTMで前後の文脈に依存した動的な単語表現を学習する","C":"Transformerを使った言語モデル","D":"画像と言語を組み合わせたモデル"},"answer":"B","answerText":"双方向LSTMで前後の文脈に依存した動的な単語表現を学習する","explanation":"ELMo（Peters et al., 2018）は双方向LSTMで前後のコンテキストを考慮した動的な単語表現を生成。word2vecは文脈不変の固定ベクトルだが、ELMoは文脈により表現が変化する。","star":"★★★"},{"no":268,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"GLUEベンチマークの説明として正しいものはどれか。","choices":{"A":"画像認識モデルの評価ベンチマーク","B":"NLPモデルを文章類似度・感情分析・質問応答等の複数タスクで評価する統合ベンチマーク","C":"音声認識の評価指標","D":"強化学習エージェントの評価"},"answer":"B","answerText":"NLPモデルを文章類似度・感情分析・質問応答等の複数タスクで評価する統合ベンチマーク","explanation":"GLUE（General Language Understanding Evaluation）はNLPモデルを9つの自然言語理解タスク（MNLI・QQP・SST-2等）で総合評価するベンチマーク。BERTがGLUEで最高スコアを記録し注目を集めた。","star":"★★★"},{"no":269,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"ChatGPTが広く使われるようになった背景技術として最も重要なものはどれか。","choices":{"A":"CNNとSVMの組み合わせ","B":"大規模Transformerの事前学習 + SFT（教師あり微調整） + RLHF（人間フィードバックからの強化学習）","C":"k-meansクラスタリング","D":"エキスパートシステム"},"answer":"B","answerText":"大規模Transformerの事前学習 + SFT（教師あり微調整） + RLHF（人間フィードバックからの強化学習）","explanation":"ChatGPT（OpenAI）はGPT-4をベースに、人間の好みのデータでSFT（Supervised Fine-Tuning）とRLHF（Reinforcement Learning from Human Feedback）を組み合わせたInstructGPTの手法で有害でない有益な応答を学習した。","star":"★★★"},{"no":270,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"機械翻訳の評価指標BLEUの説明として正しいものはどれか。","choices":{"A":"翻訳の感情を評価する指標","B":"機械翻訳出力と参照翻訳のn-gramの一致度を評価する指標","C":"翻訳速度を評価する指標","D":"翻訳モデルのパラメータ数を評価する指標"},"answer":"B","answerText":"機械翻訳出力と参照翻訳のn-gramの一致度を評価する指標","explanation":"BLEU（Bilingual Evaluation Understudy）は機械翻訳の出力と人間の参照翻訳のn-gram精度の幾何平均と簡潔さペナルティから計算するスコア。0〜1（1が完全一致）。","star":"★★★"},{"no":271,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"fastTextがword2vecと異なる主な特徴として正しいものはどれか。","choices":{"A":"fastTextはGPU不要で学習できる","B":"fastTextはサブワード（文字n-gram）を使うため、未知語や形態学的に豊富な言語に対応できる","C":"fastTextはBERTと同じTransformerベース","D":"fastTextは教師あり学習のみ対応"},"answer":"B","answerText":"fastTextはサブワード（文字n-gram）を使うため、未知語や形態学的に豊富な言語に対応できる","explanation":"fastText（Bojanowski et al., 2017）はword2vecをサブワード（文字n-gram）に拡張。「playing」=「play」+「ying」+...のようにサブワードの合計で単語ベクトルを表現し、未知語・接頭辞・接尾辞を考慮できる。","star":"★★★"},{"no":272,"chapter":"第5章","chapterTheme":"DLの応用例","section":"自然言語処理","question":"統計的機械翻訳（SMT）とニューラル機械翻訳（NMT）の違いとして正しいものはどれか。","choices":{"A":"SMTはNMTより常に精度が高い","B":"SMTは対訳コーパスの統計モデルに基づき、NMTはEnd-to-Endニューラルネットワークで翻訳する","C":"SMTはDLを使い、NMTはルールベース","D":"両者は完全に同じ手法"},"answer":"B","answerText":"SMTは対訳コーパスの統計モデルに基づき、NMTはEnd-to-Endニューラルネットワークで翻訳する","explanation":"SMT（Statistical MT）はフレーズ翻訳モデル＋言語モデル等の統計的モデルの組み合わせ。NMT（Neural MT）はSeq2Seq+Attention→Transformerへと発展。現在はNMTが主流。","star":"★★★"},{"no":273,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"音声認識（ASR）の主なタスクの説明として正しいものはどれか。","choices":{"A":"テキストから音声を合成する","B":"音声波形をテキスト（書き起こし）に変換する","C":"感情を音声で表現する","D":"話者の身元を認識する"},"answer":"B","answerText":"音声波形をテキスト（書き起こし）に変換する","explanation":"音声認識（Automatic Speech Recognition）は音声波形を音素・単語・文のテキストに変換する。HMM→DNN-HMM→End-to-End（CTC・Transformer/Whisper等）へ発展。","star":"★★★"},{"no":274,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"音声合成（TTS）の説明として正しいものはどれか。","choices":{"A":"音声をテキストに変換する","B":"テキストから自然な音声波形を生成する","C":"音声の話者を認識する","D":"音声のノイズを除去する"},"answer":"B","answerText":"テキストから自然な音声波形を生成する","explanation":"TTS（Text-to-Speech）はテキストを自然な音声波形に変換する。WaveNet・Tacotron・VALL-E等のDLベースモデルが高品質の自然な音声合成を実現している。","star":"★★★"},{"no":275,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"メル周波数ケプストラム係数（MFCC）の説明として正しいものはどれか。","choices":{"A":"音声の生波形を直接使う特徴量","B":"人間の聴覚特性（メル尺度）に基づいた音声の特徴量で、音声認識の特徴抽出に広く使われる","C":"音声の話者情報のみを含む特徴量","D":"音声の音量を表す特徴量"},"answer":"B","answerText":"人間の聴覚特性（メル尺度）に基づいた音声の特徴量で、音声認識の特徴抽出に広く使われる","explanation":"MFCCは音声のメルフィルタバンク出力のコサイン変換で得られる特徴量。人間の聴覚の非線形性を反映し、音素・音の特徴を効率的に表現。DNN-HMM等の音声認識で長年標準として使われた。","star":"★★★"},{"no":276,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"WaveNetの説明として正しいものはどれか。","choices":{"A":"音声認識のRNNベースモデル","B":"Dilated Causal Convolutionで音声波形を直接自己回帰的に生成するDeepMindのモデル","C":"音声の感情分析モデル","D":"Transformerベースの音声圧縮モデル"},"answer":"B","answerText":"Dilated Causal Convolutionで音声波形を直接自己回帰的に生成するDeepMindのモデル","explanation":"WaveNet（van den Oord et al., 2016）はDilated Causal Convolutionで波形サンプルを自己回帰的に生成。人間と区別が難しい高品質な音声を生成し、Google Assistantの音声に採用された。","star":"★★★"},{"no":277,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"高速フーリエ変換（FFT）が音声処理で使われる理由として正しいものはどれか。","choices":{"A":"音声波形のサンプリングレートを変換するため","B":"時間領域の音声波形を周波数領域（スペクトル）に変換して音の成分を分析するため","C":"音声のノイズを削除するため","D":"音声データを圧縮するため"},"answer":"B","answerText":"時間領域の音声波形を周波数領域（スペクトル）に変換して音の成分を分析するため","explanation":"FFTは時間領域の信号を周波数成分（フーリエスペクトル）に変換する。音声処理ではスペクトログラムを計算する前処理として使われ、どの周波数の音が含まれるかを分析する。","star":"★★★"},{"no":278,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"CTC（Connectionist Temporal Classification）の説明として正しいものはどれか。","choices":{"A":"強化学習の価値関数の一種","B":"系列の入出力長が異なる場合に整合させる損失関数で、音声認識のEnd-to-End学習に使われる","C":"音声の話者分離手法","D":"ノイズ除去フィルター"},"answer":"B","answerText":"系列の入出力長が異なる場合に整合させる損失関数で、音声認識のEnd-to-End学習に使われる","explanation":"CTC（Graves et al., 2006）はフレーム数>文字数の音声認識で、空白記号（blank）を使ってアライメントを周辺化した損失関数。End-to-End音声認識の基礎となった。","star":"★★★"},{"no":279,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"話者識別（Speaker Identification）の説明として正しいものはどれか。","choices":{"A":"「何を言ったか」を認識する処理","B":"「誰が話しているか」を識別する処理","C":"言語を識別する処理","D":"感情を識別する処理"},"answer":"B","answerText":"「誰が話しているか」を識別する処理","explanation":"話者識別は音声の声紋特徴から話者の身元を識別するタスク。セキュリティシステムや音声インターフェースで使われる。話者検証（本人確認）と話者識別（1対多）に分かれる。","star":"★★★"},{"no":280,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"メル尺度（Mel Scale）の特徴として正しいものはどれか。","choices":{"A":"周波数と線形に対応する尺度","B":"人間の聴覚特性に合わせて低周波数域をより詳細に、高周波数域を粗く表現する対数的な尺度","C":"音量の単位","D":"サンプリングレートの単位"},"answer":"B","answerText":"人間の聴覚特性に合わせて低周波数域をより詳細に、高周波数域を粗く表現する対数的な尺度","explanation":"メル尺度は人間の聴覚が低周波数の変化に敏感で高周波数の変化に鈍感な特性を反映した非線形な周波数尺度。MFCCはこのメル尺度に基づくフィルタバンクを使う。","star":"★★★"},{"no":281,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"A-D変換（アナログ-デジタル変換）の音声処理における意義として正しいものはどれか。","choices":{"A":"デジタル音声をアナログ波形に戻す処理","B":"連続的なアナログ音声信号をコンピュータで処理可能な離散的なデジタルデータに変換する","C":"音声ファイルを圧縮する処理","D":"音声の感情を数値化する処理"},"answer":"B","answerText":"連続的なアナログ音声信号をコンピュータで処理可能な離散的なデジタルデータに変換する","explanation":"A-D変換は連続的なアナログ音声波形をサンプリング（標本化）・量子化してコンピュータで処理可能なデジタルデータに変換する。PCM（パルス符号変調器）が最も一般的な変換方式。","star":"★★★"},{"no":282,"chapter":"第5章","chapterTheme":"DLの応用例","section":"音声処理","question":"フォルマント（Formant）の説明として正しいものはどれか。","choices":{"A":"音声の基本周波数","B":"声道の共鳴周波数で母音の音色を特徴づける周波数帯域","C":"音声の音量","D":"ノイズの周波数成分"},"answer":"B","answerText":"声道の共鳴周波数で母音の音色を特徴づける周波数帯域","explanation":"フォルマントは声道（口腔・鼻腔等）の共鳴によって強調される周波数帯域。特にF1・F2は母音の識別に重要で、フォルマント周波数の組み合わせが各母音の音色を決定する。","star":"★★☆"},{"no":283,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"DQN（Deep Q-Network）の革新的な点として正しいものはどれか。","choices":{"A":"Q学習を全て廃止して方策勾配法のみを使う","B":"経験再生（Experience Replay）とターゲットネットワークを使ってQ学習をDNNで安定的に学習した","C":"ゲームのルールを人手でプログラムした","D":"Q値を線形関数で近似した"},"answer":"B","answerText":"経験再生（Experience Replay）とターゲットネットワークを使ってQ学習をDNNで安定的に学習した","explanation":"DQN（Mnih et al., 2015）はQ関数をDNNで近似。経験再生（相関の除去）とターゲットネットワーク（安定化）を導入し、Atariゲームで人間水準の性能を達成した。","star":"★★★"},{"no":284,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"ダブルDQN（Double DQN）がDQNを改善した点として正しいものはどれか。","choices":{"A":"2つのエージェントが協力する","B":"行動選択とQ値評価に異なるネットワークを使い、Q値の過大評価を緩和する","C":"バッチサイズを2倍にする","D":"2つのゲームを同時に学習する"},"answer":"B","answerText":"行動選択とQ値評価に異なるネットワークを使い、Q値の過大評価を緩和する","explanation":"DQNはmax Q値を使うため過大評価（Overestimation）が起きやすい。Double DQNはオンラインネットワークで行動を選択し、ターゲットネットワークでQ値を評価して過大評価を緩和する。","star":"★★★"},{"no":285,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"デュエリングネットワーク（Dueling Network）の特徴として正しいものはどれか。","choices":{"A":"2つの競合するエージェントが学習する","B":"Q(s,a)を状態価値V(s)とアドバンテージA(s,a)に分解して学習する","C":"報酬を2倍にする","D":"方策と価値関数を別々に学習する（Actor-Critic）"},"answer":"B","answerText":"Q(s,a)を状態価値V(s)とアドバンテージA(s,a)に分解して学習する","explanation":"Dueling Networkは Q(s,a) = V(s) + A(s,a) - mean(A)に分解するアーキテクチャ。行動の価値（A）と状態の価値（V）を分けて学習することで，行動の影響が少ない状態でも安定して価値を推定できる。","star":"★★★"},{"no":286,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"A3C（Asynchronous Advantage Actor-Critic）の特徴として正しいものはどれか。","choices":{"A":"1つのエージェントが逐次的に学習する","B":"複数のエージェントが非同期に環境と相互作用して学習し、グローバルネットワークを更新する","C":"教師あり学習を使ってポリシーを学習する","D":"リプレイバッファを使ったDQNの亜種"},"answer":"B","answerText":"複数のエージェントが非同期に環境と相互作用して学習し、グローバルネットワークを更新する","explanation":"A3C（Mnih et al., 2016）は複数のエージェントが非同期に異なる環境コピーと相互作用し、Actor-Critic手法でグローバルネットワークを非同期更新する。Experience Replayなしで学習できる。","star":"★★★"},{"no":287,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"PPO（Proximal Policy Optimization）の特徴として正しいものはどれか。","choices":{"A":"Q学習ベースのアルゴリズム","B":"方策更新のステップ幅をクリップして安定した学習を実現する方策勾配法","C":"モデルベースの強化学習","D":"教師あり学習ベースの手法"},"answer":"B","answerText":"方策更新のステップ幅をクリップして安定した学習を実現する方策勾配法","explanation":"PPO（Schulman et al., 2017）は方策更新比率 r(θ) = π_θ(a|s)/π_{θ_old}(a|s)をクリップして大きな更新を防ぐ。TRPOより実装が簡単で安定した学習が可能。OpenAI Fiveに使われた。","star":"★★★"},{"no":288,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"RLHF（Reinforcement Learning from Human Feedback）の説明として正しいものはどれか。","choices":{"A":"ロボットに人間が直接操作を教える手法","B":"人間の好みのフィードバックを報酬モデルに変換して強化学習でモデルを調整する手法","C":"Pong等のAtariゲームの強化学習","D":"実ロボットの制御学習"},"answer":"B","answerText":"人間の好みのフィードバックを報酬モデルに変換して強化学習でモデルを調整する手法","explanation":"RLHF（Ouyang et al., 2022）：人間のフィードバックから報酬モデルを学習し、PPOでLLMをアラインメント。InstructGPT・ChatGPT・Claudeの学習に使われる。","star":"★★★"},{"no":289,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"マルチエージェント強化学習（MARL）の説明として正しいものはどれか。","choices":{"A":"1つのエージェントが複数の環境を同時に学習する","B":"複数のエージェントが協力または競争しながら同時に環境と相互作用して学習する","C":"複数の異なるモデルをアンサンブルする強化学習","D":"並列コンピュータで強化学習を高速化する手法"},"answer":"B","answerText":"複数のエージェントが協力または競争しながら同時に環境と相互作用して学習する","explanation":"MARL（Multi-Agent RL）は複数エージェントが同一環境で同時に相互作用して学習。協調（OpenAI Five・AlphaStar）や競争（マルチプレイヤーゲーム）のシナリオがある。非定常性（他エージェントの方策変化）が課題。","star":"★★★"},{"no":290,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"sim2real（シミュレーションから実世界への転移）が難しい理由として正しいものはどれか。","choices":{"A":"シミュレーターの計算が遅いから","B":"シミュレーターと実世界の物理的・視覚的差異（Reality Gap）がある","C":"ロボットのアクチュエータが足りないから","D":"実世界のデータが多すぎるから"},"answer":"B","answerText":"シミュレーターと実世界の物理的・視覚的差異（Reality Gap）がある","explanation":"sim2realのReality Gapは摩擦・質量・センサノイズ等のシミュレーター近似誤差による実世界との差。Domain Randomization（シミュレーションの多様性を増やす）・Domain Adaptation等で対処する。","star":"★★★"},{"no":291,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"オフライン強化学習（Offline RL）の説明として正しいものはどれか。","choices":{"A":"インターネットなしで学習する強化学習","B":"あらかじめ収集された静的なデータセットのみを使って環境との相互作用なしに学習する強化学習","C":"エージェントをオフラインにしてテストする手法","D":"ゲームをポーズしながら学習する"},"answer":"B","answerText":"あらかじめ収集された静的なデータセットのみを使って環境との相互作用なしに学習する強化学習","explanation":"オフライン強化学習（Batch RL）は事前収集した大量のデータ（ログデータ等）のみで学習する。医療・自動運転等で実際のインタラクションが危険・高コストな場合に有用。分布シフト問題が課題。","star":"★★★"},{"no":292,"chapter":"第5章","chapterTheme":"DLの応用例","section":"深層強化学習","question":"OpenAI Fiveの説明として正しいものはどれか。","choices":{"A":"チェスを制した強化学習AI","B":"Dota 2でプロゲーマーを破った深層強化学習AI","C":"AlphaGoの別名","D":"自動運転のAI"},"answer":"B","answerText":"Dota 2でプロゲーマーを破った深層強化学習AI","explanation":"OpenAI Five（2019年）はDota 2の5v5チーム戦でプロゲーマーを破った深層強化学習AI。PPOを使った大規模な自己対戦学習で長期的な戦略を習得した。","star":"★★★"},{"no":293,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"GAN（Generative Adversarial Network）の基本構造として正しいものはどれか。","choices":{"A":"1つのNNでデータを生成する","B":"生成器（Generator）と識別器（Discriminator）が互いに競合して学習するフレームワーク","C":"Seq2Seqと同じEncoder-Decoder構造","D":"RNNで系列データを生成するモデル"},"answer":"B","answerText":"生成器（Generator）と識別器（Discriminator）が互いに競合して学習するフレームワーク","explanation":"GAN（Goodfellow et al., 2014）: GeneratorはDiscriminatorを騙す偽データを生成し、DiscriminatorはReal/Fakeを識別する。互いに競合する敵対的学習でGeneratorが高品質なデータを生成できるようになる。","star":"★★★"},{"no":294,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"DCGAN（Deep Convolutional GAN）の説明として正しいものはどれか。","choices":{"A":"GANの識別器にRNNを使ったモデル","B":"GANのGeneratorとDiscriminatorにCNNを使った安定した画像生成モデル","C":"テキスト生成専用のGAN","D":"音声生成専用のGAN"},"answer":"B","answerText":"GANのGeneratorとDiscriminatorにCNNを使った安定した画像生成モデル","explanation":"DCGAN（Radford et al., 2015）はGANのGenerator（Deconvolution）とDiscriminator（Convolution）にCNNを使い、BatchNorm等のテクニックでGAN学習を安定化。高品質な画像生成を実現した。","star":"★★★"},{"no":295,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"Diffusion Model（拡散モデル）の基本概念として正しいものはどれか。","choices":{"A":"GANと同じく生成器と識別器が競合する","B":"データにノイズを段階的に加える過程（拡散）を逆転（逆拡散）して元のデータを生成するモデル","C":"変分オートエンコーダの一種","D":"強化学習で画像を生成する"},"answer":"B","answerText":"データにノイズを段階的に加える過程（拡散）を逆転（逆拡散）して元のデータを生成するモデル","explanation":"Diffusion Model（DDPM等）はデータにガウスノイズを段階的に加えるforward processを学習し、その逆過程（ノイズ除去）を学習するreverse processで高品質なサンプルを生成する。Stable Diffusionに使われる。","star":"★★★"},{"no":296,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"Pix2Pixの説明として正しいものはどれか。","choices":{"A":"テキストから画像を生成するモデル","B":"条件付きGANで入力画像から対応する別画像を生成するImage-to-Imageモデル","C":"音声から画像を生成するモデル","D":"ランダムノイズから画像を生成するモデル"},"answer":"B","answerText":"条件付きGANで入力画像から対応する別画像を生成するImage-to-Imageモデル","explanation":"Pix2Pix（Isola et al., 2017）は条件付きGAN（cGAN）でペアのある学習データ（スケッチ→写真、昼→夜等）を使って画像変換を学習する。","star":"★★★"},{"no":297,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"CycleGANの特徴として正しいものはどれか。","choices":{"A":"ペアのある学習データが必要な画像変換モデル","B":"ペアのない学習データで2つのドメイン間の画像変換を学習するモデル","C":"1つのGeneratorで全ての変換を行う","D":"音楽生成専用のGAN"},"answer":"B","answerText":"ペアのない学習データで2つのドメイン間の画像変換を学習するモデル","explanation":"CycleGAN（Zhu et al., 2017）はX→Y→Xのサイクル一貫性損失でペアなしデータでドメイン変換を学習。馬⇔シマウマ、夏⇔冬の変換が有名。ペアデータが不要な点がPix2Pixより有用。","star":"★★★"},{"no":298,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"NeRF（Neural Radiance Field）の説明として正しいものはどれか。","choices":{"A":"音声から音楽を生成するモデル","B":"複数の2D画像から3Dシーンを暗黙的にNNで表現して新視点からの画像を生成するモデル","C":"テキストから3Dモデルを生成するモデル","D":"医療画像を生成するGAN"},"answer":"B","answerText":"複数の2D画像から3Dシーンを暗黙的にNNで表現して新視点からの画像を生成するモデル","explanation":"NeRF（Mildenhall et al., 2020）はNNで空間の各点の色と密度を表現し、Ray Marchingで任意視点の画像を体積レンダリングする。複数視点の写真から3Dシーンを再構成できる。","star":"★★★"},{"no":299,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"文章生成（Text Generation）のAutoregressive Decodeingの説明として正しいものはどれか。","choices":{"A":"文章を一度に全て生成する","B":"前に生成したトークンを条件として次のトークンを順番に生成する","C":"ランダムに単語を選択する","D":"文書を要約する"},"answer":"B","answerText":"前に生成したトークンを条件として次のトークンを順番に生成する","explanation":"自己回帰的生成（Autoregressive Decoding）はGPT等のDecoderで、P(x_t|x_1,...,x_{t-1})を逐次的にサンプリングして左から右へトークンを生成する。GPT・LLMの基本的な生成方式。","star":"★★★"},{"no":300,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"画像生成のサンプリング手法「Temperature」パラメータの役割として正しいものはどれか。","choices":{"A":"生成速度を調整する","B":"確率分布のシャープさを制御し、高いほど多様な（ランダムな）生成、低いほど確定的な生成を行う","C":"モデルの層数を制御する","D":"バッチサイズを調整する"},"answer":"B","answerText":"確率分布のシャープさを制御し、高いほど多様な（ランダムな）生成、低いほど確定的な生成を行う","explanation":"Temperature τはSoftmax出力をlogit/τで調整する。τ>1でより均一な確率分布（多様だが品質低下）、τ<1でピーク的な分布（確定的で品質安定）。LLMの生成多様性制御に使われる。","star":"★★★"},{"no":301,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"GAN学習において「モード崩壊（Mode Collapse）」の説明として正しいものはどれか。","choices":{"A":"Discriminatorが学習に失敗する","B":"Generatorが特定のパターン（モード）のみを生成し続け、多様性が失われる問題","C":"両方のネットワークが同時に崩壊する","D":"学習率が大きすぎる問題"},"answer":"B","answerText":"Generatorが特定のパターン（モード）のみを生成し続け、多様性が失われる問題","explanation":"Mode CollapseはGeneratorがDiscriminatorを騙せる少数のパターンのみを生成し、データの多様性を学習できない問題。Wasserstein GAN（WGAN）・Minibatch Discrimination等で緩和策がある。","star":"★★★"},{"no":302,"chapter":"第5章","chapterTheme":"DLの応用例","section":"データ生成","question":"Diffusion ModelがGANより優れている点として正しいものはどれか。","choices":{"A":"生成速度が速い","B":"学習が安定しており、Mode Collapseが起きにくく多様なサンプルを生成できる","C":"より少ないデータで学習できる","D":"テキスト生成のみに対応"},"answer":"B","answerText":"学習が安定しており、Mode Collapseが起きにくく多様なサンプルを生成できる","explanation":"Diffusion Modelは敵対的学習でなく尤度最大化で学習するため、GAN学習の不安定さ・Mode Collapseが発生しにくい。高品質かつ多様なサンプルが得られる。一方で生成速度（反復Denoise）がGANより遅い。","star":"★★★"},{"no":303,"chapter":"第5章","chapterTheme":"DLの応用例","section":"転移学習・ファインチューニング","question":"転移学習（Transfer Learning）の説明として正しいものはどれか。","choices":{"A":"毎回ゼロからモデルを学習する手法","B":"あるタスクで学習した知識（重み）を別のタスクへ適用する手法","C":"モデルを複数コピーして並列学習する手法","D":"ラベルなしデータのみで学習する手法"},"answer":"B","answerText":"あるタスクで学習した知識（重み）を別のタスクへ適用する手法","explanation":"転移学習は大規模データセット（ImageNet等）で事前学習した重みを別タスクに転用する。少量データの目的タスクでも高精度を達成できる。","star":"★★★"},{"no":304,"chapter":"第5章","chapterTheme":"DLの応用例","section":"転移学習・ファインチューニング","question":"ファインチューニング（Fine-tuning）の説明として正しいものはどれか。","choices":{"A":"事前学習済みモデルの重みを全て廃棄して再学習する","B":"事前学習済みモデルの重みを初期値として使い、目的タスクのデータで全体または一部を再学習する","C":"モデルの精度の微調整のみを行う","D":"ハイパーパラメータのみを調整する"},"answer":"B","answerText":"事前学習済みモデルの重みを初期値として使い、目的タスクのデータで全体または一部を再学習する","explanation":"ファインチューニングは事前学習済みモデルを起点にして、目的タスクのデータで重みを更新する。全体を更新するか最終層のみかを選択できる。少量データでも高精度が得られることが多い。","star":"★★★"},{"no":305,"chapter":"第5章","chapterTheme":"DLの応用例","section":"転移学習・ファインチューニング","question":"Few-shot学習の説明として正しいものはどれか。","choices":{"A":"大規模データセットで学習する手法","B":"少数の例（数例〜数十例）のみで新しいタスクに対応できる学習手法","C":"ゼロデータで学習する","D":"数百万枚の画像で学習する"},"answer":"B","answerText":"少数の例（数例〜数十例）のみで新しいタスクに対応できる学習手法","explanation":"Few-shot学習は少量のラベル付きサンプル（Few examples）でタスクに適応できる。GPT-3等のLLMはプロンプト内のFew-shotサンプルから学習（In-context Learning）できる。","star":"★★★"},{"no":306,"chapter":"第5章","chapterTheme":"DLの応用例","section":"転移学習・ファインチューニング","question":"自己教師あり学習（Self-supervised Learning）の説明として正しいものはどれか。","choices":{"A":"手動でラベルを付与して学習する","B":"データ自体から自動で教師信号を生成して学習する（例：マスクトークン予測）","C":"強化学習の一種","D":"GANの生成器の学習方法"},"answer":"B","answerText":"データ自体から自動で教師信号を生成して学習する（例：マスクトークン予測）","explanation":"自己教師あり学習はデータから自動的に教師信号を作る（BERT: マスクトークン予測、SimCLR: Contrastive学習等）。ラベルなしデータで有用な表現を学習できる。","star":"★★★"},{"no":307,"chapter":"第5章","chapterTheme":"DLの応用例","section":"転移学習・ファインチューニング","question":"破壊的忘却（Catastrophic Forgetting）の説明として正しいものはどれか。","choices":{"A":"NNのパラメータが爆発的に増加する問題","B":"NNが新しいタスクを学習すると以前のタスクの知識を急激に忘失する問題","C":"学習データが破損する問題","D":"ネットワーク構造が複雑すぎる問題"},"answer":"B","answerText":"NNが新しいタスクを学習すると以前のタスクの知識を急激に忘失する問題","explanation":"破壊的忘却（Catastrophic Interference）はNNがタスクBを学習すると以前のタスクAの重みが上書きされて性能が低下する問題。継続学習（Continual Learning）・EWC（Elastic Weight Consolidation）等で対処する。","star":"★★★"},{"no":308,"chapter":"第5章","chapterTheme":"DLの応用例","section":"転移学習・ファインチューニング","question":"One-shot学習の説明として正しいものはどれか。","choices":{"A":"1層のNNで学習する手法","B":"各クラスについて1枚の例示画像のみで新しいクラスを認識できる学習","C":"1万枚の画像で学習する","D":"1種類のデータのみで学習する"},"answer":"B","answerText":"各クラスについて1枚の例示画像のみで新しいクラスを認識できる学習","explanation":"One-shot学習は各クラスの1サンプルのみで学習するタスク。Siamese Network（マッチングネットワーク）やプロトタイピカルネットワーク等が使われる。顔認識等の応用がある。","star":"★★★"},{"no":309,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"基盤モデル（Foundation Model）の説明として正しいものはどれか。","choices":{"A":"特定の1タスク専用に学習したモデル","B":"大規模データで事前学習され、多様なタスクへのファインチューニングやゼロショット推論が可能な大規模モデル","C":"強化学習専用のモデル","D":"音声のみを扱うモデル"},"answer":"B","answerText":"大規模データで事前学習され、多様なタスクへのファインチューニングやゼロショット推論が可能な大規模モデル","explanation":"基盤モデル（Stanford, 2021）はGPT-3・BERT・DALL-E等のような大規模データで事前学習された汎用モデル。多様な下流タスクに適応でき、AIの新しいパラダイムとなっている。","star":"★★★"},{"no":310,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"マルチモーダル学習の説明として正しいものはどれか。","choices":{"A":"複数のNNを並列に使う手法","B":"テキスト・画像・音声等の複数のモダリティを統合して学習・推論するアプローチ","C":"複数の損失関数を使う手法","D":"複数のデータセットを使う手法"},"answer":"B","answerText":"テキスト・画像・音声等の複数のモダリティを統合して学習・推論するアプローチ","explanation":"マルチモーダル学習はテキスト・画像・音声・動画等の異なるモダリティからの情報を組み合わせて学習する。CLIP・DALL-E・GPT-4V等が代表例。","star":"★★★"},{"no":311,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"CLIP（Contrastive Language-Image Pre-training）の説明として正しいものはどれか。","choices":{"A":"画像のみを学習するモデル","B":"大規模な画像とテキストのペアをContrastive Learningで学習して画像-テキスト間の対応を学ぶモデル","C":"音声と画像を組み合わせたモデル","D":"画像生成に特化したモデル"},"answer":"B","answerText":"大規模な画像とテキストのペアをContrastive Learningで学習して画像-テキスト間の対応を学ぶモデル","explanation":"CLIP（Radford et al., 2021）はインターネット上の4億枚の画像-テキストペアをContrastive Lossで学習。Zero-shot画像分類やText-to-Image検索が可能。DALL-Eの画像エンコーダとして使われる。","star":"★★★"},{"no":312,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"DALL-E の説明として正しいものはどれか。","choices":{"A":"テキスト入力から高品質な画像を生成できるOpenAIのモデル","B":"音声から楽曲を生成するモデル","C":"コード生成専用のLLM","D":"動画認識モデル"},"answer":"A","answerText":"テキスト入力から高品質な画像を生成できるOpenAIのモデル","explanation":"DALL-E（OpenAI）はテキストプロンプトから画像を生成するText-to-Imageモデル。DALL-E 2はCLIP + Diffusion Model、DALL-E 3はより精緻な制御を実現。","star":"★★★"},{"no":313,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"Image Captioning（画像キャプション生成）のタスクの説明として正しいものはどれか。","choices":{"A":"テキストから画像を生成する","B":"画像の内容を説明するテキストを自動生成する","C":"画像を分類する","D":"画像内の物体を検出する"},"answer":"B","answerText":"画像の内容を説明するテキストを自動生成する","explanation":"Image CaptioningはCNN+RNN・Transformer等で画像から画像を説明するテキスト（キャプション）を自動生成するタスク。「犬がボールと遊んでいる」のような文を生成する。","star":"★★★"},{"no":314,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"Visual Question Answering（VQA）の説明として正しいものはどれか。","choices":{"A":"音声質問に対して画像を返すシステム","B":"画像と質問文を入力として受け取り、画像に関する質問に自然言語で答えるシステム","C":"テキストのみを使った質問応答","D":"動画を見ながら質問するシステム"},"answer":"B","answerText":"画像と質問文を入力として受け取り、画像に関する質問に自然言語で答えるシステム","explanation":"VQAは画像（Visual）と自然言語の質問（Question）を入力として、画像の内容に基づいて回答（Answer）を生成するマルチモーダルタスク。「画像の中に何匹の犬がいますか？」など。","star":"★★★"},{"no":315,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"Text-to-Imageのモデルに使われる主な技術として正しいものはどれか。","choices":{"A":"k-meansクラスタリング","B":"大規模言語モデルによるテキスト理解とDiffusion Model等による画像生成の組み合わせ","C":"RNNによる画像生成","D":"決定木による画像分類"},"answer":"B","answerText":"大規模言語モデルによるテキスト理解とDiffusion Model等による画像生成の組み合わせ","explanation":"Text-to-Imageモデル（Stable Diffusion・DALL-E・Midjourney等）はCLIP等のテキストエンコーダとDiffusion Model/VQ-VAE等の画像デコーダを組み合わせてテキストから画像を生成する。","star":"★★★"},{"no":316,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"Zero-shot学習の説明として正しいものはどれか。","choices":{"A":"ゼロのデータで学習する（学習不要）","B":"訓練時に見ていないクラスを、クラスの属性説明やテキスト情報を使って分類できる能力","C":"1つのサンプルで学習する","D":"GPUなしで学習する"},"answer":"B","answerText":"訓練時に見ていないクラスを、クラスの属性説明やテキスト情報を使って分類できる能力","explanation":"Zero-shot学習は訓練データに含まれないクラスを、クラスの属性（「縞模様、4本足、馬に似ている＝シマウマ」）等の意味的情報を使って分類する。CLIPはZero-shot画像分類が可能。","star":"★★★"},{"no":317,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"マルチタスク学習（Multi-task Learning）の利点として正しいものはどれか。","choices":{"A":"タスクごとに独立したモデルを学習するより常に精度が低い","B":"複数のタスクを同時に学習することで、タスク間の共有表現が正則化として機能し汎化性能が向上する","C":"タスク数だけモデルサイズが増加する","D":"学習データが不要になる"},"answer":"B","answerText":"複数のタスクを同時に学習することで、タスク間の共有表現が正則化として機能し汎化性能が向上する","explanation":"マルチタスク学習は関連する複数のタスクを同時に学習することで、タスク間で有用な表現が共有される。データ効率が高く、正則化効果で個々のタスクの過学習を防ぎやすい。","star":"★★★"},{"no":318,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"FlamingO（フラミンゴ）の説明として正しいものはどれか。","choices":{"A":"音声認識モデル","B":"画像とテキストを組み合わせたマルチモーダルな大規模言語モデル（DeepMind）","C":"Diffusion Modelベースの画像生成モデル","D":"強化学習エージェント"},"answer":"B","answerText":"画像とテキストを組み合わせたマルチモーダルな大規模言語モデル（DeepMind）","explanation":"Flamingo（Alayrac et al., 2022）はDeepMindが開発したマルチモーダルモデル。視覚エンコーダとLLMをCross-Attentionで接続し、画像・動画に関するFew-shot学習が可能。","star":"★★★"},{"no":319,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"Unified-IOの説明として正しいものはどれか。","choices":{"A":"テキストのみを扱う言語モデル","B":"テキスト・画像・音声・動作等の多様な入出力を統一的な形式で扱うマルチモーダルモデル","C":"強化学習のUnified手法","D":"CNNとRNNの統一モデル"},"answer":"B","answerText":"テキスト・画像・音声・動作等の多様な入出力を統一的な形式で扱うマルチモーダルモデル","explanation":"Unified-IO（Lu et al., 2022）はテキスト・画像・音声・深度マップ等の多様な入力モダリティと出力モダリティを共通のSequence-to-Sequenceフレームワークで統一的に扱う。","star":"★★☆"},{"no":320,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"マルチモーダル","question":"GPT-4Vのような大規模マルチモーダルモデルの能力として最も適切なものはどれか。","choices":{"A":"音声認識のみ","B":"画像とテキストを理解して複雑な視覚的推論・説明・コード生成ができる","C":"動画編集の自動化のみ","D":"数値計算のみ"},"answer":"B","answerText":"画像とテキストを理解して複雑な視覚的推論・説明・コード生成ができる","explanation":"GPT-4Vはテキストと画像を入力として視覚的な理解と言語的な推論を統合する。グラフの解釈・画像の説明・視覚的なコード生成等が可能なマルチモーダルな大規模モデル。","star":"★★★"},{"no":321,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"説明可能AI（XAI）が必要とされる背景として正しいものはどれか。","choices":{"A":"AIが常に間違えるから","B":"医療・金融・法律等の高リスク分野でAIの判断根拠を理解・監査する必要があるから","C":"XAIはコスト削減のためだけに必要","D":"説明可能なモデルは常に精度が高いから"},"answer":"B","answerText":"医療・金融・法律等の高リスク分野でAIの判断根拠を理解・監査する必要があるから","explanation":"XAI（Explainable AI）は医療診断・与信審査・法的判断等でAIの意思決定過程を人間が理解・監査できるようにするための手法・研究。EUのGDPRは「説明を受ける権利」を規定している。","star":"★★★"},{"no":322,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"LIME（Local Interpretable Model-agnostic Explanations）の説明として正しいものはどれか。","choices":{"A":"全体的なモデルの解釈性を提供する","B":"個々の予測の周辺を局所的に線形近似して予測の根拠を説明するモデル非依存の手法","C":"NNのみに使える解釈手法","D":"モデルを一から解釈可能なモデルで学習し直す"},"answer":"B","answerText":"個々の予測の周辺を局所的に線形近似して予測の根拠を説明するモデル非依存の手法","explanation":"LIME（Ribeiro et al., 2016）は予測したいサンプルの近傍でランダムなサンプルを生成し、局所的に解釈可能な線形モデルを当てはめて予測の根拠を説明するBlack-box対応手法。","star":"★★★"},{"no":323,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"SHAP（SHapley Additive exPlanations）の説明として正しいものはどれか。","choices":{"A":"特定の画像ピクセルのみを説明する手法","B":"ゲーム理論のShapley値に基づき各特徴量の予測への貢献度を説明する手法","C":"モデルのパラメータを直接解釈する手法","D":"特定のNNアーキテクチャ専用の手法"},"answer":"B","answerText":"ゲーム理論のShapley値に基づき各特徴量の予測への貢献度を説明する手法","explanation":"SHAP（Lundberg & Lee, 2017）はShapley値を使って各特徴量の予測への公平な貢献度を計算する。モデル非依存で一貫した解釈性を提供。TreeSHAP（木モデル用）が高速実装として有名。","star":"★★★"},{"no":324,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"Grad-CAM（Gradient-weighted Class Activation Mapping）の説明として正しいものはどれか。","choices":{"A":"テキストの重要単語を可視化する手法","B":"CNNが分類時に注目した画像領域をグラジェントで可視化するヒートマップ手法","C":"音声認識の可視化手法","D":"全結合層専用の可視化手法"},"answer":"B","answerText":"CNNが分類時に注目した画像領域をグラジェントで可視化するヒートマップ手法","explanation":"Grad-CAMは最終畳み込み層の特徴マップに対する出力の勾配をチャンネル方向に重み付き平均してヒートマップを生成。CNNが「どの領域を見て分類したか」を可視化する。","star":"★★★"},{"no":325,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"CAM（Class Activation Mapping）の説明として正しいものはどれか。","choices":{"A":"GANの識別器の出力を可視化する手法","B":"Global Average Poolingを使ったCNNで分類に重要な画像領域を可視化する手法","C":"音声の感情を可視化する手法","D":"テキスト生成の可視化手法"},"answer":"B","answerText":"Global Average Poolingを使ったCNNで分類に重要な画像領域を可視化する手法","explanation":"CAM（Zhou et al., 2016）はGAPを使ったCNNでクラスに対する特徴マップの重み付き和を可視化する。GAPが必要だがGrad-CAMは任意のCNNに適用可能な拡張版。","star":"★★★"},{"no":326,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"Permutation Importanceの説明として正しいものはどれか。","choices":{"A":"特徴量を削除してモデルを再学習する","B":"ある特徴量の値をランダムにシャッフルした際の精度低下量で特徴量の重要度を評価する手法","C":"モデルのパラメータを直接確認する手法","D":"決定木専用の重要度計算"},"answer":"B","answerText":"ある特徴量の値をランダムにシャッフルした際の精度低下量で特徴量の重要度を評価する手法","explanation":"Permutation Importance（Fisher et al.）はある特徴量をランダムにシャッフルした場合の精度低下度で重要度を測る。モデル非依存でシンプルな手法。再学習不要。","star":"★★★"},{"no":327,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"ブラックボックス（Black-box）モデルの問題点として正しいものはどれか。","choices":{"A":"精度が低い","B":"内部の判断プロセスが不透明で予測の根拠を理解できない","C":"計算が遅い","D":"データを大量に必要とする"},"answer":"B","answerText":"内部の判断プロセスが不透明で予測の根拠を理解できない","explanation":"深いNNや複雑なアンサンブルモデルは予測精度は高いが、判断根拠が不透明なブラックボックス。医療・金融等の高リスク領域では説明可能性が要求されるため問題となる。","star":"★★★"},{"no":328,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"解釈可能なモデルの代表として挙げられるものはどれか。","choices":{"A":"深いTransformerモデル","B":"決定木・線形回帰・GAM（一般化加法モデル）などシンプルな構造のモデル","C":"アンサンブルモデル","D":"GANの生成器"},"answer":"B","answerText":"決定木・線形回帰・GAM（一般化加法モデル）などシンプルな構造のモデル","explanation":"解釈可能なモデルは決定木・線形回帰・ロジスティック回帰等のシンプルな構造を持つ。DLの高精度を維持しつつ解釈性を上げるXAI手法（LIME・SHAP等）が研究されている。","star":"★★★"},{"no":329,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"データの来歴（Data Provenance/Lineage）がAIの透明性において重要な理由として正しいものはどれか。","choices":{"A":"来歴を管理するとモデルの精度が上がるから","B":"学習データの出所・変換履歴を把握することで、モデルのバイアスや問題を追跡・説明できるから","C":"来歴管理はコスト削減のためだけに必要","D":"来歴はコンプライアンスとは無関係"},"answer":"B","answerText":"学習データの出所・変換履歴を把握することで、モデルのバイアスや問題を追跡・説明できるから","explanation":"データの来歴（どのデータが・いつ・どこから来て・どう変換されたか）を管理することで、モデルの予測に影響するバイアスや問題を追跡・特定・修正できる。AI Governanceの重要要素。","star":"★★★"},{"no":330,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの解釈性","question":"AIの解釈性と精度のトレードオフの説明として正しいものはどれか。","choices":{"A":"解釈性が高いモデルは常に精度も高い","B":"一般的に解釈性の高いシンプルなモデルは精度が劣ることが多く、両立させることが課題","C":"精度が高いモデルは常に解釈性も高い","D":"トレードオフは存在しない"},"answer":"B","answerText":"一般的に解釈性の高いシンプルなモデルは精度が劣ることが多く、両立させることが課題","explanation":"一般的に解釈可能なシンプルなモデル（線形・決定木）は複雑なDNNより精度が劣ることが多い（精度-解釈性トレードオフ）。XAIはこのトレードオフを緩和するために研究されている。","star":"★★★"},{"no":331,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"モデルの軽量化が必要な理由として最も正しいものはどれか。","choices":{"A":"軽量化するとモデルの精度が向上するから","B":"スマートフォン等のリソース制約のあるエッジデバイスへのデプロイに必要だから","C":"軽量化はGPU性能を向上させるから","D":"軽量化は大量のデータを必要としないから"},"answer":"B","answerText":"スマートフォン等のリソース制約のあるエッジデバイスへのデプロイに必要だから","explanation":"モデル軽量化はスマートフォン・IoTデバイス・自動車等のリソース（メモリ・計算能力・電力）が制限されたエッジデバイスで推論できるようにするために重要。","star":"★★★"},{"no":332,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"量子化（Quantization）の説明として正しいものはどれか。","choices":{"A":"モデルのパラメータ数を増やす","B":"モデルのパラメータを高精度浮動小数（float32）から低精度（int8・float16等）に変換して計算量・メモリを削減する","C":"モデルの層数を増やす","D":"モデルの学習を並列化する"},"answer":"B","answerText":"モデルのパラメータを高精度浮動小数（float32）から低精度（int8・float16等）に変換して計算量・メモリを削減する","explanation":"量子化はfloat32→int8等の低精度表現でパラメータを格納・演算する。モデルサイズが1/4になり推論が高速化する。精度損失は比較的小さい。Post-training量子化とQAT（量子化対応学習）がある。","star":"★★★"},{"no":333,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"蒸留（Knowledge Distillation）の説明として正しいものはどれか。","choices":{"A":"大きなモデル（教師）の出力ソフトラベルを使って小さなモデル（生徒）を学習する軽量化手法","B":"モデルをスパースにする手法","C":"浮動小数点を整数に変換する手法","D":"モデルの重みをランダムに削除する手法"},"answer":"A","answerText":"大きなモデル（教師）の出力ソフトラベルを使って小さなモデル（生徒）を学習する軽量化手法","explanation":"知識蒸留（Hinton et al., 2015）は大きい教師モデルの軟らかい確率出力（Soft Labels）を小さな生徒モデルが学習する。Hard Labelsより情報量が多いため、小さなモデルでも高精度が得られる。","star":"★★★"},{"no":334,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"プルーニング（Pruning）の説明として正しいものはどれか。","choices":{"A":"モデルにパラメータを追加する","B":"重要度が低いパラメータ（ニューロンや重み）を除去してモデルを小さくする","C":"学習率を減少させる","D":"データを間引く"},"answer":"B","answerText":"重要度が低いパラメータ（ニューロンや重み）を除去してモデルを小さくする","explanation":"プルーニング（枝刈り）は学習済みモデルの不要な接続（小さい重み）やニューロンを除去してモデルを軽量化する。スパースなモデルが得られる。マグニチュードプルーニングが最もシンプルな手法。","star":"★★★"},{"no":335,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"モデル圧縮（Model Compression）の手法として誤っているものはどれか。","choices":{"A":"量子化","B":"プルーニング","C":"知識蒸留","D":"モデルのパラメータ数を増やす"},"answer":"D","answerText":"モデルのパラメータ数を増やす","explanation":"モデル圧縮の代表手法は量子化（精度削減）・プルーニング（枝刈り）・蒸留（小モデルへの転移）・低ランク近似等。パラメータ数を増やすのは圧縮ではなく逆の操作。","star":"★★★"},{"no":336,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"エッジAI（Edge AI）の説明として正しいものはどれか。","choices":{"A":"全ての処理をクラウドサーバーで行うAI","B":"クラウドに依存せずデバイス（エッジ）上でリアルタイムにAI推論を行うアプローチ","C":"エッジ（境界）検出専用のAI","D":"グラフのエッジ検出アルゴリズム"},"answer":"B","answerText":"クラウドに依存せずデバイス（エッジ）上でリアルタイムにAI推論を行うアプローチ","explanation":"エッジAIはAI推論をクラウドでなくスマートフォン・IoTセンサー・自動車等のエッジデバイス上で実行する。低レイテンシ・プライバシー保護・オフライン動作が利点。","star":"★★★"},{"no":337,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"宝くじ仮説（Lottery Ticket Hypothesis）の説明として正しいものはどれか。","choices":{"A":"宝くじのように確率でモデルの重みを初期化する仮説","B":"大きなNNには最初から小さい「当たり（効率的）サブネットワーク」が存在し、これを見つけることでモデルを軽量化できるという仮説","C":"量子化によりモデルの精度が向上するという仮説","D":"蒸留により小モデルが大モデルより精度が高くなるという仮説"},"answer":"B","answerText":"大きなNNには最初から小さい「当たり（効率的）サブネットワーク」が存在し、これを見つけることでモデルを軽量化できるという仮説","explanation":"Lottery Ticket Hypothesis（Frankle & Carlin, 2019）は大きなNNはランダム初期化の中に精度の高いスパースサブネットワーク（winning ticket）が含まれるという仮説。プルーニングの理論的根拠。","star":"★★★"},{"no":338,"chapter":"第6章","chapterTheme":"基盤モデル・マルチモーダル・軽量化","section":"モデルの軽量化","question":"量子化の手法として「量子化対応学習（QAT: Quantization-Aware Training）」と「事後量子化（PTQ: Post-Training Quantization）」の違いとして正しいものはどれか。","choices":{"A":"両者は全く同じ手法","B":"QATは学習中に量子化誤差を考慮して学習するのでPTQより精度が高い傾向があるが、学習コストがかかる","C":"PTQはQATより常に精度が高い","D":"QATはパラメータを整数にするが、PTQは浮動小数点のまま"},"answer":"B","answerText":"QATは学習中に量子化誤差を考慮して学習するのでPTQより精度が高い傾向があるが、学習コストがかかる","explanation":"PTQは学習済みモデルをそのまま量子化するため実装が容易だが精度損失が大きい。QATは学習中に量子化誤差を模擬して学習するため精度損失が少ないが再学習が必要。","star":"★★★"},{"no":339,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"CRISP-DM（Cross-Industry Standard Process for Data Mining）のフェーズとして正しい順序はどれか。","choices":{"A":"データ収集→モデリング→評価→デプロイ","B":"ビジネス理解→データ理解→データ準備→モデリング→評価→デプロイ","C":"要件定義→設計→実装→テスト","D":"データ収集→前処理→学習→終了"},"answer":"B","answerText":"ビジネス理解→データ理解→データ準備→モデリング→評価→デプロイ","explanation":"CRISP-DMは6フェーズ：Business Understanding（ビジネス理解）→Data Understanding→Data Preparation→Modeling→Evaluation→Deployment。非線形で反復的なプロセス。","star":"★★★"},{"no":340,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"CRISP-MLの説明として正しいものはどれか。","choices":{"A":"データマイニング専用のフレームワーク","B":"機械学習プロジェクトのライフサイクル管理に特化したCRISP-DMの拡張フレームワーク","C":"プログラミング言語","D":"強化学習の評価指標"},"answer":"B","answerText":"機械学習プロジェクトのライフサイクル管理に特化したCRISP-DMの拡張フレームワーク","explanation":"CRISP-ML（CRISP for Machine Learning）はCRISP-DMをMLに適応させた新しいフレームワーク。モデルの監視・再学習等の運用フェーズが強化されている。","star":"★★★"},{"no":341,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"PoC（Proof of Concept）のAIプロジェクトにおける役割として正しいものはどれか。","choices":{"A":"製品の最終リリース","B":"本格開発前に技術的な実現可能性を少ないリソースで検証する概念実証フェーズ","C":"量産体制の整備","D":"カスタマーサポートの準備"},"answer":"B","answerText":"本格開発前に技術的な実現可能性を少ないリソースで検証する概念実証フェーズ","explanation":"PoC（概念実証）はAIプロジェクトで本格開発前に技術的な実現可能性・AI有効性を少ないコスト・時間で検証するフェーズ。PoCの結果を基に本格投資の意思決定を行う。","star":"★★★"},{"no":342,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"MLOps（Machine Learning Operations）の説明として正しいものはどれか。","choices":{"A":"機械学習の数学的理論","B":"機械学習モデルの開発から本番運用・監視・更新を自動化・効率化するプラクティス","C":"データサイエンティストの採用管理","D":"機械学習モデルの理論的評価"},"answer":"B","answerText":"機械学習モデルの開発から本番運用・監視・更新を自動化・効率化するプラクティス","explanation":"MLOpsはDevOpsをMLに適用した概念。データ収集・前処理・学習・評価・デプロイ・監視・再学習のMLパイプラインを自動化・効率化して本番MLシステムの信頼性を高める。","star":"★★★"},{"no":343,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"データドリフト（Data Drift）の説明として正しいものはどれか。","choices":{"A":"データが漏洩する問題","B":"本番データの統計的性質が学習時と変化し、モデルの精度が低下する現象","C":"データが重複する問題","D":"データの欠損が増加する問題"},"answer":"B","answerText":"本番データの統計的性質が学習時と変化し、モデルの精度が低下する現象","explanation":"データドリフトは本番環境の入力データの分布が学習時から変化してモデル性能が劣化する現象。コンセプトドリフト（正解ラベル定義の変化）と区別される。定期的なモニタリングと再学習が必要。","star":"★★★"},{"no":344,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"アジャイル開発とウォーターフォール開発のAIプロジェクトへの適用として正しいものはどれか。","choices":{"A":"AIプロジェクトは常にウォーターフォールが適切","B":"要件が不確実で試行錯誤が必要なAIプロジェクトでは、短いサイクルで改善するアジャイルが適していることが多い","C":"AIプロジェクトはアジャイルのみ使える","D":"ウォーターフォールの方が常にコストが低い"},"answer":"B","answerText":"要件が不確実で試行錯誤が必要なAIプロジェクトでは、短いサイクルで改善するアジャイルが適していることが多い","expla
