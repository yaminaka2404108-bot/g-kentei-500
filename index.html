nation":"AIプロジェクトは要件が不確実でデータ・性能が未知な場合が多いため、短いイテレーションで実験・フィードバック・改善を繰り返すアジャイル的アプローチが適することが多い。","star":"★★★"},{"no":345,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"Dockerがアルゴリズムの本番実装で使われる主な理由として正しいものはどれか。","choices":{"A":"Dockerはデータ分析専用のツール","B":"コンテナにより依存関係を完全にパッケージして、異なる環境で一貫した動作を保証できるから","C":"DockerはGPU利用ができないから","D":"Dockerはデータ収集専用"},"answer":"B","answerText":"コンテナにより依存関係を完全にパッケージして、異なる環境で一貫した動作を保証できるから","explanation":"DockerはOSレベルで仮想化するコンテナ技術。MLモデルとその依存ライブラリを1つのコンテナにまとめることで、開発・ステージング・本番環境の差異なく動作する。CI/CDパイプラインとの相性が良い。","star":"★★★"},{"no":346,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"Jupyter Notebookが機械学習の探索的分析（EDA）で使われる理由として正しいものはどれか。","choices":{"A":"Jupyterはモデルを本番環境にデプロイするツール","B":"コード・可視化・テキストを1ファイルにまとめてインタラクティブに実験・共有できるから","C":"Jupyterは高速なバッチ処理専用","D":"JupyterはSQL専用のツール"},"answer":"B","answerText":"コード・可視化・テキストを1ファイルにまとめてインタラクティブに実験・共有できるから","explanation":"Jupyter Notebookはコードセル・Markdownセル・可視化を1つの.ipynbファイルにまとめたインタラクティブな開発環境。データ分析・EDA・モデル実験の記録と共有に最適。","star":"★★★"},{"no":347,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"Web API（REST API）がMLモデルの公開に使われる主な理由として正しいものはどれか。","choices":{"A":"Web APIは機械学習専用の技術","B":"HTTPでモデルの推論エンドポイントを公開して言語・プラットフォームに依存なくアクセスできるから","C":"Web APIはデータ収集専用","D":"Web APIはデータの前処理のみに使える"},"answer":"B","answerText":"HTTPでモデルの推論エンドポイントを公開して言語・プラットフォームに依存なくアクセスできるから","explanation":"MLモデルをREST APIとして公開することで、クライアントはHTTPリクエストでモデル推論を呼び出せる。言語・フレームワーク非依存でフロントエンド・バックエンド・他サービスと連携できる。","star":"★★★"},{"no":348,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"BPR（Business Process Reengineering）の説明として正しいものはどれか。","choices":{"A":"ビジネスの部分的な最適化","B":"AIを導入するにあたって既存業務プロセスを根本から再設計する変革活動","C":"プログラミングのリファクタリング","D":"ビジネスの予算管理プロセス"},"answer":"B","answerText":"AIを導入するにあたって既存業務プロセスを根本から再設計する変革活動","explanation":"BPR（Business Process Reengineering）はハマーとチャンピーが提唱。AIの導入にあたって既存の業務プロセスを抜本的に見直し・再設計して大幅な生産性向上を図る。","star":"★★☆"},{"no":349,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"AIプロジェクトのステークホルダーのニーズを把握することが重要な理由として正しいものはどれか。","choices":{"A":"ステークホルダーは技術的な実装のみを考えるから","B":"AIが解決すべき問題・評価指標・制約条件を正確に定義するために必要だから","C":"ステークホルダーはデータを提供するから","D":"ステークホルダーのニーズは常に技術的制約と一致するから"},"answer":"B","answerText":"AIが解決すべき問題・評価指標・制約条件を正確に定義するために必要だから","explanation":"ステークホルダー（顧客・事業責任者・ユーザー等）のニーズを正確に把握しないと、技術的には優れても事業的に価値のないAIが作られる。要件定義・目標設定・評価指標の定義に必要。","star":"★★★"},{"no":350,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"クラウドがAIプロジェクトに多く使われる理由として正しいものはどれか。","choices":{"A":"クラウドはセキュリティが不要だから","B":"GPU等の計算リソースをオンデマンドで使え、大規模なデータ処理・学習が柔軟にできるから","C":"クラウドは常にオンプレミスより安いから","D":"クラウドはデータのプライバシーを自動的に保護するから"},"answer":"B","answerText":"GPU等の計算リソースをオンデマンドで使え、大規模なデータ処理・学習が柔軟にできるから","explanation":"クラウド（AWS・GCP・Azure等）は大量のGPUサーバーをオンデマンドで使えるため、大規模な機械学習の学習・推論が自在。初期投資不要でスケーラブル。","star":"★★★"},{"no":351,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"オープン・イノベーションのAIプロジェクトにおける意義として正しいものはどれか。","choices":{"A":"自社のみでAI開発を完結させること","B":"大学・スタートアップ・他企業等の外部のアイデア・技術を積極的に取り込んでAI開発を加速させること","C":"競合他社の技術を無断で使用すること","D":"オープンソースのみで開発すること"},"answer":"B","answerText":"大学・スタートアップ・他企業等の外部のアイデア・技術を積極的に取り込んでAI開発を加速させること","explanation":"オープン・イノベーションはチェスブロー（Chesbrough）が提唱。外部（大学・スタートアップ・他社）の技術・アイデアを取り込み、自社の技術も外部提供することで相互にイノベーションを加速させる。","star":"★★★"},{"no":352,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"産学連携がAIプロジェクトで期待される効果として正しいものはどれか。","choices":{"A":"大学のデータを無料で使えること","B":"企業の実課題と大学の最先端研究をつなぎ、実用的なAI技術の開発・人材育成を促進すること","C":"大学が全ての開発コストを負担すること","D":"産学連携は大企業のみが対象"},"answer":"B","answerText":"企業の実課題と大学の最先端研究をつなぎ、実用的なAI技術の開発・人材育成を促進すること","explanation":"産学連携はデータ・実課題を持つ企業と、最先端技術・研究者・学生を持つ大学が共同研究・人材育成を行う。AIの基礎研究から実用化までの橋渡しに重要な役割を果たす。","star":"★★★"},{"no":353,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"データサイエンティストの主な役割として正しいものはどれか。","choices":{"A":"ハードウェアのメンテナンスのみ","B":"データの収集・前処理・分析・モデリング・評価・ビジネスへの提言を行う専門家","C":"プロジェクトの予算管理のみ","D":"コードのデバッグのみ"},"answer":"B","answerText":"データの収集・前処理・分析・モデリング・評価・ビジネスへの提言を行う専門家","explanation":"データサイエンティストはデータ収集から分析・機械学習モデル構築・評価・ビジネス提言まで幅広く担当。統計学・ML・プログラミング・ドメイン知識・コミュニケーション能力が求められる。","star":"★★★"},{"no":354,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"Pythonが機械学習で最も広く使われる理由として正しいものはどれか。","choices":{"A":"PythonはGPUの計算に最適化された言語だから","B":"豊富なMLライブラリ（NumPy・pandas・scikit-learn・TensorFlow・PyTorch等）が揃っており生産性が高いから","C":"Pythonは型が厳格で大規模開発に最適だから","D":"PythonはC++より実行速度が速いから"},"answer":"B","answerText":"豊富なMLライブラリ（NumPy・pandas・scikit-learn・TensorFlow・PyTorch等）が揃っており生産性が高いから","explanation":"PythonはNumPy・pandas・scikit-learn・TensorFlow・PyTorchなどの豊富なMLエコシステムと読みやすい構文で、データサイエンス・AI分野の事実上の標準言語となっている。","star":"★★★"},{"no":355,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"モデルのヘルスモニタリングの目的として正しいものはどれか。","choices":{"A":"モデルのCPU温度を監視する","B":"本番環境でのモデルの精度・予測分布等の指標を継続的に監視してモデルの劣化を早期に検知する","C":"モデルのコード品質を評価する","D":"モデルの電力消費を最小化する"},"answer":"B","answerText":"本番環境でのモデルの精度・予測分布等の指標を継続的に監視してモデルの劣化を早期に検知する","explanation":"本番デプロイ後もデータドリフト・コンセプトドリフト等でモデル精度が劣化する。ヘルスモニタリングは精度・データ分布・レイテンシ等を継続監視してモデル劣化を早期発見し再学習のトリガーとする。","star":"★★★"},{"no":356,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"他企業・他業種との連携がAIプロジェクトで価値を持つ理由として正しいものはどれか。","choices":{"A":"競合他社のデータを入手できるから","B":"自社だけでは持てないデータや知見を組み合わせることでAIの性能・応用範囲を拡大できるから","C":"連携することでコストがかからないから","D":"他社のモデルを無断で使えるから"},"answer":"B","answerText":"自社だけでは持てないデータや知見を組み合わせることでAIの性能・応用範囲を拡大できるから","explanation":"異業種連携はそれぞれが保有する異なるデータ・知見を組み合わせることで、単独では実現できない高度なAIサービスや新たなビジネスモデルを生み出す可能性がある。","star":"★★☆"},{"no":357,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"AIのビジネス活用において最初に行うべきこととして最も適切なものはどれか。","choices":{"A":"すぐにデータを収集して機械学習モデルを構築する","B":"解決すべきビジネス課題を明確にし、AIで解決できるかを検討する","C":"最新のDLモデルを選択して適用する","D":"競合他社のAI戦略を模倣する"},"answer":"B","answerText":"解決すべきビジネス課題を明確にし、AIで解決できるかを検討する","explanation":"AIのビジネス活用はまず「解決すべきビジネス課題は何か」「AIで解決できるか」「ROIはあるか」を検討することが重要。技術が先行してビジネス価値が不明確なプロジェクトは失敗しやすい。","star":"★★★"},{"no":358,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"AIシステムの運用において「再学習（Retraining）」が必要になる主なケースとして正しいものはどれか。","choices":{"A":"モデルが完全に正確な予測をしている場合","B":"データドリフト等でモデルの精度が低下した場合、または新しいパターンに対応する必要がある場合","C":"ハードウェアを更新した場合","D":"モデルを別の言語に変換した場合"},"answer":"B","answerText":"データドリフト等でモデルの精度が低下した場合、または新しいパターンに対応する必要がある場合","explanation":"本番データの分布変化（データドリフト）や正解ラベルの定義変化（コンセプトドリフト）でモデル性能が劣化した際に、新データで再学習が必要。定期的な再学習スケジュールを設定することも有効。","star":"★★★"},{"no":359,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"アノテーション（Annotation）のAIにおける役割として正しいものはどれか。","choices":{"A":"データを暗号化する処理","B":"学習データにラベル（正解）を付与する作業","C":"データをクラスタリングする処理","D":"モデルの重みを更新する処理"},"answer":"B","answerText":"学習データにラベル（正解）を付与する作業","explanation":"アノテーションは訓練データに正解ラベル（画像の物体境界ボックス・テキストの感情ラベル等）を人手で付与する作業。AIの品質はアノテーションの質に大きく依存する。","star":"★★★"},{"no":360,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"オープンデータセット（Open Dataset）の利点として正しいものはどれか。","choices":{"A":"常に最高品質のデータが保証されている","B":"一般に公開されているため無償で研究・開発に利用でき、再現性や比較評価が容易","C":"商用利用が常に可能","D":"プライバシー情報が含まれない"},"answer":"B","answerText":"一般に公開されているため無償で研究・開発に利用でき、再現性や比較評価が容易","explanation":"オープンデータセット（ImageNet・MNIST・COCO等）は公開データのためアクセス・利用が容易で、研究の再現性・モデルのベンチマーク比較に重要。ただしライセンス・品質・バイアスには注意が必要。","star":"★★★"},{"no":361,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"コーパス（Corpus）の説明として正しいものはどれか。","choices":{"A":"音声認識用の音響データ","B":"言語処理の学習・研究に使う大規模なテキストデータの集合体","C":"画像分類用のデータセット","D":"医療診断用のデータ"},"answer":"B","answerText":"言語処理の学習・研究に使う大規模なテキストデータの集合体","explanation":"コーパスはNLP研究・学習に使う大規模なテキストの集合（例：Wikipedia全文・ニュース記事コーパス・対訳コーパス等）。コーパスの量・質は言語モデルの性能に直結する。","star":"★★★"},{"no":362,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"データリーケージ（Data Leakage）の説明として正しいものはどれか。","choices":{"A":"データがインターネットに漏洩する問題","B":"訓練時にテストデータの情報が誤って混入し、モデル評価が過大に評価される問題","C":"データが欠損する問題","D":"データの圧縮に失敗する問題"},"answer":"B","answerText":"訓練時にテストデータの情報が誤って混入し、モデル評価が過大に評価される問題","explanation":"データリーケージはテストデータの情報が訓練データに漏れ込む問題。例えばターゲット変数の将来情報を特徴量に使う等。見かけ上は高精度でも実際の本番データでは機能しない。","star":"★★★"},{"no":363,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"欠損値（Missing Value）の処理方法として適切でないものはどれか。","choices":{"A":"平均値・中央値での補完","B":"KNNや回帰モデルで予測補完","C":"欠損フラグの変数追加","D":"欠損値を全て正解値として扱う"},"answer":"D","answerText":"欠損値を全て正解値として扱う","explanation":"欠損値を正解値として扱うのは誤り。一般的な処理は欠損を除去（行・列削除）、統計値補完（平均・中央値・最頻値）、モデルによる予測補完、欠損フラグ変数追加等。","star":"★★★"},{"no":364,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"サンプリング・バイアスの説明として正しいものはどれか。","choices":{"A":"データのランダムサンプリングにより発生する統計的誤差","B":"データ収集の方法・対象・タイミング等が偏ることで学習データが母集団を適切に表現できない問題","C":"特定の統計量が偏る問題","D":"GPU処理のサンプリング誤差"},"answer":"B","answerText":"データ収集の方法・対象・タイミング等が偏ることで学習データが母集団を適切に表現できない問題","explanation":"サンプリング・バイアスはデータ収集の偏りにより学習データが実世界の分布を適切に反映しない問題。例えば特定の地域・年齢層のみのデータで学習したモデルは他の集団に適用できない可能性がある。","star":"★★★"},{"no":365,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"データ収集において外部データを利用する際に注意すべき点として最も重要なものはどれか。","choices":{"A":"データが多いほど良いから制限なく収集する","B":"著作権・プライバシー・利用規約・バイアス等に注意して適切な許可を得る","C":"データは全て無償で使える","D":"外部データは品質が高いと仮定して検証なく使う"},"answer":"B","answerText":"著作権・プライバシー・利用規約・バイアス等に注意して適切な許可を得る","explanation":"外部データ利用は著作権（著作権法・ライセンス確認）・個人情報（個人情報保護法・GDPR）・利用規約・データ品質・バイアスに注意が必要。適切な許諾を得ることが法的・倫理的に重要。","star":"★★★"},{"no":366,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"特徴量エンジニアリング（Feature Engineering）の説明として正しいものはどれか。","choices":{"A":"モデルのアーキテクチャを設計すること","B":"機械学習のために原データを変換・加工して有用な特徴量を作成する作業","C":"アノテーションを効率化するツール","D":"データを収集するクローラー"},"answer":"B","answerText":"機械学習のために原データを変換・加工して有用な特徴量を作成する作業","explanation":"特徴量エンジニアリングは原データから機械学習モデルが学習しやすい特徴量（変数）を作成・選択する作業。ドメイン知識が重要で、モデル精度に大きく影響する。DLでは一部自動化される。","star":"★★★"},{"no":367,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"外れ値（Outlier）への対処として最も適切でないものはどれか。","choices":{"A":"ドメイン知識で外れ値が正当なデータか異常値かを判断する","B":"機械的にZスコアが3以上の全ての値を常に削除する","C":"外れ値の原因を分析する","D":"外れ値に頑健なモデルを選択する"},"answer":"B","answerText":"機械的にZスコアが3以上の全ての値を常に削除する","explanation":"外れ値を全て機械的に削除するのは不適切。実際の外れ値には正当なデータも含まれる可能性があり、ドメイン知識や文脈に基づいて判断が必要。外れ値検出→原因分析→対処（除外・変換・頑健なモデル）の流れが重要。","star":"★★★"},{"no":368,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"クラス不均衡データへの対処法として正しいものはどれか。","choices":{"A":"不均衡なデータには機械学習を適用できない","B":"オーバーサンプリング・アンダーサンプリング・クラス重み付け・適切な評価指標の選択等で対処する","C":"不均衡なデータは全て削除する","D":"多数クラスのみを使う"},"answer":"B","answerText":"オーバーサンプリング・アンダーサンプリング・クラス重み付け・適切な評価指標の選択等で対処する","explanation":"クラス不均衡（例：詐欺は全体の0.1%）は少数クラスが学習されにくい問題。SMOTE等のオーバーサンプリング・多数クラスのアンダーサンプリング・損失関数でのクラス重み付け・評価指標（AUC・F1スコア）の変更で対処する。","star":"★★★"},{"no":369,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"データの前処理において正規化（Normalization）と標準化（Standardization）の違いとして正しいものはどれか。","choices":{"A":"両者は全く同じ処理","B":"正規化はデータを[0,1]等の特定範囲にスケーリングし、標準化は平均0・標準偏差1に変換する","C":"正規化はNNにのみ使える","D":"標準化は画像にのみ使える"},"answer":"B","answerText":"正規化はデータを[0,1]等の特定範囲にスケーリングし、標準化は平均0・標準偏差1に変換する","explanation":"正規化（Min-Max Scaling）：x' = (x-min)/(max-min)で[0,1]に。標準化（Z-score）：x' = (x-μ)/σで平均0・分散1に変換。外れ値に頑健なのは標準化、特定の範囲が必要なのは正規化。","star":"★★★"},{"no":370,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"平均（算術平均）の計算式として正しいものはどれか。","choices":{"A":"データの最大値と最小値の和を2で割った値","B":"全データの和をデータ数で割った値","C":"データを昇順に並べたときの中央の値","D":"最も頻繁に出現する値"},"answer":"B","answerText":"全データの和をデータ数で割った値","explanation":"算術平均 x̄ = (x1+x2+...+xn)/n。分布の重心。外れ値の影響を受けやすい。","star":"★★★"},{"no":371,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"中央値（メジアン）の説明として正しいものはどれか。","choices":{"A":"全データの和をデータ数で割った値","B":"データを昇順に並べたときの中央の値（外れ値の影響を受けにくい）","C":"最も頻繁に出現する値","D":"全データの積のn乗根"},"answer":"B","answerText":"データを昇順に並べたときの中央の値（外れ値の影響を受けにくい）","explanation":"中央値（Median）はデータを昇順に並べたときの中央の値。奇数個ならn+1/2番目、偶数個なら中央2つの平均。外れ値の影響を受けにくい頑健な中心傾向の指標。","star":"★★★"},{"no":372,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"最頻値（モード、最頻値）の説明として正しいものはどれか。","choices":{"A":"データの最大値","B":"全データの平均","C":"データの中で最も頻繁に出現する値","D":"データの標準偏差"},"answer":"C","answerText":"データの中で最も頻繁に出現する値","explanation":"最頻値（Mode）はデータ集合の中で最も多く出現する値。カテゴリデータ・離散データの代表値として使われる。複数存在する場合もある（多モード分布）。","star":"★★★"},{"no":373,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"分散（Variance）の説明として正しいものはどれか。","choices":{"A":"データの中央値からの平均絶対偏差","B":"各データ値と平均の差の2乗の平均（平均からのばらつきの指標）","C":"データの範囲（最大値−最小値）","D":"データの中央値"},"answer":"B","answerText":"各データ値と平均の差の2乗の平均（平均からのばらつきの指標）","explanation":"分散 σ² = Σ(xi - x̄)²/n。各データと平均の差（偏差）を2乗して平均した値。単位がデータの2乗なので解釈のために標準偏差（分散の平方根）がよく使われる。","star":"★★★"},{"no":374,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"標準偏差（Standard Deviation）の説明として正しいものはどれか。","choices":{"A":"分散の2乗","B":"分散の平方根（元のデータと同じ単位でばらつきを表す指標）","C":"データの最大値と最小値の差","D":"平均の2乗"},"answer":"B","answerText":"分散の平方根（元のデータと同じ単位でばらつきを表す指標）","explanation":"標準偏差 σ = √(Σ(xi-x̄)²/n)。分散の平方根なので元のデータと同じ単位になり解釈が容易。正規分布では平均±σに約68%、平均±2σに約95%のデータが含まれる。","star":"★★★"},{"no":375,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"正規分布（ガウス分布）の特徴として正しいものはどれか。","choices":{"A":"左右非対称のベル型の分布","B":"平均を中心に左右対称のベル型の分布で、平均・中央値・最頻値が一致する","C":"左に裾が長い歪んだ分布","D":"離散的な値のみをとる分布"},"answer":"B","answerText":"平均を中心に左右対称のベル型の分布で、平均・中央値・最頻値が一致する","explanation":"正規分布N(μ,σ²)は平均μを中心に左右対称のベル型。平均＝中央値＝最頻値。平均±σに68%、±2σに95%、±3σに99.7%のデータ（68-95-99.7ルール）。","star":"★★★"},{"no":376,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"共分散（Covariance）の説明として正しいものはどれか。","choices":{"A":"1つの変数のばらつきを測る指標","B":"2つの変数が一緒に変動する傾向（線形的な相互関係）を表す統計量","C":"変数の平均値の差","D":"変数の分散の差"},"answer":"B","answerText":"2つの変数が一緒に変動する傾向（線形的な相互関係）を表す統計量","explanation":"共分散 Cov(X,Y) = E[(X-μX)(Y-μY)]。正なら正の相関（一方が増えると他方も増える）、負なら負の相関。単位がX・Yの積の単位なので相関係数で標準化することが多い。","star":"★★★"},{"no":377,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"相関係数（Pearson相関係数）の値の範囲として正しいものはどれか。","choices":{"A":"0から1の範囲","B":"0から∞の範囲","C":"-1から1の範囲（0：無相関、±1：完全な線形関係）","D":"−∞から+∞"},"answer":"C","answerText":"-1から1の範囲（0：無相関、±1：完全な線形関係）","explanation":"ピアソン相関係数 r = Cov(X,Y)/(σX×σY)。-1≤r≤1。r=1は完全な正の線形相関、r=-1は完全な負の線形相関、r=0は無相関（線形関係なし）。","star":"★★★"},{"no":378,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"ベルヌーイ分布の説明として正しいものはどれか。","choices":{"A":"連続値の分布","B":"成功確率pの1回試行で0または1の2値をとる離散分布","C":"正規分布の特殊ケース","D":"ポアソン分布の別名"},"answer":"B","answerText":"成功確率pの1回試行で0または1の2値をとる離散分布","explanation":"ベルヌーイ分布はコイントス等の1回試行（成功p、失敗1-p）のモデル。P(X=1)=p、P(X=0)=1-p。期待値=p、分散=p(1-p)。","star":"★★★"},{"no":379,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"二項分布（Binomial Distribution）の説明として正しいものはどれか。","choices":{"A":"1回のベルヌーイ試行の分布","B":"成功確率pのベルヌーイ試行をn回繰り返したときの成功回数の分布","C":"連続型の正規分布","D":"指数関数的な確率分布"},"answer":"B","answerText":"成功確率pのベルヌーイ試行をn回繰り返したときの成功回数の分布","explanation":"二項分布B(n,p)はn回の独立なベルヌーイ試行での成功回数X。P(X=k)=C(n,k)p^k(1-p)^(n-k)。期待値=np、分散=np(1-p)。n→∞でポアソン分布や正規分布に近似できる。","star":"★★★"},{"no":380,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"ポアソン分布の説明として正しいものはどれか。","choices":{"A":"時間的・空間的に一定確率でランダムに発生する事象の単位時間・空間内の発生回数の分布","B":"2値をとる分布","C":"連続型の分布","D":"多次元正規分布の特殊ケース"},"answer":"A","answerText":"時間的・空間的に一定確率でランダムに発生する事象の単位時間・空間内の発生回数の分布","explanation":"ポアソン分布Po(λ)は単位時間あたりの期待発生回数λで稀な事象の発生回数をモデル化。P(X=k)=e^(-λ)λ^k/k!。期待値=分散=λ。コールセンター着信・交通事故発生回数等に使われる。","star":"★★★"},{"no":381,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"度数分布（Frequency Distribution）の説明として正しいものはどれか。","choices":{"A":"データを降順に並べた一覧","B":"データをいくつかの階級に分けて、各階級の度数（データ数）を集計した分布表","C":"データの平均と分散をまとめた表","D":"データの相関行列"},"answer":"B","answerText":"データをいくつかの階級に分けて、各階級の度数（データ数）を集計した分布表","explanation":"度数分布はデータをいくつかの区間（階級）に分けて各区間のデータ数（度数）を集計したもの。ヒストグラムとして視覚化される。データの分布形状を把握するための基本的な統計手法。","star":"★★★"},{"no":382,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"外れ値（Outlier）の説明として正しいものはどれか。","choices":{"A":"データの最大値と最小値の差","B":"他のデータと大きく離れた値で、測定誤差や特殊なケースを表す可能性がある","C":"平均から1標準偏差以内の値","D":"最も頻繁に出現する値"},"answer":"B","answerText":"他のデータと大きく離れた値で、測定誤差や特殊なケースを表す可能性がある","explanation":"外れ値は他のデータポイントと比較して極端に大きい・小さい値。原因は測定誤差・データ入力ミス・真の例外的なケース等。外れ値は平均を大きくゆがめる（中央値・MAEは頑健）。","star":"★★★"},{"no":383,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"移動平均（Moving Average）の説明として正しいものはどれか。","choices":{"A":"全データの平均","B":"時系列データの一定期間（ウィンドウ）の平均を時点をずらしながら計算する時系列平滑化手法","C":"データを移動させる変換","D":"確率の移動"},"answer":"B","answerText":"時系列データの一定期間（ウィンドウ）の平均を時点をずらしながら計算する時系列平滑化手法","explanation":"移動平均は時系列データで一定ウィンドウ（例：7日間）の平均を計算し、ウィンドウを1時点ずつ移動させる。短期の変動を除去してトレンドを把握しやすくする。株価・気温の平滑化に使われる。","star":"★★★"},{"no":384,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"基礎統計","question":"標準化（Zスコア変換）の計算式として正しいものはどれか。","choices":{"A":"z = (x - 最大値) / (最大値 - 最小値)","B":"z = (x - 平均μ) / 標準偏差σ","C":"z = x × 標準偏差","D":"z = x / 平均"},"answer":"B","answerText":"z = (x - 平均μ) / 標準偏差σ","explanation":"Zスコア変換 z = (x - μ)/σ。変換後のデータは平均0・標準偏差1になる（標準正規分布）。スケールが異なる特徴量を比較可能にする前処理として機械学習で広く使われる。","star":"★★★"},{"no":385,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"帰無仮説（Null Hypothesis）の説明として正しいものはどれか。","choices":{"A":"証明したい仮説そのもの","B":"「差がない・効果がない・関係がない」という検定の基準となる仮説","C":"常に正しい仮説","D":"必ず棄却される仮説"},"answer":"B","answerText":"「差がない・効果がない・関係がない」という検定の基準となる仮説","explanation":"帰無仮説H0は「差がない・効果がない」という保守的な仮説。統計的仮説検定はデータからH0が成立した場合にこのデータ（以上に極端な値）が得られる確率（p値）を計算し、小さければH0を棄却する。","star":"★★★"},{"no":386,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"対立仮説（Alternative Hypothesis）の説明として正しいものはどれか。","choices":{"A":"帰無仮説と同じ意味","B":"帰無仮説が棄却された場合に採択される、研究者が証明したい仮説","C":"常に棄却される仮説","D":"データから自動的に生成される仮説"},"answer":"B","answerText":"帰無仮説が棄却された場合に採択される、研究者が証明したい仮説","explanation":"対立仮説H1（またはHa）は帰無仮説の否定で「差がある・効果がある・関係がある」という研究者が証明したい仮説。p値が有意水準（α=0.05等）を下回ればH0を棄却してH1を採択する。","star":"★★★"},{"no":387,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"p値の説明として正しいものはどれか。","choices":{"A":"帰無仮説が真である確率","B":"帰無仮説が真であると仮定した場合に、観測されたデータ（以上に極端な結果）が得られる確率","C":"対立仮説が真である確率","D":"モデルの精度"},"answer":"B","answerText":"帰無仮説が真であると仮定した場合に、観測されたデータ（以上に極端な結果）が得られる確率","explanation":"p値はH0が真の場合に観測値以上の極端な結果が出る確率。p<0.05（有意水準）ならH0を棄却（統計的に有意）。注意：p値はH0が真である確率ではない。","star":"★★★"},{"no":388,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"疑似相関（Spurious Correlation）の説明として正しいものはどれか。","choices":{"A":"真の因果関係がある2変数間の相関","B":"第3の変数（交絡変数）が原因で実際には直接関係のない2変数が相関しているように見える現象","C":"相関係数が1の場合の相関","D":"偏相関係数が0の場合"},"answer":"B","answerText":"第3の変数（交絡変数）が原因で実際には直接関係のない2変数が相関しているように見える現象","explanation":"疑似相関は第3の交絡変数が両変数に影響しているため見かけの相関が生じる。例えば「アイスクリームの売上と溺死者数の相関」は「気温（第3変数）」が原因。相関≠因果。","star":"★★★"},{"no":389,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"偏相関係数の説明として正しいものはどれか。","choices":{"A":"2変数間のピアソン相関係数","B":"他の変数の影響を取り除いた上での2変数間の純粋な相関係数","C":"変数の分散の比","D":"データの歪度"},"answer":"B","answerText":"他の変数の影響を取り除いた上での2変数間の純粋な相関係数","explanation":"偏相関係数は他の変数（交絡変数）の影響をコントロールした上での2変数間の相関を測る指標。疑似相関かどうかの判定に有用。例えば気温を統制した場合のアイス売上と溺死の偏相関は0に近くなる。","star":"★★★"},{"no":390,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"最尤法（Maximum Likelihood Estimation）の説明として正しいものはどれか。","choices":{"A":"パラメータの事前分布と観測データから事後分布を推定する","B":"観測データが得られる確率（尤度）を最大化するパラメータを推定する手法","C":"データの平均を推定する手法","D":"モデルの複雑さを最小化する手法"},"answer":"B","answerText":"観測データが得られる確率（尤度）を最大化するパラメータを推定する手法","explanation":"最尤推定（MLE）は尤度関数L(θ) = P(data|θ)を最大化するパラメータθを求める。多くの統計モデル・機械学習の損失関数（log尤度の最大化＝負の対数尤度の最小化）の基礎。","star":"★★★"},{"no":391,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"ベイズ推定と頻度主義推定の最大の違いとして正しいものはどれか。","choices":{"A":"ベイズは大量のデータを必要とし、頻度主義は少量で良い","B":"ベイズはパラメータに事前分布を仮定して事後分布を更新し、頻度主義はパラメータを固定した未知の定数として推定する","C":"ベイズは連続データのみ、頻度主義は離散データのみ","D":"両者は全く同じ推定を行う"},"answer":"B","answerText":"ベイズはパラメータに事前分布を仮定して事後分布を更新し、頻度主義はパラメータを固定した未知の定数として推定する","explanation":"ベイズ推定：P(θ|data) ∝ P(data|θ)×P(θ)でパラメータの事後分布を求める（事前知識を活用）。頻度主義：パラメータは固定の未知定数でデータから点推定する（MLE等）。","star":"★★★"},{"no":392,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"マハラノビス距離の説明として正しいものはどれか。","choices":{"A":"ユークリッド距離と同一","B":"変数間の相関と分散を考慮した多変量の距離指標（単位のスケールに依存しない）","C":"マンハッタン距離の別名","D":"ハミング距離の拡張"},"answer":"B","answerText":"変数間の相関と分散を考慮した多変量の距離指標（単位のスケールに依存しない）","explanation":"マハラノビス距離はD² = (x-μ)^T Σ^{-1} (x-μ)。共分散行列Σで変数間の相関・スケールを正規化した距離。外れ値検出・多変量異常検知・判別分析に使われる。","star":"★★★"},{"no":393,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"コサイン類似度の説明として正しいものはどれか。","choices":{"A":"2ベクトル間のユークリッド距離","B":"2ベクトルのなす角のコサインで表される類似度（値が1に近いほど類似）","C":"ベクトルのL2ノルム","D":"行列のコサイン変換"},"answer":"B","answerText":"2ベクトルのなす角のコサインで表される類似度（値が1に近いほど類似）","explanation":"コサイン類似度 = (A·B)/(||A||×||B||)。-1（逆方向）〜1（同方向）の値をとる。ベクトルの長さでなく方向の類似度を測るため、テキスト・word2vec埋め込みの類似度計算に広く使われる。","star":"★★★"},{"no":394,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"ユークリッド距離の説明として正しいものはどれか。","choices":{"A":"2点間の直線距離（ピタゴラスの定理の拡張）","B":"2点間の市街地距離（各座標の差の絶対値の和）","C":"2ベクトルのなす角","D":"分散の平方根"},"answer":"A","answerText":"2点間の直線距離（ピタゴラスの定理の拡張）","explanation":"ユークリッド距離 d = √(Σ(xi-yi)²)。2点間の最短直線距離。k-means・k-NN等で最も基本的な距離指標。高次元では次元の呪いにより全点間距離が均一化する問題がある。","star":"★★★"},{"no":395,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"推定・検定","question":"確率密度関数（PDF）の説明として正しいものはどれか。","choices":{"A":"離散型確率変数の各値の確率を表す関数","B":"連続型確率変数の特定の区間に値が含まれる確率を面積として表す関数","C":"累積分布関数の別名","D":"確率の最大値を求める関数"},"answer":"B","answerText":"連続型確率変数の特定の区間に値が含まれる確率を面積として表す関数","explanation":"確率密度関数f(x)は連続型確率変数の「密度」を表す。P(a≤X≤b)=∫f(x)dx（a〜b）。f(x)≥0かつ∫f(x)dx=1（全確率=1）。点確率は0でf(x)は確率でなく「密度」。","star":"★★★"},{"no":396,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"条件付き確率P(A|B)の説明として正しいものはどれか。","choices":{"A":"BとAが独立な場合の確率","B":"Bが起きたという条件下でAが起きる確率：P(A|B) = P(A∩B) / P(B)","C":"AとBが同時に起きる確率","D":"AまたはBが起きる確率"},"answer":"B","answerText":"Bが起きたという条件下でAが起きる確率：P(A|B) = P(A∩B) / P(B)","explanation":"条件付き確率P(A|B) = P(A∩B)/P(B)（P(B)>0）。Bが起きたことを前提とした場合のAの確率。機械学習では「クラスCのデータが特徴量xを持つ確率P(x|C)」のようにナイーブベイズ等で使われる。","star":"★★★"},{"no":397,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"ベイズの定理（Bayes' Theorem）として正しいものはどれか。","choices":{"A":"P(A|B) = P(A)×P(B)","B":"P(A|B) = P(B|A)×P(A) / P(B)","C":"P(A|B) = P(A) + P(B)","D":"P(A|B) = P(B|A) / P(A)"},"answer":"B","answerText":"P(A|B) = P(B|A)×P(A) / P(B)","explanation":"ベイズの定理：P(A|B) = P(B|A)P(A)/P(B)。事前確率P(A)と尤度P(B|A)から事後確率P(A|B)を計算する。スパムフィルタ・医療診断・機械学習の推論等に広く使われる。","star":"★★★"},{"no":398,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"独立な2事象AとBの同時確率P(A∩B)として正しいものはどれか。","choices":{"A":"P(A) + P(B)","B":"P(A) × P(B)","C":"P(A|B)","D":"P(B|A) × P(B)"},"answer":"B","answerText":"P(A) × P(B)","explanation":"AとBが独立な場合：P(A∩B) = P(A)×P(B)。独立性の定義。コイントス2回の結果など互いに影響しない事象に適用できる。","star":"★★★"},{"no":399,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"期待値（Expected Value）の説明として正しいものはどれか。","choices":{"A":"確率変数の最大値","B":"確率変数の値を確率で重み付けした加重平均（長期的な平均）","C":"確率変数の中央値","D":"確率変数の標準偏差"},"answer":"B","answerText":"確率変数の値を確率で重み付けした加重平均（長期的な平均）","explanation":"期待値E[X] = Σxi×P(xi)（離散）またはE[X] = ∫x×f(x)dx（連続）。ランダムな試行を無限回繰り返した場合の長期的な平均値。線形性：E[aX+bY] = aE[X]+bE[Y]。","star":"★★★"},{"no":400,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"確率変数の説明として正しいものはどれか。","choices":{"A":"確率の値そのもの","B":"試行の結果として決まる数値（結果を数値にマッピングする関数）","C":"標本空間そのもの","D":"平均と標準偏差を合わせた概念"},"answer":"B","answerText":"試行の結果として決まる数値（結果を数値にマッピングする関数）","explanation":"確率変数は標本空間Ω上の関数X: Ω→ℝで、試行の各結果に数値を割り当てる。コイントスなら表=1・裏=0とするX、サイコロなら1〜6の目の値等。確率分布を通じて分析する。","star":"★★★"},{"no":401,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"相互情報量（Mutual Information）の説明として正しいものはどれか。","choices":{"A":"2変数間の線形相関","B":"確率変数Xの情報がYについてどれだけ情報を与えるか（2変数の統計的依存性）を測る指標","C":"2変数の共分散","D":"ベルヌーイ分布の期待値"},"answer":"B","answerText":"確率変数Xの情報がYについてどれだけ情報を与えるか（2変数の統計的依存性）を測る指標","explanation":"相互情報量I(X;Y) = H(X) - H(X|Y) = H(Y) - H(Y|X) = Σp(x,y)log(p(x,y)/(p(x)p(y)))。X・Yの統計的依存性を測る非線形指標。特徴選択に使われる。","star":"★★★"},{"no":402,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"確率分布（Probability Distribution）の説明として正しいものはどれか。","choices":{"A":"確率変数の最大値の分布","B":"確率変数がとる各値（または区間）に確率を割り当てた関数・表","C":"データの度数分布と常に同じ","D":"確率変数の平均と分散の組み合わせ"},"answer":"B","answerText":"確率変数がとる各値（または区間）に確率を割り当てた関数・表","explanation":"確率分布は確率変数の値と確率の対応を表す。離散型（ベルヌーイ・二項・ポアソン等）と連続型（正規・一様・指数分布等）がある。機械学習ではデータの生成過程をモデル化するために使われる。","star":"★★★"},{"no":403,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"KLダイバージェンス（カルバック・ライブラー情報量）の性質として正しいものはどれか。","choices":{"A":"KL(P||Q) = KL(Q||P)（対称性がある）","B":"KL(P||Q) ≥ 0 かつ KL(P||Q) = 0 ↔ P = Q（非負かつ等号条件あり、ただし非対称）","C":"2つの分布間の真の距離（距離公理を満たす）","D":"確率変数の期待値と分散の組み合わせ"},"answer":"B","answerText":"KL(P||Q) ≥ 0 かつ KL(P||Q) = 0 ↔ P = Q（非負かつ等号条件あり、ただし非対称）","explanation":"KL(P||Q) = ΣP(x)log(P(x)/Q(x)) ≥ 0（非負性）。P=QならKL=0。ただしKL(P||Q)≠KL(Q||P)（非対称）なので数学的な距離ではない。VAEのElBOで使われる。","star":"★★★"},{"no":404,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"確率的勾配降下法（SGD）における確率的という意味として正しいものはどれか。","choices":{"A":"ランダムなモデルアーキテクチャを選ぶ","B":"ランダムにサンプリングしたミニバッチの勾配で近似的に勾配を計算する","C":"確率的にパラメータを初期化する","D":"ランダムな学習率を使う"},"answer":"B","answerText":"ランダムにサンプリングしたミニバッチの勾配で近似的に勾配を計算する","explanation":"SGDの「確率的」は全データでなくランダムにサンプリングしたミニバッチでの勾配が確率変数（推定量）になることを指す。各イテレーションの勾配は真の勾配の不偏推定量。","star":"★★★"},{"no":405,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"最小二乗法（Least Squares Method）の説明として正しいものはどれか。","choices":{"A":"最大尤度の解と常に異なる","B":"各データ点の残差（誤差）の2乗和を最小化してパラメータを推定する手法（正規分布の誤差を仮定した場合MLE≡最小二乗法）","C":"データの中央値を求める手法","D":"最大値を求める最適化手法"},"answer":"B","answerText":"各データ点の残差（誤差）の2乗和を最小化してパラメータを推定する手法（正規分布の誤差を仮定した場合MLE≡最小二乗法）","explanation":"最小二乗法はΣ(yi-f(xi;θ))²を最小化するθを求める。線形回帰での閉形解（正規方程式）として解析的に求められる。誤差が正規分布に従う場合は最尤推定と等価。","star":"★★★"},{"no":406,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"確率論","question":"ジェンセンの不等式（Jensen's Inequality）が機械学習で使われる場面として正しいものはどれか。","choices":{"A":"確率変数の分散の計算","B":"凸関数fについてf(E[X]) ≤ E[f(X)]が成立するという不等式（VAEの下界導出等に使用）","C":"正則化の証明","D":"バッチ正規化の理論"},"answer":"B","answerText":"凸関数fについてf(E[X]) ≤ E[f(X)]が成立するという不等式（VAEの下界導出等に使用）","explanation":"ジェンセンの不等式：凸関数fに対してf(E[X])≤E[f(X)]。VAEでのElBO（証拠下界）の導出、EMアルゴリズム、情報理論のKLダイバージェンスの非負性証明等に使われる。","star":"★★☆"},{"no":407,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"行列積（A×B）が定義される条件として正しいものはどれか。","choices":{"A":"AとBが同じサイズの正方行列","B":"AのサイズがM×NでBのサイズがN×Pのとき（AとBの共有する次元がN）","C":"AとBの全要素が正の整数","D":"AとBが対角行列"},"answer":"B","answerText":"AのサイズがM×NでBのサイズがN×Pのとき（AとBの共有する次元がN）","explanation":"行列積AB：AがM×N、BがN×Pのとき積ABはM×P。左の行×右の列で内積を計算。NNの全結合層はy=Wx+bで行列積を使う。","star":"★★★"},{"no":408,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"固有値分解（Eigendecomposition）の説明として正しいものはどれか。","choices":{"A":"行列を上三角行列と下三角行列に分解","B":"正方行列AをA = PDP^{-1}に分解（DはA×の固有値の対角行列）","C":"行列を特異値で分解する手法","D":"行列をLU分解する"},"answer":"B","answerText":"正方行列AをA = PDP^{-1}に分解（DはA×の固有値の対角行列）","explanation":"固有値分解：Av = λv（vが固有ベクトル、λが固有値）。A=PDP^{-1}でDは固有値の対角行列。PCAは共分散行列の固有値分解で主成分（固有ベクトル）と寄与率（固有値）を求める。","star":"★★★"},{"no":409,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"特異値分解（SVD）の説明として正しいものはどれか。","choices":{"A":"正方行列のみに適用できる分解","B":"任意の行列MをM = UΣV^Tに分解（U・Vが直交行列、Σが特異値の対角行列）","C":"行列の逆行列を求める手法","D":"行列の固有値のみを求める手法"},"answer":"B","answerText":"任意の行列MをM = UΣV^Tに分解（U・Vが直交行列、Σが特異値の対角行列）","explanation":"SVD：M(m×n) = U(m×m)Σ(m×n)V^T(n×n)。任意サイズの行列に適用可能。PCAと等価な次元削減・推薦システムの行列分解・LSA（潜在意味解析）に使われる。","star":"★★★"},{"no":410,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"勾配（Gradient）の説明として正しいものはどれか。","choices":{"A":"1変数関数の2階微分","B":"多変数関数の各変数に対する偏微分を並べたベクトル（最も急激に増加する方向を示す）","C":"行列の行列式","D":"確率変数の期待値"},"answer":"B","answerText":"多変数関数の各変数に対する偏微分を並べたベクトル（最も急激に増加する方向を示す）","explanation":"勾配∇f = (∂f/∂x1, ∂f/∂x2, ..., ∂f/∂xn)^T。勾配は関数が最も急激に増加する方向と大きさを示す。勾配降下法はパラメータを勾配の逆方向に更新して損失関数を最小化する。","star":"★★★"},{"no":411,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"偏微分（Partial Derivative）の説明として正しいものはどれか。","choices":{"A":"全変数を同時に微分する","B":"他の変数を定数とみなして特定の1変数のみで微分する","C":"行列の各要素を微分する","D":"確率密度関数の積分"},"answer":"B","answerText":"他の変数を定数とみなして特定の1変数のみで微分する","explanation":"偏微分∂f/∂xi は他の変数x_j(j≠i)を全て定数として変数xiのみで微分。多変量関数の勾配の各成分が偏微分。誤差逆伝播では各パラメータへの偏微分で勾配を計算する。","star":"★★★"},{"no":412,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"ヤコビアン（Jacobian）の説明として正しいものはどれか。","choices":{"A":"スカラー関数の勾配の別名","B":"多変数入力・多変数出力の関数の偏微分行列（各出力の各入力への偏微分を並べた行列）","C":"損失関数の2階偏微分","D":"確率変数の変換に使うスカラー係数"},"answer":"B","answerText":"多変数入力・多変数出力の関数の偏微分行列（各出力の各入力への偏微分を並べた行列）","explanation":"ヤコビアン行列J_{ij} = ∂f_i/∂x_j（m出力×n入力の行列）。変数変換の体積スケーリング因子（行列式|J|）やNNの逆伝播の勾配計算に使われる。","star":"★★☆"},{"no":413,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"内積（Dot Product）の計算式として正しいものはどれか。","choices":{"A":"a·b = ||a|| × ||b||","B":"a·b = Σai×bi = ||a||×||b||×cos(θ)（θは2ベクトルのなす角）","C":"a·b = max(ai, bi)","D":"a·b = ||a|| + ||b||"},"answer":"B","answerText":"a·b = Σai×bi = ||a||×||b||×cos(θ)（θは2ベクトルのなす角）","explanation":"内積a·b = Σaibi。幾何的には||a||×||b||×cos(θ)。cos(θ)=a·b/(||a||×||b||)がコサイン類似度。NNの全結合層・Attention計算の基礎となる演算。","star":"★★★"},{"no":414,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"線形代数・微分","question":"最急降下法（Gradient Descent）において更新式として正しいものはどれか。","choices":{"A":"θ = θ + α∇L（勾配方向）","B":"θ = θ - α∇L（勾配の逆方向：損失が最も減少する方向）","C":"θ = θ × α×∇L","D":"θ = ∇L / α"},"answer":"B","answerText":"θ = θ - α∇L（勾配の逆方向：損失が最も減少する方向）","explanation":"勾配降下法の更新式θ ← θ - α∇_θL。損失Lを最小化するため、損失が最も急激に増加する方向（勾配）の逆方向にαのステップで移動する。αは学習率（step size）。","star":"★★★"},{"no":415,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"情報理論","question":"エントロピー（Shannon Entropy）の説明として正しいものはどれか。","choices":{"A":"情報の最大値","B":"確率分布の不確実さ・情報量を表す指標：H(X) = -Σp(x)log p(x)（値が大きいほど不確実）","C":"変数の分散と同一の概念","D":"確率の累積和"},"answer":"B","answerText":"確率分布の不確実さ・情報量を表す指標：H(X) = -Σp(x)log p(x)（値が大きいほど不確実）","explanation":"シャノンエントロピーH(X) = -Σp(x)log₂p(x)（ビット単位）。すべての確率が等しい（最も不確実）場合に最大。p(x)=1（確定）のときH=0。決定木の情報利得・機械学習の損失関数の基礎。","star":"★★★"},{"no":416,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"情報理論","question":"交差エントロピー H(p, q) = -Σp(x)log q(x)の説明として正しいものはどれか。","choices":{"A":"真の分布pと予測分布qのKLダイバージェンス","B":"真の分布pで計算した場合の予測分布qの符号長（pとqの違いを測る）","C":"条件付きエントロピー","D":"情報量の最大値"},"answer":"B","answerText":"真の分布pで計算した場合の予測分布qの符号長（pとqの違いを測る）","explanation":"交差エントロピーH(p,q) = H(p) + KL(p||q)。真の分布pに対して近似分布qを使ったときの平均符号長。KL(p||q)≥0よりH(p,q)≥H(p)。分類の損失関数として「予測分布qを真の分布pに近づける」ために使われる。","star":"★★★"},{"no":417,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"情報理論","question":"決定木における情報利得（Information Gain）の説明として正しいものはどれか。","choices":{"A":"ノードの深さの増加量","B":"分岐前のエントロピーと分岐後の子ノードの加重エントロピーの差（どれだけ不確実性が減ったか）","C":"ジニ不純度と同一の指標","D":"精度の向上量"},"answer":"B","answerText":"分岐前のエントロピーと分岐後の子ノードの加重エントロピーの差（どれだけ不確実性が減ったか）","explanation":"情報利得 IG(A) = H(parent) - Σ(|Sv|/|S|)H(Sv)。親ノードのエントロピーと各子ノードの重み付きエントロピーの差。IG最大の特徴で分岐することで最も不確実性を減らす。","star":"★★★"},{"no":418,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"情報理論","question":"TF-IDFにおけるIDF（Inverse Document Frequency）の役割として正しいものはどれか。","choices":{"A":"単語の出現頻度を測る","B":"多くの文書に出現する一般的な単語（「の」「は」等）のスコアを下げ、特定文書に固有の単語を強調する","C":"文書の長さを正規化する","D":"単語の品詞を識別する"},"answer":"B","answerText":"多くの文書に出現する一般的な単語（「の」「は」等）のスコアを下げ、特定文書に固有の単語を強調する","explanation":"IDF(t) = log(N/df(t))（N=総文書数、df(t)=単語tを含む文書数）。多くの文書に出現する一般的な単語はdf(t)が大きくIDF が小さい。TF×IDFで各文書固有の重要な単語が高スコア。","star":"★★★"},{"no":419,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"情報理論","question":"正規分布の最大エントロピー特性として正しいものはどれか。","choices":{"A":"正規分布は常にエントロピーが最小","B":"平均と分散が固定された連続分布の中で、正規分布はエントロピーが最大（最も不確実性が高い）","C":"正規分布はエントロピーが常に0","D":"正規分布のエントロピーは定義されない"},"answer":"B","answerText":"平均と分散が固定された連続分布の中で、正規分布はエントロピーが最大（最も不確実性が高い）","explanation":"最大エントロピー原理：平均μと分散σ²が与えられた連続分布の中で正規分布N(μ,σ²)が最大エントロピーH = 0.5log(2πeσ²)を持つ。「最も少ない仮定」の分布として重要。","star":"★★★"},{"no":420,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"情報理論","question":"条件付きエントロピーH(X|Y)の説明として正しいものはどれか。","choices":{"A":"XとYが独立な場合のXのエントロピー","B":"Yが与えられた場合のXの残る不確実性の期待値","C":"XのエントロピーとYのエントロピーの積","D":"KLダイバージェンスの逆数"},"answer":"B","answerText":"Yが与えられた場合のXの残る不確実性の期待値","explanation":"条件付きエントロピーH(X|Y) = -ΣΣp(x,y)log p(x|y) = H(X,Y) - H(Y)。YがわかってもXにどれだけの不確実性が残るかを示す。相互情報量I(X;Y) = H(X) - H(X|Y)。","star":"★★☆"},{"no":421,"chapter":"第8章","chapterTheme":"AIに必要な数理・統計知識","section":"情報理論","question":"情報量（Self-information）I(x) = -log p(x)の特性として正しいものはどれか。","choices":{"A":"発生確率が高い事象ほど情報量が大きい","B":"発生確率が低い（珍しい）事象ほど情報量が大きい（驚きが大きい）","C":"情報量は常に負の値","D":"確率が0.5の場合に情報量は0"},"answer":"B","answerText":"発生確率が低い（珍しい）事象ほど情報量が大きい（驚きが大きい）","explanation":"自己情報量I(x) = -log₂p(x)（ビット単位）。確率p(x)=1（確実な事象）なら I=0（情報なし）。確率が低い（珍しい）事象ほど情報量I(x)が大きい（シャノンの情報理論の基本）。","star":"★★★"},{"no":422,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"日本の個人情報保護法における「個人情報」の定義として正しいものはどれか。","choices":{"A":"企業の財務情報","B":"生存する個人に関する情報で、氏名・生年月日等によって特定の個人を識別できる情報","C":"全ての電子データ","D":"匿名加工された情報"},"answer":"B","answerText":"生存する個人に関する情報で、氏名・生年月日等によって特定の個人を識別できる情報","explanation":"個人情報保護法の個人情報は「生存する個人に関する情報で、当該情報に含まれる氏名・生年月日その他の記述等により特定の個人を識別できるもの」。死者や法人は個人情報の対象外（基本的に）。","star":"★★★"},{"no":423,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"匿名加工情報の説明として正しいものはどれか。","choices":{"A":"特定の個人を識別できる情報","B":"個人情報を特定の個人を識別できないよう加工し、復元も不可能にした情報","C":"仮名に置き換えただけで復元可能な情報","D":"企業が保有する全ての情報"},"answer":"B","answerText":"個人情報を特定の個人を識別できないよう加工し、復元も不可能にした情報","explanation":"匿名加工情報は個人情報を特定個人の識別が不可能になるよう加工し、かつ復元も不可能にした情報。一定のルールのもとで第三者提供・利用が可能。仮名加工情報とは区別される。","star":"★★★"},{"no":424,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"仮名加工情報の説明として正しいものはどれか。","choices":{"A":"完全に匿名化された個人情報","B":"氏名等の識別情報を削除・置換して特定個人を識別できなくした情報（適切な管理のもとで復元可能）","C":"第三者に自由に提供できる情報","D":"外国籍の人の個人情報"},"answer":"B","answerText":"氏名等の識別情報を削除・置換して特定個人を識別できなくした情報（適切な管理のもとで復元可能）","explanation":"仮名加工情報は個人情報から氏名等を削除・置換して作成。内部分析・AI学習に利用可能だが第三者提供は原則不可。匿名加工情報より柔軟に活用できる2021年改正で導入された区分。","star":"★★★"},{"no":425,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"個人情報の「利用目的」について正しいものはどれか。","choices":{"A":"収集後にいつでも変更できる","B":"収集時に利用目的を明示・通知し、原則として利用目的の範囲内でのみ使用しなければならない","C":"利用目的の設定は任意","D":"利用目的はプライバシーポリシーに記載不要"},"answer":"B","answerText":"収集時に利用目的を明示・通知し、原則として利用目的の範囲内でのみ使用しなければならない","explanation":"個人情報保護法は個人情報収集時に利用目的を特定・明示する義務を課している。目的外利用は原則禁止。本人同意なしに目的を変更する場合は関連性が合理的に認められる範囲に限られる。","star":"★★★"},{"no":426,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"GDPRの「忘れられる権利」（消去権）の説明として正しいものはどれか。","choices":{"A":"AIに関する学習を停止する権利","B":"データ主体が事業者に対して自分の個人データの削除を要求できる権利","C":"企業が古いデータを定期的に削除する義務","D":"政府が個人情報を忘れる義務"},"answer":"B","answerText":"データ主体が事業者に対して自分の個人データの削除を要求できる権利","explanation":"GDPRの消去権（第17条）はデータ主体が事業者に対して自分の個人データの削除を要求できる権利。Google等の検索エンジンでの過去の情報削除請求に適用されている。","star":"★★★"},{"no":427,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"GDPR（一般データ保護規則）の適用対象として正しいものはどれか。","choices":{"A":"EU企業のみ","B":"EU市民・居住者のデータを処理するすべての組織（EU域外の企業も含む）","C":"EU内のIT企業のみ","D":"特定の産業のみ"},"answer":"B","answerText":"EU市民・居住者のデータを処理するすべての組織（EU域外の企業も含む）","explanation":"GDPRはEU市民・居住者の個人データを処理する全ての組織に適用される（域外適用）。日本企業でもEU市民のデータを扱う場合は適用。違反には最大年間売上高4%または2,000万ユーロの制裁金。","star":"★★★"},{"no":428,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"個人情報の「第三者提供」の原則として正しいものはどれか。","choices":{"A":"第三者提供は常に自由","B":"本人の同意を得なければ第三者に個人情報を提供できない（例外あり）","C":"業務委託先への提供は第三者提供に当たる","D":"第三者提供の制限はない"},"answer":"B","answerText":"本人の同意を得なければ第三者に個人情報を提供できない（例外あり）","explanation":"個人情報保護法では原則として本人同意なしに第三者提供は禁止。ただし法令に基づく場合・人命保護・公衆衛生等は例外。業務委託先への提供は第三者提供に当たらない（委託者の管理責任は残る）。","star":"★★★"},{"no":429,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"「個人識別符号」の例として正しいものはどれか。","choices":{"A":"会社の電話番号","B":"パスポート番号・マイナンバー・指紋・DNAなど特定個人を識別できる番号・生体情報","C":"製品のシリアル番号","D":"匿名アンケートの回答番号"},"answer":"B","answerText":"パスポート番号・マイナンバー・指紋・DNAなど特定個人を識別できる番号・生体情報","explanation":"個人識別符号はそれ単体で特定個人を識別できる符号や身体的特徴（マイナンバー・パスポート番号・顔認識データ・指紋・虹彩等）。これを含む情報は個人情報として扱われる。","star":"★★★"},{"no":430,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"要配慮個人情報の説明として正しいものはどれか。","choices":{"A":"一般の個人情報より取り扱いが自由","B":"人種・信条・病歴・犯罪歴・障害等のセンシティブな情報で、原則として取得に本人の明示的同意が必要","C":"企業の財務情報","D":"外国人の個人情報"},"answer":"B","answerText":"人種・信条・病歴・犯罪歴・障害等のセンシティブな情報で、原則として取得に本人の明示的同意が必要","explanation":"要配慮個人情報（センシティブ情報）は人種・信条・社会的身分・病歴・犯罪歴・障害等のプライバシーへの影響が特に大きい情報。原則として取得時に本人の明示的な同意が必要。","star":"★★★"},{"no":431,"chapter":"第9章","chapterTheme":"法律・倫理","section":"個人情報保護法","question":"個人情報保護法における「委託」の説明として正しいものはどれか。","choices":{"A":"委託先は個人情報を自由に使える","B":"個人情報取扱事業者が業務の一部を外部に委託する場合、委託先を適切に監督する義務がある","C":"委託先への提供は第三者提供に当たる","D":"委託は個人情報の目的外利用にあたる"},"answer":"B","answerText":"個人情報取扱事業者が業務の一部を外部に委託する場合、委託先を適切に監督する義務がある","explanation":"業務委託の場合、委託元は委託先が個人情報を適切に取り扱うよう必要かつ適切な監督義務を負う。委託先による個人情報の漏洩は委託元の責任ともなりうる。","star":"★★★"},{"no":432,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"AI生成物（AIが自律的に生成したコンテンツ）の著作権について日本法の現状として正しいものはどれか。","choices":{"A":"AIが著作者として認められる","B":"AIが自律的に生成した創作物には著作権は成立しないのが一般的な解釈","C":"AIのトレーニングデータの著作権者に帰属する","D":"利用者が使用した時点で著作権が発生する"},"answer":"B","answerText":"AIが自律的に生成した創作物には著作権は成立しないのが一般的な解釈","explanation":"著作権法の著作者は「思想又は感情を創作的に表現した」自然人（人間）が原則。AIが自律的に生成した場合は人間の創作的寄与がなく著作権不成立が一般的。ただし人間が大きく関与した場合は状況による。","star":"★★★"},{"no":433,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"日本の著作権法第30条の4に関して、機械学習を目的としたデータ利用について正しい記述はどれか。","choices":{"A":"機械学習目的のデータ利用は常に著作権侵害となる","B":"情報解析（機械学習）目的での著作物の利用は著作権者の許諾なしに可能（ただし権利者の利益を不当に害する場合を除く）","C":"商業目的の機械学習は許諾が必要","D":"個人利用の機械学習のみ許諾不要"},"answer":"B","answerText":"情報解析（機械学習）目的での著作物の利用は著作権者の許諾なしに可能（ただし権利者の利益を不当に害する場合を除く）","explanation":"日本著作権法第30条の4は情報解析（機械学習を含む）を目的とする場合に著作権者の許諾なしに著作物を利用できると定める。この規定は国際的に注目される親AI的な法制度。","star":"★★★"},{"no":434,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"著作権の「創作性」の説明として正しいものはどれか。","choices":{"A":"技術的な独創性が高い発明","B":"著作物として保護されるために必要な要件で、作者の思想・感情が個性として反映されていること","C":"他の著作物と全く異なる新規性","D":"特許と同じ要件"},"answer":"B","answerText":"著作物として保護されるために必要な要件で、作者の思想・感情が個性として反映されていること","explanation":"著作権保護の要件は「思想又は感情」の「創作的な表現」であること。模倣でなく自己の個性が反映されていれば良い（ベタなスローガンや事実の羅列等は創作性なし）。特許の新規性・進歩性とは異なる。","star":"★★★"},{"no":435,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"生成AIによる画像生成において著作権侵害が問題になる可能性のある状況として最も適切なものはどれか。","choices":{"A":"プロンプトに特定のスタイルを指定した場合","B":"特定の著作権保護されたキャラクターを直接複製するような出力を生成した場合","C":"著作権フリーのデータで学習した場合","D":"生成物を個人的にのみ使用した場合"},"answer":"B","answerText":"特定の著作権保護されたキャラクターを直接複製するような出力を生成した場合","explanation":"生成AIが特定の著作権保護作品に酷似した出力を生成する場合、著作権侵害の可能性がある。学習段階と生成段階の両方で著作権問題が生じうる。","star":"★★★"},{"no":436,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"オープンソースライセンスの説明として正しいものはどれか。","choices":{"A":"ソースコードを秘密にするライセンス","B":"ソースコードを公開し一定の条件下で自由に使用・改変・配布を許可するライセンス","C":"商業目的でのみ使えるライセンス","D":"著作権を完全に放棄するライセンス"},"answer":"B","answerText":"ソースコードを公開し一定の条件下で自由に使用・改変・配布を許可するライセンス","explanation":"オープンソースライセンス（MITライセンス・Apache 2.0・GPL等）はソースコードを公開し自由な利用・改変・配布を許可する。ただしGPL等は派生物も同じライセンスで公開する義務（コピーレフト）がある。","star":"★★★"},{"no":437,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"AIモデルの学習に使用されるデータセットの著作権において最も重要な考慮点はどれか。","choices":{"A":"データセットが大きいほど許可は不要","B":"使用するデータの著作権状況とライセンス・利用規約を確認し、適切な権利処理を行うこと","C":"機械学習は常に著作権の適用外","D":"データが古い場合は著作権がない"},"answer":"B","answerText":"使用するデータの著作権状況とライセンス・利用規約を確認し、適切な権利処理を行うこと","explanation":"学習データの著作権は重要問題。著作権で保護されたコンテンツを無断学習することが著作権侵害かどうかは各国の法律・状況による（日本の第30条の4、米国のフェアユース等）。ライセンスとデータソースの確認が重要。","star":"★★★"},{"no":438,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"データベースの著作権に関する正しい説明はどれか。","choices":{"A":"データベース内の個々のデータは常に著作権で保護される","B":"データベースの構造・選択・配列が創作性を持つ場合はデータベースの著作物として保護される","C":"データベースは著作権の対象外","D":"個々のデータに著作権があればデータベースは必然的に保護される"},"answer":"B","answerText":"データベースの構造・選択・配列が創作性を持つ場合はデータベースの著作物として保護される","explanation":"データベースの著作物は「情報の選択又は体系的な構成によって創作性を有するもの」として保護される。個々のデータに著作権があるかどうかは別問題。","star":"★★★"},{"no":439,"chapter":"第9章","chapterTheme":"法律・倫理","section":"著作権法","question":"AIが生成した音楽の著作権について正しい記述はどれか。","choices":{"A":"AIが生成した音楽は常に著作権で保護される","B":"AIが完全自律的に生成した音楽は著作権が成立しないことが多い（人間の創作的寄与が必要）","C":"音楽の著作権はAIの開発者に帰属する","D":"生成AIの利用規約で常に著作権が定義される"},"answer":"B","answerText":"AIが完全自律的に生成した音楽は著作権が成立しないことが多い（人間の創作的寄与が必要）","explanation":"著作権は人間の創作的表現を保護するものが原則。AIが完全に自律的に生成した音楽には人間の創作的寄与がないため著作権不成立が一般的な解釈。ただし人間が編集・指示した範囲で保護の余地がある。","star":"★★★"},{"no":440,"chapter":"第9章","chapterTheme":"法律・倫理","section":"特許法・不正競争防止法","question":"特許権と著作権の最大の違いとして正しいものはどれか。","choices":{"A":"著作権は登録が必要で特許は不要","B":"特許は新規性・進歩性のある発明を保護し登録が必要、著作権は創作の瞬間に発生し登録不要","C":"特許は個人のみ取得でき、著作権は企業のみ","D":"両者は保護期間が同じ"},"answer":"B","answerText":"特許は新規性・進歩性のある発明を保護し登録が必要、著作権は創作の瞬間に発生し登録不要","explanation":"特許は特許庁への登録申請・審査・登録が必要で新規性・進歩性・産業上の利用可能性が要件。著作権は創作の瞬間に自動発生（無方式主義）。保護期間も異なる（特許:出願から20年、著作権:死後70年）。","star":"★★★"},{"no":441,"chapter":"第9章","chapterTheme":"法律・倫理","section":"特許法・不正競争防止法","question":"職務発明の説明として正しいものはどれか。","choices":{"A":"従業員が個人の時間に行った発明","B":"従業員が業務の範囲内で会社の設備・情報を使って完成させた発明","C":"アルバイトが行った全ての発明","D":"退職後に個人で行った発明"},"answer":"B","answerText":"従業員が業務の範囲内で会社の設備・情報を使って完成させた発明","explanation":"職務発明は特許法35条の規定。従業員が性質上使用者の業務範囲に属し、かつ業務行為として完成した発明。日本法では原則として従業者に特許を受ける権利が帰属するが、契約で使用者への事前帰属も可能。","star":"★★★"},{"no":442,"chapter":"第9章","chapterTheme":"法律・倫理","section":"特許法・不正競争防止法","question":"特許権の保護期間として正しいものはどれか。","choices":{"A":"著作と同時に発生し作者の死後70年","B":"特許出願から20年","C":"登録から10年","D":"公表から50年"},"answer":"B","answerText":"特許出願から20年","explanation":"特許権の保護期間は特許出願から20年間（医薬品等は最大5年延長可能）。著作権（著作者の死後70年）とは大きく異なる。","star":"★★★"},{"no":443,"chapter":"第9章","chapterTheme":"法律・倫理","section":"特許法・不正競争防止法","question":"AIを使った発明において特許を受けられるかという問題について正しい説明はどれか。","choices":{"A":"AIが発明した場合、AIに特許権が認められる","B":"発明者は自然人（人間）でなければならず、AIが単独で発明した場合の特許申請は困難（各国で議論中）","C":"AIを補助ツールとして使った発明は特許を受けられない","D":"AIが関与した発明は全て著作権で保護される"},"answer":"B","answerText":"発明者は自然人（人間）でなければならず、AIが単独で発明した場合の特許申請は困難（各国で議論中）","explanation":"多くの国では発明者は自然人（人間）が原則。AIが単独で発明した場合の特許申請は世界各国で議論されており、多くの特許庁はAIを発明者として認めていない。AI支援の発明は人間が発明者として申請できる。","star":"★★★"},{"no":444,"chapter":"第9章","chapterTheme":"法律・倫理","section":"特許法・不正競争防止法","question":"不正競争防止法における「営業秘密」の3要件として正しいものはどれか。","choices":{"A":"公開性・共有性・価値性","B":"秘密管理性・非公知性・有用性（三要件全て必要）","C":"新規性・進歩性・産業利用可能性","D":"著作性・創作性・固定性"},"answer":"B","answerText":"秘密管理性・非公知性・有用性（三要件全て必要）","explanation":"営業秘密の3要件：①秘密管理性（秘密として管理されている）、②非公知性（公然と知られていない）、③有用性（事業活動に有用）。AI技術・アルゴリズム・学習データは営業秘密として保護可能な場合がある。","star":"★★★"},{"no":445,"chapter":"第9章","chapterTheme":"法律・倫理","section":"特許法・不正競争防止法","question":"限定提供データの説明として正しいものはどれか。","choices":{"A":"無償で一般公開するデータ","B":"業として特定の者に提供するデータで秘密管理性は要さない（不正競争防止法で保護）","C":"全てのビッグデータ","D":"個人情報を含むデータ"},"answer":"B","answerText":"業として特定の者に提供するデータで秘密管理性は要さない（不正競争防止法で保護）","explanation":"限定提供データ（2019年不競法改正）はIDパスワード等で管理されてビジネスで提供されるデータ（地図データ・気象データ等）。秘密管理性は要さず、第三者への不正開示等から保護される。","star":"★★★"},{"no":446,"chapter":"第9章","chapterTheme":"法律・倫理","section":"特許法・不正競争防止法","question":"特許権と営業秘密の主な違いとして正しいものはどれか。","choices":{"A":"保護期間は両者とも同じ","B":"特許は登録・公開が必要だが保護期間が有限、営業秘密は非公開で維持する限り期間制限なく保護できる","C":"営業秘密の方が常に強い保護を受ける","D":"両者は同じ要件を持つ"},"answer":"B","answerText":"特許は登録・公開が必要だが保護期間が有限、営業秘密は非公開で維持する限り期間制限なく保護できる","explanation":"特許は出願・公開して保護（20年）。営業秘密は非公開で管理する限り期間無制限で保護。ただし第三者が独自に同じ技術を開発した場合は営業秘密では対抗できない（リバースエンジニアリングも許容）。","star":"★★★"},{"no":447,"chapter":"第9章","chapterTheme":"法律・倫理","section":"独占禁止法","question":"AIと独占禁止法の主な論点として正しいものはどれか。","choices":{"A":"AIのソースコードの開示義務","B":"AIを利用した価格カルテルや競争排除行為が問題になりうること","C":"AIを使う企業は全て独占禁止法の適用対象","D":"AIのデータセット入手を制限すること"},"answer":"B","answerText":"AIを利用した価格カルテルや競争排除行為が問題になりうること","explanation":"AIを使って競合他社と価格を協調（カルテル）したり、データ独占で競争を阻害したりすることが独占禁止法上の問題となりうる。また、AIが自律的にカルテル行為をしても責任は人間（企業）にあると考えられる。","star":"★★★"},{"no":448,"chapter":"第9章","chapterTheme":"法律・倫理","section":"独占禁止法","question":"公正競争阻害性の説明として正しいものはどれか。","choices":{"A":"競合他社が少ないこと","B":"独占禁止法上、自由な競争を歪める行為の性質","C":"公正な企業が多いこと","D":"データが多いこと"},"answer":"B","answerText":"独占禁止法上、自由な競争を歪める行為の性質","explanation":"公正競争阻害性は独占禁止法の不公正な取引方法の要件で、自由な競争の秩序・メカニズムを歪める行為の性質を指す。AIを使った差別的な取引条件・不当な排除行為等が問題になりうる。","star":"★★☆"},{"no":449,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AI開発委託契約","question":"AI開発プロジェクトのPoC段階に適した契約形態として正しいものはどれか。","choices":{"A":"請負契約（成果物の完成を義務付ける）","B":"準委任契約（善管注意義務で業務を遂行する）","C":"秘密保持契約のみ","D":"購入契約"},"answer":"B","answerText":"準委任契約（善管注意義務で業務を遂行する）","explanation":"PoC段階は成果（精度等）が保証できないため、請負契約（成果物完成の義務）は適さない。準委任契約（善管注意義務での業務遂行）が一般的。精度保証は難しいためPoCでは明示しないことが多い。","star":"★★★"},{"no":450,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AI開発委託契約","question":"AI・データの利用に関する契約ガイドライン（経済産業省）の目的として正しいものはどれか。","choices":{"A":"AIの使用を禁止するためのガイドライン","B":"AI開発・データ利用に関する契約の基本的な考え方・モデル条項を示して取引の円滑化・トラブル防止を図るガイドライン","C":"AIの価格規制のためのガイドライン","D":"データの無償提供を義務付けるガイドライン"},"answer":"B","answerText":"AI開発・データ利用に関する契約の基本的な考え方・モデル条項を示して取引の円滑化・トラブル防止を図るガイドライン","explanation":"経済産業省のAI・データ契約ガイドラインはAI開発の各フェーズ（探索・PoC・開発・保守等）に適した契約形態・知的財産の帰属・精度保証の考え方等を示し、産業界の取引を円滑にすることを目的とする。","star":"★★★"},{"no":451,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AI開発委託契約","question":"NDA（秘密保持契約）の目的として正しいものはどれか。","choices":{"A":"業務成果物の権利を移転する","B":"契約当事者間で共有される機密情報を第三者に開示しないことを約束する契約","C":"成果物の品質を保証する","D":"著作権を譲渡する"},"answer":"B","answerText":"契約当事者間で共有される機密情報を第三者に開示しないことを約束する契約","explanation":"NDA（Non-Disclosure Agreement）は当事者間で交わされる機密情報（技術・ビジネス情報等）の秘密保持のための契約。AI開発プロジェクトの検討段階・PoC開始前に締結することが多い。","star":"★★★"},{"no":452,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AI開発委託契約","question":"精度保証（AIモデルの精度保証）の問題として正しいものはどれか。","choices":{"A":"AI開発では常に精度を事前に保証できる","B":"AIの性能はデータ・タスクに依存し事前の精度保証は困難なため、契約上の扱いに注意が必要","C":"精度保証は法律で義務付けられている","D":"精度保証なしでは契約できない"},"answer":"B","answerText":"AIの性能はデータ・タスクに依存し事前の精度保証は困難なため、契約上の扱いに注意が必要","explanation":"AIの精度は学習データ・タスクの難易度・環境変化等に依存し、事前の保証が極めて困難。AI開発契約では精度を「目標値」として設定し、保証（完成義務）でなく努力義務とすることが一般的。","star":"★★★"},{"no":453,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIサービス提供契約","question":"SaaS型AIサービスの特徴として正しいものはどれか。","choices":{"A":"ソフトウェアをパッケージとして購入する形態","B":"ソフトウェアをクラウド経由でサービスとして提供・利用する形態","C":"ハードウェアとソフトウェアを一体で購入する","D":"オープンソースで無償提供"},"answer":"B","answerText":"ソフトウェアをクラウド経由でサービスとして提供・利用する形態","explanation":"SaaS（Software as a Service）はクラウド上のソフトウェアをインターネット経由でサービスとして提供・課金するモデル。ユーザーはインストール不要で利用でき、開発者側がメンテナンスを担う。","star":"★★★"},{"no":454,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIサービス提供契約","question":"利用規約とNDAの違いとして正しいものはどれか。","choices":{"A":"両者は全く同じ","B":"利用規約は多数のユーザーに一方的に提示される契約、NDAは特定の当事者間で交わす個別の秘密保持契約","C":"NDAは利用規約の一部","D":"利用規約の方が常に法的効力が強い"},"answer":"B","answerText":"利用規約は多数のユーザーに一方的に提示される契約、NDAは特定の当事者間で交わす個別の秘密保持契約","explanation":"利用規約はサービス提供者がユーザーに一方的に提示する約款（SaaS利用条件等）。NDAは特定の相手方と個別に締結する秘密保持の二者間契約。性質・対象が異なる。","star":"★★★"},{"no":455,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIサービス提供契約","question":"SaaS型AIサービスにおいてユーザーが学習・生成させたデータの帰属について正しいものはどれか。","choices":{"A":"常にSaaSプロバイダーに帰属する","B":"利用規約による定めによって異なり、確認が必要","C":"AIが自律的に生成したので誰にも帰属しない","D":"著作権法で自動的にユーザーに帰属する"},"answer":"B","answerText":"利用規約による定めによって異なり、確認が必要","explanation":"SaaS型AIサービスでユーザーが入力したデータ・生成物の権利帰属はサービスの利用規約によって異なる。利用規約を確認し、ビジネス的に重要なデータ・生成物の権利が適切に保護されているか確認することが重要。","star":"★★★"},{"no":456,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIサービス提供契約","question":"データ利用権のSaaS型AIサービスにおける問題として正しいものはどれか。","choices":{"A":"SaaSサービスは常にデータを保護している","B":"ユーザーが入力したデータがサービス側の学習データとして利用される可能性があり、利用規約の確認が必要","C":"データは常にユーザーの独占的所有物","D":"SaaSサービスはデータを使わない"},"answer":"B","answerText":"ユーザーが入力したデータがサービス側の学習データとして利用される可能性があり、利用規約の確認が必要","explanation":"ChatGPT等のSaaS型AIでユーザーが入力したデータが、サービス側のモデル改善・学習に使われる場合がある。利用規約でこの点を確認し、機密情報を入力する際は注意が必要。","star":"★★★"},{"no":457,"chapter":"第9章","chapterTheme":"法律・倫理","section":"国内外のガイドライン","question":"EU AI Actの4段階リスク分類で「受け入れ不可能なリスク（禁止）」に該当するAIシステムの例として正しいものはどれか。","choices":{"A":"スパムフィルター","B":"公共スペースでのリアルタイム生体認証・社会スコアリング・意識下操作システム","C":"医療画像診断支援AI","D":"映画の推薦システム"},"answer":"B","answerText":"公共スペースでのリアルタイム生体認証・社会スコアリング・意識下操作システム","explanation":"EU AI Act（2024年施行）の最高リスク（禁止）はリアルタイム生体認証（一部例外あり）・社会スコアリング・意識下（subliminal）操作AI等。高リスク（医療・採用等）は厳格な要件。低リスクは透明性要件のみ。","star":"★★★"},{"no":458,"chapter":"第9章","chapterTheme":"法律・倫理","section":"国内外のガイドライン","question":"ソフトロー（Soft Law）とハードロー（Hard Law）の違いとして正しいものはどれか。","choices":{"A":"ソフトローは法的拘束力があり、ハードローはない","B":"ハードローは法的拘束力のある法律・規制、ソフトローは非拘束的なガイドライン・原則","C":"両者は同じ効力","D":"ソフトローは国内法、ハードローは国際法"},"answer":"B","answerText":"ハードローは法的拘束力のある法律・規制、ソフトローは非拘束的なガイドライン・原則","explanation":"ハードロー（法令・規制等）は法的拘束力があり違反には制裁。ソフトロー（ガイドライン・原則・業界自主規制等）は法的拘束力はないが実質的な影響力を持つ。AI規制はソフトロー中心から一部ハードロー化が進んでいる。","star":"★★★"},{"no":459,"chapter":"第9章","chapterTheme":"法律・倫理","section":"国内外のガイドライン","question":"リスクベースアプローチの説明として正しいものはどれか。","choices":{"A":"全てのAIシステムに同じ規制を適用する","B":"AIのリスクの高さに応じて規制の厳しさを変える（高リスクには厳格な要件、低リスクは軽い要件）","C":"リスクがゼロのAIのみを許可する","D":"個人のリスク嗜好に基づく"},"answer":"B","answerText":"AIのリスクの高さに応じて規制の厳しさを変える（高リスクには厳格な要件、低リスクは軽い要件）","explanation":"リスクベースアプローチはAIシステムのリスクの高さ（影響の深刻さ・確率）に応じて規制レベルを変える手法。EU AI Actや多くのガイドラインがこのアプローチを採用。","star":"★★★"},{"no":460,"chapter":"第9章","chapterTheme":"法律・倫理","section":"国内外のガイドライン","question":"AI倫理のガイドラインに共通して含まれる主要原則として最も不適切なものはどれか。","choices":{"A":"透明性・説明可能性","B":"公平性・非差別性","C":"人間の自律性の尊重","D":"企業の利益の最大化"},"answer":"D","answerText":"企業の利益の最大化","explanation":"主要なAI倫理原則はアカウンタビリティ・透明性・公平性・人間の自律性・安全性・プライバシー等。「企業利益の最大化」は倫理原則でなく、むしろ倫理と対立する可能性もある事業目標。","star":"★★★"},{"no":461,"chapter":"第9章","chapterTheme":"法律・倫理","section":"プライバシー","question":"プライバシー・バイ・デザイン（Privacy by Design）の説明として正しいものはどれか。","choices":{"A":"プライバシー問題が発生してから対処する後付けアプローチ","B":"システム設計の最初からプライバシー保護を組み込む予防的アプローチ","C":"プライバシーポリシーをデザインする","D":"ユーザーが任意でプライバシー設定を変更できる機能"},"answer":"B","answerText":"システム設計の最初からプライバシー保護を組み込む予防的アプローチ","explanation":"Privacy by Design（アン・カブキアン提唱）はプライバシー保護を後付けでなくシステム設計の最初から組み込む（Proactive、Embedded）アプローチ。GDPRもデータ保護バイデザインを義務付けている。","star":"★★★"},{"no":462,"chapter":"第9章","chapterTheme":"法律・倫理","section":"プライバシー","question":"カメラ画像利活用ガイドブックの主な内容として正しいものはどれか。","choices":{"A":"カメラ製品の技術規格","B":"カメラ画像を使うAIシステムがプライバシーに配慮して適切に利活用するための指針","C":"監視カメラの設置義務","D":"カメラ映像の著作権"},"answer":"B","answerText":"カメラ画像を使うAIシステムがプライバシーに配慮して適切に利活用するための指針","explanation":"経済産業省・総務省のカメラ画像利活用ガイドブックはカメラ画像（顔認証・行動分析等）を使うAIの利活用においてプライバシーへの配慮・適切な公表・利用目的の明確化等の指針を示す。","star":"★★★"},{"no":463,"chapter":"第9章","chapterTheme":"法律・倫理","section":"プライバシー","question":"差分プライバシー（Differential Privacy）の説明として正しいものはどれか。","choices":{"A":"2つのデータセットの差分を計算する","B":"データセットへの特定個人の有無が学習結果に影響しないよう統計的ノイズを加えてプライバシーを保護する手法","C":"異なるデータベース間のプライバシー差分","D":"データの匿名化と同じ概念"},"answer":"B","answerText":"データセットへの特定個人の有無が学習結果に影響しないよう統計的ノイズを加えてプライバシーを保護する手法","explanation":"差分プライバシーはデータセットへの1人のデータの有無による出力の変化を数学的に制限する。ノイズ（Laplace・ガウス等）を加えて学習結果から個人の情報が推定されないようにする。AppleやGoogleが採用。","star":"★★★"},{"no":464,"chapter":"第9章","chapterTheme":"法律・倫理","section":"公平性","question":"アルゴリズムバイアスの説明として正しいものはどれか。","choices":{"A":"AIのバグやエラー","B":"偏ったデータや設計によりAIが特定の属性に対して不公平な結果を出す問題","C":"モデルの過学習","D":"計算量が多すぎる問題"},"answer":"B","answerText":"偏ったデータや設計によりAIが特定の属性に対して不公平な結果を出す問題","explanation":"アルゴリズムバイアスは学習データ・設計上の偏りからAIが人種・性別・年齢等の属性で不公平な差別的結果を生む問題。採用AIが女性を不当に低評価した事例（Amazon）が有名。","star":"★★★"},{"no":465,"chapter":"第9章","chapterTheme":"法律・倫理","section":"公平性","question":"サンプリングバイアスのAIにおける影響として正しいものはどれか。","choices":{"A":"計算コストが増加する","B":"特定の集団が過小代表または過大代表されたデータで学習したAIが、その集団に対して不公平な予測をする","C":"モデルのパラメータが増加する","D":"学習速度が低下する"},"answer":"B","answerText":"特定の集団が過小代表または過大代表されたデータで学習したAIが、その集団に対して不公平な予測をする","explanation":"学習データのサンプリングバイアス（特定の人種・性別・年齢層のデータが少ない等）は、そのグループへの予測精度が低くなる不公平なモデルをもたらす。多様なデータ収集が重要。","star":"★★★"},{"no":466,"chapter":"第9章","chapterTheme":"法律・倫理","section":"公平性","question":"センシティブ属性（Protected Attribute）の例として正しいものはどれか。","choices":{"A":"ユーザーの購買金額","B":"人種・性別・年齢・宗教等の差別禁止を要する属性","C":"ユーザーのIPアドレス","D":"ウェブサイトの訪問回数"},"answer":"B","answerText":"人種・性別・年齢・宗教等の差別禁止を要する属性","explanation":"センシティブ属性（保護属性）は人種・性別・年齢・宗教・障害等の差別が法律で禁止されている属性。これらの属性でモデルが不公平な予測をしないように公平性を考慮した学習が求められる。","star":"★★★"},{"no":467,"chapter":"第9章","chapterTheme":"法律・倫理","section":"安全性とセキュリティ","question":"Adversarial Attack（敵対的攻撃）の説明として正しいものはどれか。","choices":{"A":"AIモデルを盗もうとするサイバー攻撃","B":"人間の目には識別困難な微小な摂動をデータに加えてAIに誤分類させる攻撃","C":"モデルの学習データを盗む攻撃","D":"モデルのサーバーをDDoS攻撃する"},"answer":"B","answerText":"人間の目には識別困難な微小な摂動をデータに加えてAIに誤分類させる攻撃","explanation":"Adversarial Attack（敵対的サンプル攻撃）は入力画像に人間の目には見えないノイズを加えてAIに誤分類させる攻撃。「パンダ→テナガザル」等の劇的な誤分類が起きる。自動運転・顔認証の安全性に影響。","star":"★★★"},{"no":468,"chapter":"第9章","chapterTheme":"法律・倫理","section":"安全性とセキュリティ","question":"モデル汚染（Model Poisoning）の説明として正しいものはどれか。","choices":{"A":"テスト時のAdversarial攻撃","B":"悪意のある訓練データを学習させてAIモデルの挙動を意図的に操作する攻撃","C":"モデルを不正にコピーする攻撃","D":"AIサーバーへの不正アクセス"},"answer":"B","answerText":"悪意のある訓練データを学習させてAIモデルの挙動を意図的に操作する攻撃","explanation":"モデル汚染（Poisoning Attack）は訓練段階での攻撃で、悪意のあるデータを学習データに混入してモデルの挙動を操作する（例：バックドアの埋め込み）。学習データの信頼性管理が重要。","star":"★★★"},{"no":469,"chapter":"第9章","chapterTheme":"法律・倫理","section":"安全性とセキュリティ","question":"データ窃取（Data Extraction Attack）の説明として正しいものはどれか。","choices":{"A":"モデルに誤分類させる攻撃","B":"モデルへの問い合わせを繰り返してモデルが記憶している学習データを推定・復元する攻撃","C":"モデルのパラメータを改変する攻撃","D":"学習率を変える攻撃"},"answer":"B","answerText":"モデルへの問い合わせを繰り返してモデルが記憶している学習データを推定・復元する攻撃","explanation":"データ抽出攻撃はモデルへの多数の問い合わせ（Black-box）でモデルが記憶している訓練データを推定・復元する。LLMがトレーニングデータをそのまま出力するリスクもある。","star":"★★★"},{"no":470,"chapter":"第9章","chapterTheme":"法律・倫理","section":"安全性とセキュリティ","question":"モデル窃取（Model Extraction）の説明として正しいものはどれか。","choices":{"A":"モデルの重みファイルを盗む物理的攻撃","B":"モデルへの問い合わせ結果（API）を使ってモデルの機能を模倣したコピーモデルを作成する攻撃","C":"モデルの精度を低下させる攻撃","D":"学習データを無断で収集する攻撃"},"answer":"B","answerText":"モデルへの問い合わせ結果（API）を使ってモデルの機能を模倣したコピーモデルを作成する攻撃","explanation":"モデル窃取（Model Stealing）はBlack-boxでAPIを呼び出してInput-Outputペアを収集し、それを使って元のモデルの機能を模倣した代替モデルを学習する攻撃。知的財産の侵害になりうる。","star":"★★★"},{"no":471,"chapter":"第9章","chapterTheme":"法律・倫理","section":"安全性とセキュリティ","question":"セキュリティ・バイ・デザインの説明として正しいものはどれか。","choices":{"A":"セキュリティパッチを後付けで適用するアプローチ","B":"システム設計の最初からセキュリティを組み込む予防的アプローチ","C":"市販のセキュリティソフトを使う","D":"セキュリティの外部委託"},"answer":"B","answerText":"システム設計の最初からセキュリティを組み込む予防的アプローチ","explanation":"Security by Designはシステムの設計・開発段階の最初からセキュリティを組み込む予防的アプローチ。後付け（Bolt-on Security）より根本的に安全なシステムを構築できる。","star":"★★★"},{"no":472,"chapter":"第9章","chapterTheme":"法律・倫理","section":"悪用・透明性","question":"ディープフェイク（Deepfake）の説明として正しいものはどれか。","choices":{"A":"深層学習を使った省電力技術","B":"DLを使って実在の人物の顔や声を非常にリアルに合成・改変した偽の動画・音声","C":"詐欺メールのフィッシング攻撃","D":"ソーシャルエンジニアリング攻撃"},"answer":"B","answerText":"DLを使って実在の人物の顔や声を非常にリアルに合成・改変した偽の動画・音声","explanation":"ディープフェイクはGANやDiffusion Model等のDLでリアルな顔スワップ・音声クローンを生成する技術。政治家の偽動画・性的悪用・フェイクニュース等の悪用が社会問題化。","star":"★★★"},{"no":473,"chapter":"第9章","chapterTheme":"法律・倫理","section":"悪用・透明性","question":"フェイクニュースの拡散にAIが寄与する主なメカニズムとして正しいものはどれか。","choices":{"A":"AIが自動的に全てのニュースを検証するから","B":"フィルターバブルやエコーチェンバーでユーザーの信念を強化する推薦アルゴリズムと、低コストのコンテンツ生成AIが拡散を促進するから","C":"AIはフェイクニュースを自動で削除するから","D":"AIはニュースの感情分析のみ行うから"},"answer":"B","answerText":"フィルターバブルやエコーチェンバーでユーザーの信念を強化する推薦アルゴリズムと、低コストのコンテンツ生成AIが拡散を促進するから","explanation":"生成AIによる低コストでリアルなフェイクコンテンツ（記事・画像・動画）の量産と、フィルターバブル・エコーチェンバーを形成するSNSの推薦アルゴリズムがフェイクニュースの拡散を助長する。","star":"★★★"},{"no":474,"chapter":"第9章","chapterTheme":"法律・倫理","section":"悪用・透明性","question":"ブラックボックス問題の説明として正しいものはどれか。","choices":{"A":"AIシステムのコードが公開されていない問題","B":"複雑なDLモデルの内部処理・判断根拠が人間に理解できない問題","C":"AIのサーバーが暗号化されている問題","D":"AIのデータが非公開"},"answer":"B","answerText":"複雑なDLモデルの内部処理・判断根拠が人間に理解できない問題","explanation":"ブラックボックス問題は深いNNの内部の判断プロセスが不透明で、なぜその予測をしたかを人間が理解できないこと。医療・司法・金融等の説明責任が求められる分野で特に問題視される。","star":"★★★"},{"no":475,"chapter":"第9章","chapterTheme":"法律・倫理","section":"民主主義・環境・労働","question":"フィルターバブル（Filter Bubble）の説明として正しいものはどれか。","choices":{"A":"ウェブページのフィルタリング機能","B":"推薦アルゴリズムがユーザーの好みに合うコンテンツのみを表示し、異なる意見・情報から隔離された「泡」に閉じ込められる現象","C":"ウイルス対策ソフトの機能","D":"検索結果の誤りを修正する機能"},"answer":"B","answerText":"推薦アルゴリズムがユーザーの好みに合うコンテンツのみを表示し、異なる意見・情報から隔離された「泡」に閉じ込められる現象","explanation":"フィルターバブル（Eli Pariser）は推薦アルゴリズムがユーザーの過去の行動・好みに基づいてコンテンツをカスタマイズする結果、ユーザーが自分の価値観を強化する情報のみに囲まれる問題。","star":"★★★"},{"no":476,"chapter":"第9章","chapterTheme":"法律・倫理","section":"民主主義・環境・労働","question":"エコーチェンバー（Echo Chamber）の説明として正しいものはどれか。","choices":{"A":"音響設計の手法","B":"同じ考え方を持つ人々が集まり、互いの意見を繰り返し反響させることで考えが極端化・固定化する現象","C":"AIが同じ回答を繰り返す","D":"データの重複"},"answer":"B","answerText":"同じ考え方を持つ人々が集まり、互いの意見を繰り返し反響させることで考えが極端化・固定化する現象","explanation":"エコーチェンバーはSNS等で同じ意見・価値観を持つ人々が閉じたコミュニティを形成し、異なる意見に接する機会がなくなることで意見が極端化・固定化する現象。民主主義への影響が懸念される。","star":"★★★"},{"no":477,"chapter":"第9章","chapterTheme":"法律・倫理","section":"民主主義・環境・労働","question":"AIのモデル学習の電力消費に関する問題として正しいものはどれか。","choices":{"A":"大規模モデルの学習は少量の電力しか消費しない","B":"大規模なDLモデルの学習は多大な電力を消費し、CO2排出・気候変動への影響が懸念されている","C":"AIの電力消費は常に火力発電のみで賄われている","D":"電力消費の問題はAIにのみ特有"},"answer":"B","answerText":"大規模なDLモデルの学習は多大な電力を消費し、CO2排出・気候変動への影響が懸念されている","explanation":"大規模言語モデル（GPT-4等）の学習は大量のGPUを長期間稼働させるため莫大な電力消費を伴う。CO2排出・水消費（冷却）等の環境負荷が問題となっており、グリーンAI・効率的な学習手法が研究されている。","star":"★★★"},{"no":478,"chapter":"第9章","chapterTheme":"法律・倫理","section":"民主主義・環境・労働","question":"AIの普及が労働市場に与える影響の議論として正しいものはどれか。","choices":{"A":"AIは常に雇用を増やす","B":"ルーティン的・反復的な業務はAIに代替されるリスクがあるが、新たなAI関連職も創出されるという議論がある","C":"AIは全ての職業を完全になくす","D":"AIは労働生産性を下げる"},"answer":"B","answerText":"ルーティン的・反復的な業務はAIに代替されるリスクがあるが、新たなAI関連職も創出されるという議論がある","explanation":"AIによる雇用代替はルーティン的・反復的業務（データ入力・単純審査等）で進む可能性があるが、創造性・コミュニケーション・AIの管理・倫理審査等の新職も生まれる。変化への適応とスキル転換（リスキリング）が重要。","star":"★★★"},{"no":479,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"AIガバナンスの説明として正しいものはどれか。","choices":{"A":"AIを技術的に管理するシステム","B":"AIの開発・運用・利用に関するルール・組織・プロセスを整備してAIを責任ある形で管理する枠組み","C":"AIの精度管理のみ","D":"AI開発の予算管理"},"answer":"B","answerText":"AIの開発・運用・利用に関するルール・組織・プロセスを整備してAIを責任ある形で管理する枠組み","explanation":"AIガバナンスはAIのリスク管理・倫理的利用・説明責任・透明性を確保するための組織内のポリシー・プロセス・体制・技術的手段の整備。倫理アセスメント・人間のレビュー・監査等が含まれる。","star":"★★★"},{"no":480,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"倫理アセスメント（Ethics Assessment）のAI開発における役割として正しいものはどれか。","choices":{"A":"コストを削減するための評価","B":"AI開発・運用前後にリスク・倫理的問題を特定・評価して対策を講じる審査プロセス","C":"AIの精度を向上させる評価","D":"市場競合分析"},"answer":"B","answerText":"AI開発・運用前後にリスク・倫理的問題を特定・評価して対策を講じる審査プロセス","explanation":"倫理アセスメントはAIシステムの開発前・開発中・運用中に公平性・透明性・安全性・プライバシー等の倫理リスクを体系的に評価し、問題があれば対処策を取る組織的プロセス。","star":"★★★"},{"no":481,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"再現性（Reproducibility）がAIガバナンスで重要な理由として正しいものはどれか。","choices":{"A":"再現性があれば精度が向上するから","B":"同じデータ・コードで同じ結果を再現できることで、研究の信頼性確保・問題発生時の原因追跡・監査が可能になるから","C":"再現性は計算コストを削減するから","D":"再現性はデータ収集に必要"},"answer":"B","answerText":"同じデータ・コードで同じ結果を再現できることで、研究の信頼性確保・問題発生時の原因追跡・監査が可能になるから","explanation":"AI研究・開発の再現性は科学的信頼性の基盤。再現不能な結果は研究の正当性に疑問を生じさせる。また本番AIで問題が発生した際の原因追跡（デバッグ）・規制当局への説明のためにも再現性が重要。","star":"★★★"},{"no":482,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"インクルージョン（Inclusion）のAI開発における意味として正しいものはどれか。","choices":{"A":"特定の技術者のみでAIを開発すること","B":"多様な背景（性別・人種・年齢・文化等）を持つ人々がAI開発に参加し、様々な視点でAIの偏りを防ぐこと","C":"AIを全ての産業に強制適用すること","D":"AIの利用者を増やすこと"},"answer":"B","answerText":"多様な背景（性別・人種・年齢・文化等）を持つ人々がAI開発に参加し、様々な視点でAIの偏りを防ぐこと","explanation":"AIのインクルージョンは多様なバックグラウンドを持つ人材がAI開発に関与することで、単一の文化・価値観に偏ったAIの開発を防ぎ、より公平で包括的なAIシステムを実現する考え方。","star":"★★★"},{"no":483,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"人間の自律性（Human Autonomy）のAI倫理における意義として正しいものはどれか。","choices":{"A":"AIが全ての意思決定を行うべき","B":"AIは人間の意思決定を補助するものであり、人間が自律的に判断・選択できる環境を保つことが重要","C":"AIは人間の感情を代替すべき","D":"人間の自律性はAIと無関係"},"answer":"B","answerText":"AIは人間の意思決定を補助するものであり、人間が自律的に判断・選択できる環境を保つことが重要","explanation":"AI倫理における人間の自律性はAIが人間の判断・選択・行動の自律性を損なわないことを求める原則。AIは人間の意思決定を支援するが最終決定は人間が行い、AIへの過度な依存を避けることが重要。","star":"★★★"},{"no":484,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"軍事利用（Lethal Autonomous Weapons）のAI倫理における問題として正しいものはどれか。","choices":{"A":"軍事AIは常に安全で問題がない","B":"人間の監督なしに致死的な判断を下す自律型致死兵器（LAWS）の倫理的・法的問題（攻撃責任の所在等）","C":"AIの軍事利用は全ての国で合法","D":"AIは軍事目的以外には使えない"},"answer":"B","answerText":"人間の監督なしに致死的な判断を下す自律型致死兵器（LAWS）の倫理的・法的問題（攻撃責任の所在等）","explanation":"自律型致死兵器システム（LAWS）は人間の判断なしに標的を選択・攻撃する。攻撃の責任の帰属・国際人道法の遵守・誤作動リスク等が倫理・法的問題として議論されている。","star":"★★★"},{"no":485,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"トレーサビリティ（Traceability）のAIガバナンスにおける意味として正しいものはどれか。","choices":{"A":"AIが自律的に移動できること","B":"AIシステムの開発・学習・推論の各プロセスを追跡可能にして説明責任を果たすこと","C":"AIの計算速度を測定すること","D":"AIのコストを追跡すること"},"answer":"B","answerText":"AIシステムの開発・学習・推論の各プロセスを追跡可能にして説明責任を果たすこと","explanation":"トレーサビリティはAIシステムがどのデータで・どのように学習され・なぜその判断をしたかを追跡可能にすること。問題発生時の原因究明・規制対応・信頼性向上に不可欠なAIガバナンスの要素。","star":"★★★"},{"no":486,"chapter":"第1章","chapterTheme":"人工知能とは・動向","section":"人工知能の定義","question":"人間の神経回路網を模倣して構築されたコンピューターモデルの総称として正しいものはどれか。","choices":{"A":"エキスパートシステム","B":"ニューラルネットワーク（Neural Network）","C":"知識グラフ","D":"データベース"},"answer":"B","answerText":"ニューラルネットワーク（Neural Network）","explanation":"ニューラルネットワークは人間の脳の神経細胞（ニューロン）の接続を数学的に模倣したモデル。複数の層で構成され、学習によって重みを更新する。","star":"★★★"},{"no":487,"chapter":"第2章","chapterTheme":"機械学習の概要","section":"モデルの選択・評価","question":"機械学習においてバイアス（Bias）と分散（Variance）のトレードオフの説明として正しいものはどれか。","choices":{"A":"バイアスが高いモデルは過学習し、分散が高いモデルは未学習になる","B":"バイアスが高い（単純モデル）と未学習・汎化誤差大。分散が高い（複雑モデル）と過学習。モデル複雑度を適切に調整することが重要","C":"バイアスと分散は常に比例する","D":"バイアスを0にすれば最良のモデルになる"},"answer":"B","answerText":"バイアスが高い（単純モデル）と未学習・汎化誤差大。分散が高い（複雑モデル）と過学習。モデル複雑度を適切に調整することが重要","explanation":"バイアス-分散トレードオフ：単純なモデルはバイアスが高く（underfitting）、複雑なモデルは分散が高い（overfitting）。両者のバランスをとる（正則化・クロスバリデーション等）ことで汎化性能を最大化する。","star":"★★★"},{"no":488,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"AIモデルのA/Bテストの説明として正しいものはどれか。","choices":{"A":"2つのAIモデルのアーキテクチャを比較する","B":"本番環境でユーザーをランダムに2群に分け、異なるモデル（A・B）の効果を統計的に比較する","C":"開発環境とテスト環境のコードを比較する","D":"2つのデータセットを比較する"},"answer":"B","answerText":"本番環境でユーザーをランダムに2群に分け、異なるモデル（A・B）の効果を統計的に比較する","explanation":"A/Bテストはランダムなユーザー分割で2つのモデル・アルゴリズムの効果を比較する実験手法。因果推論的に「モデルBはAより改善したか？」を測定でき、新モデルの本番投入前の検証に使われる。","star":"★★★"},{"no":489,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"継続的インテグレーション/継続的デリバリー（CI/CD）のMLプロジェクトへの適用として正しいものはどれか。","choices":{"A":"MLにはCI/CDは不要","B":"コードの変更に伴い自動でモデルを再学習・評価・デプロイするパイプラインを構築してMLの開発・運用を効率化する","C":"CI/CDはソフトウェア開発のみに適用される","D":"CI/CDはデータ収集のみに使う"},"answer":"B","answerText":"コードの変更に伴い自動でモデルを再学習・評価・デプロイするパイプラインを構築してMLの開発・運用を効率化する","explanation":"ML向けCI/CDはコードの変更・データの更新を検知して自動でモデルの再学習・評価・デプロイを実行するパイプライン。品質・再現性を担保しながら迅速なモデル更新を実現する（MLOpsの実践）。","star":"★★★"},{"no":490,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"特徴量選択（Feature Selection）の目的として正しいものはどれか。","choices":{"A":"全ての特徴量を使って精度を最大化する","B":"不要な特徴量を除去することでモデルの過学習を防ぎ、学習速度・解釈性を向上させる","C":"特徴量を新たに作成する","D":"特徴量のスケールを統一する"},"answer":"B","answerText":"不要な特徴量を除去することでモデルの過学習を防ぎ、学習速度・解釈性を向上させる","explanation":"特徴量選択は関連性の低い・冗長な特徴量を除去してモデルをシンプルにする。過学習の防止・次元の呪いの緩和・計算コスト削減・解釈性向上の効果がある。フィルタ法・ラッパー法・組み込み法がある。","star":"★★★"},{"no":491,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"Feature Store（特徴量ストア）の説明として正しいものはどれか。","choices":{"A":"データウェアハウスの別名","B":"学習・推論で共通して使える特徴量を一元管理・再利用するMLインフラ","C":"モデルの重みを保存するストレージ","D":"ログデータを格納する場所"},"answer":"B","answerText":"学習・推論で共通して使える特徴量を一元管理・再利用するMLインフラ","explanation":"Feature Storeは学習・推論パイプラインで使われる特徴量を一元管理するMLインフラ。特徴量の再利用・一貫性確保・学習/推論間のデータスキューの防止・特徴量の監視を可能にする（Feast・Tecton等）。","star":"★★☆"},{"no":492,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"データの収集・加工・分析・学習","question":"フェデレーテッドラーニング（Federated Learning）の説明として正しいものはどれか。","choices":{"A":"データを1か所に集めて中央集権的に学習する","B":"データを各デバイス・拠点に分散したまま、モデルのパラメータ（勾配）のみを共有して学習するプライバシー保護型の分散学習","C":"複数のモデルを並列に学習するアンサンブル手法","D":"クラウドでのみ実行できる学習手法"},"answer":"B","answerText":"データを各デバイス・拠点に分散したまま、モデルのパラメータ（勾配）のみを共有して学習するプライバシー保護型の分散学習","explanation":"フェデレーテッドラーニングは生データを移動させずに各デバイス（スマートフォン等）でローカルに学習し、勾配・モデル更新のみをサーバーに集約する。プライバシー保護・データの地域主権対応に有効。","star":"★★★"},{"no":493,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"他企業との協業・データ共有における注意点として最も重要なものはどれか。","choices":{"A":"競合他社とは常に協業すべき","B":"知的財産の帰属・秘密情報の管理・データの二次利用制限等を契約で明確にすること","C":"データは無制限に共有すべき","D":"他社のデータを無断で使える"},"answer":"B","answerText":"知的財産の帰属・秘密情報の管理・データの二次利用制限等を契約で明確にすること","explanation":"企業間データ共有では知的財産権（誰がモデル・派生データの権利を持つか）・秘密情報の定義・目的外利用の禁止・データセキュリティ要件等を契約（NDА・データ共有協定等）で明確化することが不可欠。","star":"★★★"},{"no":494,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"機械学習モデルのバージョン管理の目的として正しいものはどれか。","choices":{"A":"バージョン番号を付けるだけで十分","B":"コード・データ・モデルの変更を追跡して再現性・ロールバック・実験管理を可能にすること","C":"最新バージョンのみを保存する","D":"ハイパーパラメータのみを記録する"},"answer":"B","answerText":"コード・データ・モデルの変更を追跡して再現性・ロールバック・実験管理を可能にすること","explanation":"MLモデルのバージョン管理はコード（Git）・データ（DVC等）・モデルアーティファクト・ハイパーパラメータ・メトリクスを一元管理することで再現性・実験追跡・本番ロールバックを可能にする（MLflow・W&B等）。","star":"★★☆"},{"no":495,"chapter":"第7章","chapterTheme":"AIの社会実装","section":"AIプロジェクトの進め方","question":"AIシステムの「モデルカード（Model Card）」の説明として正しいものはどれか。","choices":{"A":"AIモデルの価格表","B":"モデルの用途・性能・限界・倫理的考慮事項を文書化したモデルの仕様書","C":"モデルのソースコード","D":"モデルの物理サーバーの仕様"},"answer":"B","answerText":"モデルの用途・性能・限界・倫理的考慮事項を文書化したモデルの仕様書","explanation":"モデルカード（Mitchell et al., 2019）はAIモデルの意図された用途・評価結果・性能の限界・倫理的考慮事項・偏りの分析等を標準化した形式で文書化したもの。AIの透明性・説明責任のために公開が推奨される。","star":"★★★"},{"no":496,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"AIのモニタリングにおいてドリフト検知の重要性として正しいものはどれか。","choices":{"A":"モニタリングはコストがかかるため省略すべき","B":"本番データの分布変化を早期検知してモデル性能の劣化を防ぐことができるから","C":"モニタリングはモデルの精度を自動で向上させるから","D":"ドリフト検知はデプロイ前にのみ行う"},"answer":"B","answerText":"本番データの分布変化を早期検知してモデル性能の劣化を防ぐことができるから","explanation":"本番データの分布変化（データドリフト）やコンセプトドリフトを早期検知することで、性能劣化前に再学習等の対処が取れる。モデルの品質を継続的に維持するMLOpsの重要要素。","star":"★★★"},{"no":497,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"ダイバーシティ（多様性）をAI開発チームに取り入れることの利点として正しいものはどれか。","choices":{"A":"開発速度が必ず上がる","B":"多様な視点でAIのバイアスや見落とされがちなリスクを発見し、より公平なシステムを設計できる","C":"多様性は品質を下げる","D":"多様なチームは意思決定が常に遅くなる"},"answer":"B","answerText":"多様な視点でAIのバイアスや見落とされがちなリスクを発見し、より公平なシステムを設計できる","explanation":"AI開発チームの多様性（性別・人種・文化・背景等）は、モデルの設計・評価時に単一の視点では気づきにくいバイアスや倫理問題を発見する助けとなる。公平なAIの実現に不可欠な要素。","star":"★★★"},{"no":498,"chapter":"第9章","chapterTheme":"法律・倫理","section":"国内外のガイドライン","question":"価値原則（Value Principles）のAI倫理ガイドラインにおける役割として正しいものはどれか。","choices":{"A":"価値原則は法的拘束力を持つ規制","B":"AIシステムが遵守すべき倫理的な原則・価値観（公平性・透明性・安全性等）を定義した指針","C":"価値原則は技術的な仕様を定める","D":"価値原則はビジネス目標のみを定める"},"answer":"B","answerText":"AIシステムが遵守すべき倫理的な原則・価値観（公平性・透明性・安全性等）を定義した指針","explanation":"AI倫理ガイドラインの価値原則は公平性・透明性・安全性・プライバシー・アカウンタビリティ・人間の自律性等のAIが遵守すべき倫理的価値観を定義する。拘束力はないが組織のAI方針の基礎となる。","star":"★★★"},{"no":499,"chapter":"第9章","chapterTheme":"法律・倫理","section":"AIガバナンス","question":"AIポリシー（AI Policy）の目的として正しいものはどれか。","choices":{"A":"AIの技術的な実装手順を定める","B":"組織がAIをどのように開発・利用・ガバナンスするかの基本的な方針・ルールを定めた文書","C":"AIの予算を決定する文書","D":"AIエンジニアの採用基準"},"answer":"B","answerText":"組織がAIをどのように開発・利用・ガバナンスするかの基本的な方針・ルールを定めた文書","explanation":"AIポリシーは組織のAIに関する方針（倫理原則・リスク管理・禁止用途・承認プロセス・監査方法等）を定めた文書。AIガバナンスの基盤となり、社員・ステークホルダーへの組織のAIへのコミットメントを示す。","star":"★★★"},{"no":500,"chapter":"第9章","chapterTheme":"法律・倫理","section":"安全性とセキュリティ","question":"AIシステムにおけるロバストネス（Robustness）の説明として正しいものはどれか。","choices":{"A":"モデルの精度が最高であること","B":"入力のノイズ・変動・敵対的攻撃に対して安定した性能を維持する能力","C":"モデルのパラメータ数が多いこと","D":"学習速度が速いこと"},"answer":"B","answerText":"入力のノイズ・変動・敵対的攻撃に対して安定した性能を維持する能力","explanation":"AIのロバストネスは入力データの微小な変動・ノイズ・ドメインシフト・敵対的サンプル等に対して安定した出力を維持する能力。自動運転・医療診断等の安全クリティカルな応用では特に重要。","star":"★★★"}];

let filtered = [...ALL_QUESTIONS];
let currentIndex = 0;
let isFlipped = false;
let selectedChapter = 'all';
let selectedStar = 'all';
let bookmarkMode = false;
let undoneMode = false;
let searchQuery = '';

const bookmarks = JSON.parse(localStorage.getItem('g_bookmarks_m') || '{}');
const doneSet   = JSON.parse(localStorage.getItem('g_done_m')      || '{}');
const memos     = JSON.parse(localStorage.getItem('g_memos_m')     || '{}');

function save() {
  localStorage.setItem('g_bookmarks_m', JSON.stringify(bookmarks));
  localStorage.setItem('g_done_m',      JSON.stringify(doneSet));
  localStorage.setItem('g_memos_m',     JSON.stringify(memos));
}

function openDrawer()  { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); document.body.style.overflow=''; }

function applyFilters() {
  searchQuery = document.getElementById('searchBox').value.toLowerCase();
  filtered = ALL_QUESTIONS.filter(q => {
    if (selectedChapter !== 'all' && q.chapter !== selectedChapter) return false;
    if (selectedStar    !== 'all' && q.star    !== selectedStar)    return false;
    if (bookmarkMode && !bookmarks[q.no]) return false;
    if (undoneMode   &&  doneSet[q.no])  return false;
    if (searchQuery) { const h=(q.question+q.explanation+q.answerText+q.section).toLowerCase(); if (!h.includes(searchQuery)) return false; }
    return true;
  });
  currentIndex = 0; isFlipped = false;
  updateCounts(); renderCard(); closeDrawer();
}

function updateCounts() {
  const chapters = ['第1章','第2章','第3章','第4章','第5章','第6章','第7章','第8章','第9章'];
  const base = q => {
    if (selectedStar !== 'all' && q.star !== selectedStar) return false;
    if (bookmarkMode && !bookmarks[q.no]) return false;
    if (undoneMode   &&  doneSet[q.no])  return false;
    if (searchQuery) { const h=(q.question+q.explanation+q.section).toLowerCase(); if (!h.includes(searchQuery)) return false; }
    return true;
  };
  document.getElementById('cnt-all').textContent = ALL_QUESTIONS.filter(base).length;
  chapters.forEach(ch => {
    const el = document.getElementById('cnt-' + ch);
    if (el) el.textContent = ALL_QUESTIONS.filter(q => q.chapter === ch && base(q)).length;
  });
}

function selectChapter(ch) {
  selectedChapter = ch; bookmarkMode = false; undoneMode = false;
  document.querySelectorAll('#btn-bookmark,#btn-undone').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[id^="ch-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('ch-' + ch).classList.add('active');
  applyFilters();
}
function toggleStar(s) {
  selectedStar = s;
  document.querySelectorAll('[id^="star-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('star-' + (s==='all'?'all':s==='★★★'?'3':'2')).classList.add('active');
  applyFilters();
}
function filterBookmarks() {
  bookmarkMode = !bookmarkMode; undoneMode = false;
  document.getElementById('btn-bookmark').classList.toggle('active', bookmarkMode);
  document.getElementById('btn-undone').classList.remove('active');
  applyFilters();
}
function filterUndone() {
  undoneMode = !undoneMode; bookmarkMode = false;
  document.getElementById('btn-undone').classList.toggle('active', undoneMode);
  document.getElementById('btn-bookmark').classList.remove('active');
  applyFilters();
}

function syncHeight() {
  const front = document.getElementById('cardFront');
  const back  = document.getElementById('cardBack');
  const outer = document.getElementById('fcOuter');
  if (!front || !back || !outer) return;
  front.style.position = 'relative'; back.style.position = 'relative';
  const h = Math.max(front.scrollHeight, back.scrollHeight);
  front.style.position = ''; back.style.position = '';
  outer.style.height = h + 'px';
}

function renderCard() {
  document.getElementById('flashcard').classList.remove('flipped');
  isFlipped = false;

  const total = filtered.length;
  const pct = total > 0 ? ((currentIndex+1)/total*100).toFixed(1) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent  = `${currentIndex+1} / ${total}`;
  document.getElementById('cardCounter').textContent   = `${currentIndex+1} / ${total}`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex >= total - 1;

  if (total === 0) {
    document.getElementById('fcOuter').innerHTML = '<div class="empty"><div class="icon">🔍</div><div>該当問題なし</div></div>';
    return;
  }

  const q = filtered[currentIndex];
  ['fcChapter','fcChapterB'].forEach(id => document.getElementById(id).textContent = q.chapter);
  ['fcSection','fcSectionB'].forEach(id => document.getElementById(id).textContent = q.section);
  document.getElementById('fcStar').textContent         = q.star;
  document.getElementById('fcNo').textContent           = q.no;
  document.getElementById('fcQuestion').textContent     = q.question;
  document.getElementById('fcAnswerLetter').textContent = q.answer;
  document.getElementById('fcAnswerText').textContent   = q.answerText;
  document.getElementById('fcExplanation').textContent  = q.explanation;

  // 4択を表面に表示
  document.getElementById('fcChoicesFront').innerHTML = ['A','B','C','D'].map(k =>
    `<div class="choice-item">
       <span class="choice-key">${k}</span>
       <span>${q.choices[k]}</span>
     </div>`
  ).join('');

  const bm   = bookmarks[q.no];
  const done = doneSet[q.no];
  document.getElementById('bookmarkBtn').textContent = bm ? '⭐' : '🤍';
  document.getElementById('bookmarkBtn').classList.toggle('active-bm', !!bm);
  document.getElementById('doneBtn').textContent     = done ? '✅' : '📋';
  document.getElementById('doneBtn').classList.toggle('active-done', !!done);
  document.getElementById('statusBookmark').textContent = bm ? '⭐ ブックマーク済' : '🤍 未登録';
  document.getElementById('statusDone').textContent     = done ? '✅ 確認済み' : '📋 未確認';
  document.getElementById('statusStar').textContent     = q.star;
  document.getElementById('memoInput').value = memos[q.no] || '';

  requestAnimationFrame(syncHeight);
}

function flipCard() {
  if (!filtered.length) return;
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
}

function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(); } }
function nextCard() { if (currentIndex < filtered.length - 1) { currentIndex++; renderCard(); } }

function toggleBookmark() {
  if (!filtered.length) return;
  const q = filtered[currentIndex];
  if (bookmarks[q.no]) { delete bookmarks[q.no]; showNotif('ブックマーク解除'); }
  else { bookmarks[q.no] = true; showNotif('⭐ ブックマークしました'); }
  save(); renderCard();
}
function markDone() {
  if (!filtered.length) return;
  const q = filtered[currentIndex];
  if (doneSet[q.no]) { delete doneSet[q.no]; showNotif('未確認に戻しました'); }
  else { doneSet[q.no] = true; showNotif('✅ 確認済み'); }
  save(); renderCard();
}
function saveMemo() {
  if (!filtered.length) return;
  const q = filtered[currentIndex];
  const val = document.getElementById('memoInput').value.trim();
  if (val) { memos[q.no] = val; showNotif('💾 メモ保存'); }
  else { delete memos[q.no]; showNotif('メモ削除'); }
  save();
}
function shuffleCards() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  currentIndex = 0; renderCard(); showNotif('🔀 シャッフルしました');
}
function resetAll() {
  if (!confirm('ブックマーク・確認済み・メモを全てリセットしますか？')) return;
  [bookmarks, doneSet, memos].forEach(o => Object.keys(o).forEach(k => delete o[k]));
  save(); renderCard(); showNotif('↺ リセット完了');
}
function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg; el.classList.remove('hidden');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.add('hidden'), 1800);
}

// Swipe / tap
let touchStartX = 0, touchStartY = 0;
const cardWrapEl = document.querySelector('.card-wrap');
cardWrapEl.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
cardWrapEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { flipCard(); return; }
  if (Math.abs(dx) > 40 && Math.abs(dy) < 60) {
    if (dx < 0) nextCard(); else prevCard();
  }
}, {passive: true});

// Init
updateCounts();
renderCard();
</script>
</body>
</html>
